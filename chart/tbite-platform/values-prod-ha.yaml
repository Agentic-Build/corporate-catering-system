# tbite-platform — opt-in multi-AZ HA overlay.
#
# Apply ON TOP of the default values.yaml when the enterprise exceeds
# the single-node defaults (~10K employees, multi-AZ topology,
# higher concurrent SSE, dedicated observability node pool):
#
#   helm install tbite chart/tbite-platform \
#     -f chart/tbite-platform/values.yaml \
#     -f chart/tbite-platform/values-prod-ha.yaml
#
# Inherits every field from values.yaml; only the deltas needed for
# full HA are repeated below.

profile:
  size: prod
  haTopology: true

global:
  podAnnotations:
    sidecar.istio.io/inject: "false"
  nats:
    # 5-node JetStream cluster (see nats.cluster.replicas below) → run streams
    # at 3 replicas so the loss of one node never makes a stream unavailable.
    streamReplicas: 3
  topologySpread:
    enabled: true
    constraints:
      - topologyKey: topology.kubernetes.io/zone
        maxSkew: 1
        whenUnsatisfiable: ScheduleAnyway
        matchLabelKeys: [pod-template-hash]
      - topologyKey: kubernetes.io/hostname
        maxSkew: 1
        whenUnsatisfiable: ScheduleAnyway
        matchLabelKeys: [pod-template-hash]

# Pod anti-affinity for application roles. Subcharts use their own
# scheduling values to avoid chart-specific helper contracts.
tbite:
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/instance
                  operator: In
                  values: [tbite]

#-----------------------------------------------------------------------------
# Application — higher minimum replicas, larger HPA ceiling.
#-----------------------------------------------------------------------------
api:
  replicaCount: 3
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 30
    targetConcurrency: 50
    targetRPS: 100

realtime:
  replicaCount: 3
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
    targetActiveConnections: 3000
  terminationGracePeriodSeconds: 120

web:
  employee:
    replicaCount: 3
    hpa: { enabled: true, minReplicas: 3, maxReplicas: 12 }
    pdb: { enabled: true, minAvailable: 1 }
  merchant:
    replicaCount: 2
    hpa: { enabled: true, minReplicas: 2, maxReplicas: 6 }
    pdb: { enabled: true, minAvailable: 1 }
  admin:
    replicaCount: 2
    hpa: { enabled: true, minReplicas: 2, maxReplicas: 4 }
    pdb: { enabled: true, minAvailable: 1 }

workers:
  outboxRelay:
    replicaCount: 2
    keda: { enabled: true, minReplicas: 2, maxReplicas: 20 }
  payrollSettler:
    replicaCount: 2
    keda: { enabled: true, minReplicas: 1, maxReplicas: 10 }
  onTimeEvaluator:
    replicaCount: 2
    keda: { enabled: true, minReplicas: 1, maxReplicas: 10 }

#-----------------------------------------------------------------------------
# Data plane — full HA topology.
#-----------------------------------------------------------------------------
postgres:
  enabled: true
  cluster:
    instances: 3
    storage:
      size: 200Gi
    pooler:
      enabled: true
      instances: 3
    backup:
      enabled: true
      retentionPolicy: "30d"
    resources:
      requests: { cpu: 2, memory: 4Gi }
      limits:   { cpu: 4, memory: 8Gi }
    postgresql:
      parameters:
        max_connections: "400"
        shared_buffers: "1GB"
        effective_cache_size: "3GB"
  pitr:
    enabled: true
    targetRpoSeconds: 300
    targetRtoSeconds: 1800

valkey:
  enabled: true
  architecture: replication
  replicaCount: 3
  sentinel:
    enabled: true
    quorum: 2
  primary:
    persistence:
      enabled: true
      size: 16Gi
    resources:
      requests: { cpu: 200m, memory: 512Mi }
      limits:   { cpu: 1,    memory: 1Gi }
  replica:
    persistence:
      enabled: true
      size: 16Gi
    resources:
      requests: { cpu: 200m, memory: 512Mi }
      limits:   { cpu: 1,    memory: 1Gi }

nats:
  enabled: true
  cluster:
    enabled: true
    replicas: 5
  config:
    cluster:
      enabled: true
      replicas: 5
    jetstream:
      enabled: true
      fileStore:
        enabled: true
        pvc:
          size: 100Gi
  container:
    merge:
      resources:
        requests: { cpu: 500m, memory: 1Gi }
        limits:   { cpu: 2,    memory: 2Gi }

# MinIO Tenant in distributed (erasure-coded) mode supersedes the
# single-pod minioStandalone shipped in the default values. The
# Tenant CR is owned by the MinIO Operator subchart.
minioStandalone:
  enabled: false

minio:
  enabled: true
  operator:
    enabled: true
  tenant:
    enabled: true
    tenant:
      pools:
        - servers: 4
          name: pool-0
          volumesPerServer: 4
          size: 1Ti

#-----------------------------------------------------------------------------
# Identity — bigger Authentik / Hydra footprint.
#-----------------------------------------------------------------------------
authentik:
  enabled: true
  server:
    replicas: 2
    resources:
      requests: { cpu: 500m, memory: 1Gi }
      limits:   { cpu: 2,    memory: 2Gi }
  worker:
    replicas: 2
    resources:
      requests: { cpu: 500m, memory: 768Mi }
      limits:   { cpu: 2,    memory: 1500Mi }

hydra:
  enabled: true
  replicaCount: 2

#-----------------------------------------------------------------------------
# Ingress — three Traefik replicas for blue/green rollover.
#-----------------------------------------------------------------------------
ingress:
  certManager:
    enabled: true
    issuer:
      name: letsencrypt
      server: https://acme-v02.api.letsencrypt.org/directory

traefik:
  enabled: true
  deployment:
    replicas: 3

cert-manager:
  replicaCount: 2
  webhook:
    replicaCount: 2
  cainjector:
    replicaCount: 2

#-----------------------------------------------------------------------------
# Observability — full Victoria stack.
#-----------------------------------------------------------------------------
observability:
  victoriaMetrics:
    enabled: true
    retention: "12mo"
  victoriaLogs:
    enabled: true
    retention: "30d"
  victoriaTraces:
    enabled: true
    retention: "30d"
  grafana:
    enabled: true
  otelCollector:
    enabled: true

victoria-metrics-k8s-stack:
  vmsingle:
    spec:
      retentionPeriod: "12mo"
      storage:
        resources:
          requests:
            storage: 500Gi
  vmagent:
    enabled: true
  alertmanager:
    enabled: true
  vmalert:
    enabled: true
    spec:
      extraArgs:
        notifier.blackhole: null
  grafana:
    enabled: true
    replicas: 2
  kube-state-metrics:
    enabled: true
    metricLabelsAllowlist:
      - nodes=[topology.kubernetes.io/zone]
      - pods=[app.kubernetes.io/name,app.kubernetes.io/instance,app.kubernetes.io/component]
  prometheus-node-exporter:
    enabled: true

victoria-logs-single:
  server:
    retentionPeriod: "30d"
    persistentVolume:
      enabled: true
      size: 200Gi

victoria-traces-single:
  server:
    retentionPeriod: "30d"
    persistentVolume:
      enabled: true
      size: 200Gi

opentelemetry-collector:
  mode: deployment
  replicaCount: 3
  config:
    exporters:
      otlp_http/victoria:
        traces_endpoint: http://{{ .Release.Name }}-vt-single-server.{{ .Release.Namespace }}.svc.cluster.local:10428/insert/opentelemetry/v1/traces
        logs_endpoint: http://{{ .Release.Name }}-victoria-logs-single-server.{{ .Release.Namespace }}.svc.cluster.local:9428/insert/opentelemetry/v1/logs
    service:
      pipelines:
        logs:
          exporters:
            - otlp_http/victoria
        traces:
          exporters:
            - otlp_http/victoria

keda:
  enabled: true

networkPolicy:
  enabled: true
