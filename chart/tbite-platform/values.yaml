# tbite-platform — default values.
#
# This file is the **canonical single-enterprise production sizing**
# per ADR-0008: one enterprise per stack, not a
# multi-tenant SaaS topology. The shape fits a 16-core / 32 GiB node
# and supports roughly 5,000–10,000 employees, ~10–30 plants, and
# ~50 sustained orders/sec / ~200 orders/sec burst.
#
# Overlays:
#   values-dev.yaml      — laptop kind/k3d/OrbStack single-replica
#   values-prod-ha.yaml  — opt-in multi-AZ HA (>10K employees, full
#                          Valkey Sentinel, MinIO Tenant 4x4, CNPG
#                          3-instance, complete VictoriaMetrics stack)

profile:
  size: prod # one of: dev | prod
  # haTopology gates the schema's HA-minima enforcement (3-instance
  # CNPG, 3-replica Valkey HA, MinIO Tenant 4x4, etc.). Default is
  # false: the chart ships single-enterprise prod sizing per
  # ADR-0008. values-prod-ha.yaml sets this to true.
  haTopology: false

# crdsReady gates every template that emits a CustomResource whose CRD
# is installed by a subchart in the same release. Two-pass install
# leaves this false on phase 1 so subcharts can bring their CRDs up,
# then true on phase 2. ArgoCD users keep this true and rely on
# `syncOptions: [ServerSideApply=true]` + retry for convergence.
crdsReady: true

global:
  imageRegistry: ""
  imagePullPolicy: IfNotPresent
  domain: tbite.example.com
  baseURL:
    api: https://api.tbite.example.com
    employee: https://app.tbite.example.com
    merchant: https://merchant.tbite.example.com
    admin: https://admin.tbite.example.com
  namespaceOverride: ""
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  oidcIssuerURL: "https://auth.tbite.example.com/application/o/tbite/"
  authentik:
    baseURL: "http://tbite-authentik-server.tbite.svc.cluster.local:9000"
    vendorOperatorGroup: "tbite:role:vendor_operator"
    providerSlugs: "authentik"
    # API OAuth2 client_id. Must match the blueprint's provider client_id.
    # Lives here (not in the SOPS secret) so it cannot drift out-of-band.
    clientID: "tbite"
    apiTokenSecretRef:
      name: tbite-authentik
      key: apiToken
  oidcClientsSecretRef:
    name: tbite-oidc-clients
  redisURL: "redis://tbite-valkey-primary.tbite.svc.cluster.local:6379/0"
  s3:
    endpoint: "http://minio.tbite.svc.cluster.local"
    region: "us-east-1"
    bucket: "tbite-prod"
    usePathStyle: "1"
    # publicBaseURL is the externally-reachable MinIO base URL that browsers
    # use to fetch images directly (path-style: {publicBaseURL}/{bucket}/{key}).
    # For Cloudflare Tunnel deployments, set this to the files-* tunnel host.
    publicBaseURL: "https://files.tbite.example.com"
    credentialsSecretRef:
      name: tbite-s3
      accessKeyKey: accessKeyID
      secretKeyKey: secretAccessKey
  nats:
    url: "nats://tbite-nats.tbite.svc.cluster.local:4222"
    # JetStream stream replica count (NATS_STREAM_REPLICAS, read by the
    # provision-streams role). Kept at 1 here to match the streams already
    # provisioned on the live deploy — raising it reconfigures existing
    # streams, so do that deliberately (see values-prod-ha.yaml, which ships 3).
    streamReplicas: 1
    credentialsSecretRef:
      name: tbite-nats
      key: creds

image:
  repository: ghcr.io/agentic-build/tbite-api
  tag: "sha-b0d5e85"
  pullSecrets: []

serviceAccount:
  create: true
  annotations: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

otel:
  serviceNamespace: tbite
  exporterProtocol: http/protobuf

#-----------------------------------------------------------------------------
# Application roles
#-----------------------------------------------------------------------------
# Replica counts and HPA bounds are sized for ~5K–10K employees in a
# single enterprise. Lunch-peak burst is absorbed by HPA scale-out
# (api 2→10, realtime 2→6) plus the outbox-relay's KEDA scaler.
#-----------------------------------------------------------------------------
api:
  enabled: true
  replicaCount: 2
  image: {}
  args: ["--role=api"]
  port: 8080
  resources:
    requests: { cpu: 200m, memory: 256Mi, ephemeral-storage: 64Mi }
    limits:   { cpu: 1000m, memory: 768Mi, ephemeral-storage: 512Mi }
  hpa:
    enabled: true
    customMetrics:
      enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetConcurrency: 50
    targetRPS: 100
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1
  database:
    rwUrlSecretRef: { name: tbite-db, key: rwUrl }
    roUrlSecretRef: { name: tbite-db, key: roUrl }
    maxConns: 16
    maxConnsRO: 16
  env: {}
  envFromSecrets: []
  ingress:
    enabled: true
    host: api.tbite.example.com

realtime:
  enabled: true
  replicaCount: 2
  args: ["--role=realtime-gateway"]
  port: 8081
  sseIdleTimeout: 1h
  topicScope: "plant_date"
  terminationGracePeriodSeconds: 90
  resources:
    requests: { cpu: 200m, memory: 256Mi, ephemeral-storage: 64Mi }
    limits:   { cpu: 1000m, memory: 768Mi, ephemeral-storage: 512Mi }
  hpa:
    enabled: true
    customMetrics:
      enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetActiveConnections: 3000
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1
  ingress:
    enabled: true
    host: rt.tbite.example.com

web:
  employee:
    enabled: true
    replicaCount: 2
    image:
      repository: ghcr.io/agentic-build/tbite-web-employee
      tag: ""
    port: 3000
    resources:
      requests: { cpu: 100m, memory: 128Mi, ephemeral-storage: 64Mi }
      limits:   { cpu: 500m, memory: 384Mi, ephemeral-storage: 512Mi }
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70
    pdb: { enabled: true, minAvailable: 1 }
    baseURL: https://app.tbite.example.com
    ingress: { enabled: true, host: app.tbite.example.com }
  merchant:
    enabled: true
    replicaCount: 1
    image:
      repository: ghcr.io/agentic-build/tbite-web-merchant
      tag: ""
    port: 3000
    resources:
      requests: { cpu: 100m, memory: 128Mi, ephemeral-storage: 64Mi }
      limits:   { cpu: 500m, memory: 384Mi, ephemeral-storage: 512Mi }
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 70
    pdb: { enabled: false, minAvailable: 1 }
    baseURL: https://merchant.tbite.example.com
    ingress: { enabled: true, host: merchant.tbite.example.com }
  admin:
    enabled: true
    replicaCount: 1
    image:
      repository: ghcr.io/agentic-build/tbite-web-admin
      tag: ""
    port: 3000
    resources:
      requests: { cpu: 100m, memory: 128Mi, ephemeral-storage: 64Mi }
      limits:   { cpu: 500m, memory: 384Mi, ephemeral-storage: 512Mi }
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 2
      targetCPUUtilizationPercentage: 70
    pdb: { enabled: false, minAvailable: 1 }
    baseURL: https://admin.tbite.example.com
    ingress: { enabled: true, host: admin.tbite.example.com }

workers:
  outboxRelay:
    enabled: true
    replicaCount: 1
    args: ["--role=outbox-relay"]
    probePort: 2112
    resources:
      requests: { cpu: 100m, memory: 128Mi, ephemeral-storage: 64Mi }
      limits:   { cpu: 500m, memory: 384Mi, ephemeral-storage: 512Mi }
    keda:
      enabled: true
      minReplicas: 1
      maxReplicas: 6
      pollingInterval: 15
      cooldownPeriod: 60
      pendingThreshold: 100
      database:
        connectionFromSecretRef: { name: tbite-db, key: rwUrl }
        query: |
          SELECT count(*) FROM outbox_event
          WHERE published_at IS NULL;
  payrollSettler:
    enabled: true
    replicaCount: 1
    args: ["--role=payroll-settler"]
    probePort: 2112
    resources:
      requests: { cpu: 100m, memory: 128Mi, ephemeral-storage: 64Mi }
      limits:   { cpu: 500m, memory: 384Mi, ephemeral-storage: 512Mi }
    keda:
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      pollingInterval: 15
      cooldownPeriod: 60
      stream: PAYROLL_V1
      consumer: payroll-settler
      lagThreshold: 500
  onTimeEvaluator:
    enabled: true
    replicaCount: 1
    args: ["--role=on-time-evaluator"]
    probePort: 2112
    resources:
      requests: { cpu: 100m, memory: 128Mi, ephemeral-storage: 64Mi }
      limits:   { cpu: 500m, memory: 384Mi, ephemeral-storage: 512Mi }
    keda:
      enabled: true
      minReplicas: 1
      maxReplicas: 4
      pollingInterval: 15
      cooldownPeriod: 60
      stream: ORDERS_V1
      consumer: on-time-evaluator
      lagThreshold: 500

scheduler:
  cutoffSweeper:
    enabled: true
    replicaCount: 1
    args: ["--role=cutoff-sweeper"]
    probePort: 2112
    leaseName: tbite-cutoff-sweeper
    resources:
      requests: { cpu: 50m, memory: 64Mi, ephemeral-storage: 64Mi }
      limits:   { cpu: 200m, memory: 192Mi, ephemeral-storage: 512Mi }
  noShowSweeper:
    enabled: true
    replicaCount: 1
    args: ["--role=no-show-sweeper"]
    probePort: 2112
    leaseName: tbite-no-show-sweeper
    resources:
      requests: { cpu: 50m, memory: 64Mi, ephemeral-storage: 64Mi }
      limits:   { cpu: 200m, memory: 192Mi, ephemeral-storage: 512Mi }
  documentExpiryScanner:
    enabled: true
    replicaCount: 1
    args: ["--role=document-expiry-scanner"]
    probePort: 2112
    leaseName: tbite-doc-expiry-scanner
    resources:
      requests: { cpu: 50m, memory: 64Mi, ephemeral-storage: 64Mi }
      limits:   { cpu: 200m, memory: 192Mi, ephemeral-storage: 512Mi }
  feedbackScanner:
    enabled: true
    replicaCount: 1
    args: ["--role=feedback-scanner"]
    probePort: 2112
    leaseName: tbite-feedback-scanner
    resources:
      requests: { cpu: 50m, memory: 64Mi, ephemeral-storage: 64Mi }
      limits:   { cpu: 200m, memory: 192Mi, ephemeral-storage: 512Mi }

#-----------------------------------------------------------------------------
# Helm hook Jobs (pre-install, pre-upgrade)
#-----------------------------------------------------------------------------
hooks:
  dbMigrate:
    enabled: true
    image: { repository: migrate/migrate, tag: v4.19.1 }
    migrationsConfigMap: ""
    migrationsImage:
      repository: ghcr.io/agentic-build/tbite-migrations
      tag: ""
    backoffLimit: 3
    activeDeadlineSeconds: 1800
    resources:
      requests: { cpu: 50m, memory: 64Mi, ephemeral-storage: 64Mi }
      limits:   { cpu: 500m, memory: 256Mi, ephemeral-storage: 512Mi }
  provisionStreams:
    enabled: true
    backoffLimit: 3
    activeDeadlineSeconds: 600
    resources:
      requests: { cpu: 50m, memory: 64Mi, ephemeral-storage: 64Mi }
      limits:   { cpu: 500m, memory: 256Mi, ephemeral-storage: 512Mi }
  bucketBootstrap:
    enabled: true
    image: { repository: minio/mc, tag: RELEASE.2025-08-13T08-35-41Z }
    backoffLimit: 3
    activeDeadlineSeconds: 600
    resources:
      requests: { cpu: 50m, memory: 64Mi, ephemeral-storage: 64Mi }
      limits:   { cpu: 500m, memory: 256Mi, ephemeral-storage: 512Mi }
    extraBuckets: []
    policy: "private"
    # Prefixes opened to anonymous read (browser-direct image serving).
    # Empty by default — the whole bucket, including vendor-docs/*, stays private.
    publicReadPrefixes: []
  # createIdentityDatabases bootstraps the `authentik` and `hydra`
  # databases inside the main CNPG Cluster so the two identity
  # subcharts can reuse the same Postgres rather than bringing up
  # their own. Skipped when authentik+hydra are both disabled or
  # when postgres.enabled is false (BYO Postgres mode supplies the
  # databases out-of-band).
  createIdentityDatabases:
    enabled: true

#-----------------------------------------------------------------------------
# CloudNativePG — Postgres data plane
#-----------------------------------------------------------------------------
# Single-enterprise sizing: 1 primary + 1 hot standby gives RPO ≤
# 5 min / RTO ≤ 30 min per ADR-0007 without the cost of a 3-node
# synchronous quorum that a single-enterprise workload does not
# need. PgBouncer fronts the primary with one replica; HPA on the
# api role caps backend connections at the chart's value-derived
# pool budget (api.database.maxConns × api.hpa.maxReplicas) so the
# primary's max_connections is not at risk.
#-----------------------------------------------------------------------------
postgres:
  enabled: true
  operator:
    bundled: false # platform team installs cnpg/cloudnative-pg once
  byo:
    enabled: false
  cluster:
    name: tbite-pg
    instances: 2
    imageName: ghcr.io/cloudnative-pg/postgresql:18.4
    # Required by the chart-owned identity DB bootstrap Job, which
    # creates the authentik and hydra databases/roles in the main CNPG
    # cluster before those subcharts can start cleanly.
    enableSuperuserAccess: true
    storage:
      size: 50Gi
      storageClass: ""
    pooler:
      enabled: true
      instances: 1
      type: rw
    backup:
      enabled: false # opt-in via values-prod-ha.yaml when external object
                     # storage credentials are supplied
      retentionPolicy: "30d"
      destinationPath: "s3://tbite-pgbackup/"
      s3CredentialsSecretRef:
        name: tbite-pg-backup-s3
        accessKeyKey: ACCESS_KEY_ID
        secretKeyKey: ACCESS_SECRET_KEY
    monitoring:
      enabled: false # podMonitor field deprecated; the chart's
                     # VMServiceScrape covers metrics scraping
    resources:
      requests: { cpu: 500m, memory: 2Gi }
      limits:   { cpu: 2,    memory: 4Gi }
    postgresql:
      parameters:
        max_connections: "200"
        shared_buffers: "512MB"
        effective_cache_size: "1500MB"
  pitr:
    enabled: false # opt-in via values-prod-ha.yaml
    targetRpoSeconds: 300
    targetRtoSeconds: 1800

# Used only when postgres.operator.bundled=true.
cnpg-operator:
  config:
    create: true
    data:
      INHERITED_ANNOTATIONS: "argocd.argoproj.io/*"
      INHERITED_LABELS: "app.kubernetes.io/*"

#-----------------------------------------------------------------------------
# Valkey — sessions, OIDC state, read-model cache
#-----------------------------------------------------------------------------
# Single-enterprise sizing: standalone with persistence + RDB
# snapshot. The cache surfaces (sessions, OIDC state, read-model
# entries) are recoverable from authoritative sources, so a brief
# Valkey restart does not lose business data. Sentinel HA is
# available via values-prod-ha.yaml.
#-----------------------------------------------------------------------------
valkey:
  enabled: true
  architecture: standalone
  replicaCount: 1
  auth:
    enabled: true
    existingSecret: tbite-valkey
    existingSecretPasswordKey: password
  sentinel:
    enabled: false
  primary:
    persistence:
      enabled: true
      size: 4Gi
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 500m, memory: 512Mi }
  metrics:
    enabled: true

#-----------------------------------------------------------------------------
# NATS JetStream — durable event plane
#-----------------------------------------------------------------------------
# Three replicas is the RAFT minimum for HA. JetStream file storage
# 10 GiB easily holds 30-day retention of ORDERS_V1 + 90-day
# PAYROLL_V1 for a single enterprise (~5K orders/day × 2 KB).
#-----------------------------------------------------------------------------
nats:
  enabled: true
  cluster:
    enabled: true
    replicas: 3
  config:
    cluster:
      enabled: true
      replicas: 3
    jetstream:
      enabled: true
      fileStore:
        enabled: true
        pvc:
          size: 10Gi
          storageClassName: ""
    nats:
      port: 4222
  natsBox:
    enabled: true
  promExporter:
    enabled: true
  container:
    merge:
      resources:
        requests: { cpu: 200m, memory: 512Mi }
        limits:   { cpu: "1",  memory: 1Gi }

#-----------------------------------------------------------------------------
# MinIO — S3-compatible object storage
#-----------------------------------------------------------------------------
# Single-enterprise sizing: a single MinIO server with one volume.
# The chart deliberately skips the MinIO Operator + Tenant
# distributed mode (4 servers × 4 volumes = 16 PVCs) because that
# topology is for multi-tenant SaaS scale, not for one enterprise's
# menu images + compliance documents. values-prod-ha.yaml enables
# the Tenant for installations that need erasure coding and
# concurrent IO across nodes.
#-----------------------------------------------------------------------------
minio:
  enabled: false
  operator:
    enabled: false
  tenant:
    enabled: false
    tenant:
      name: tbite
      configSecret:
        name: tbite-minio-env
        accessKey: minio
        secretKey: minio123
      pools:
        - servers: 1
          name: pool-0
          volumesPerServer: 1
          size: 50Gi
          storageClassName: ""
      buckets:
        - name: tbite-prod
          objectLock: false
      certificate:
        requestAutoCert: false
      metrics:
        enabled: true
      env:
        - name: MINIO_PROMETHEUS_AUTH_TYPE
          value: "public"

# Single-pod MinIO Deployment used when minio.operator.enabled is
# false. This is the default for the single-enterprise prod sizing:
# one container, one persistent volume, exposed in-cluster as
# `minio.<namespace>.svc.cluster.local`.
minioStandalone:
  enabled: true
  image:
    repository: minio/minio
    tag: RELEASE.2025-09-07T16-13-09Z
  storage:
    size: 50Gi
    storageClass: ""
  resources:
    requests: { cpu: 100m, memory: 256Mi, ephemeral-storage: 64Mi }
    limits:   { cpu: 500m, memory: 1Gi, ephemeral-storage: 512Mi }
  credentialsSecretRef:
    name: tbite-minio-root
    accessKeyKey: accessKey
    secretKeyKey: secretKey

minio-operator:
  operator:
    replicaCount: 1

minio-tenant:
  fullnameOverride: ""

#-----------------------------------------------------------------------------
# Cloudflare Tunnel (cloudflared) — outbound-only ingress alternative
#-----------------------------------------------------------------------------
# Replaces the Traefik + cert-manager + Gateway API ingress path with
# a cloudflared Deployment that dials out to Cloudflare's edge.
#
# Remote-managed tunnel model: the tunnel and its public-hostname
# routes are created in the Cloudflare Zero Trust dashboard
# (Networks → Tunnels). Cloudflare hands back a single token that
# encodes the tunnel id + account id + rotating tunnel secret;
# operators paste the token into the SOPS-encrypted Secret named
# below, and cloudflared dials home with nothing else. Public-
# hostname → in-cluster-Service mapping is configured in the
# dashboard under "Public Hostnames"; Cloudflare auto-creates the
# matching DNS CNAMEs.
#
# See docs/deployment/k3s-cloudflare-tsmc.md for the canonical
# dashboard routing table (api / app / merchant / admin / auth /
# hydra / grafana / argocd → in-cluster Service URLs).
#
# When cloudflared.enabled=true the canonical companion is the
# values-cloudflared.yaml overlay, which also flips traefik /
# cert-manager / ingress.gateway off so the cluster does not run
# two ingress paths in parallel.
cloudflared:
  enabled: false
  replicaCount: 2
  image:
    repository: cloudflare/cloudflared
    tag: "2026.5.1"
    pullPolicy: IfNotPresent
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  tunnel:
    # The Cloudflare-issued tunnel token (Zero Trust dashboard →
    # Networks → Tunnels → <tunnel> → Connectors → "Install and run
    # a connector" → copy the long base64 token string). Encrypt
    # via SOPS into the named Secret under the named key.
    tokenSecretRef:
      name: tbite-cloudflared
      key: token

#-----------------------------------------------------------------------------
# Ingress / Gateway API
#-----------------------------------------------------------------------------
ingress:
  className: traefik
  gateway:
    enabled: true
    name: tbite-gateway
    listeners:
      - name: https
        port: 443
        protocol: HTTPS
        hostname: "*.tbite.example.com"
        tls:
          mode: Terminate
          certificateRefs:
            - name: tbite-wildcard-tls
      - name: http
        port: 80
        protocol: HTTP
  certManager:
    enabled: true
    issuer:
      kind: ClusterIssuer
      name: letsencrypt
      email: ops@tbite.example.com
      server: https://acme-v02.api.letsencrypt.org/directory
      stagingServer: https://acme-staging-v02.api.letsencrypt.org/directory
      solver: http01

traefik:
  enabled: true
  deployment:
    replicas: 2
  ingressRoute:
    dashboard:
      enabled: false
  providers:
    kubernetesGateway:
      enabled: true
      experimentalChannel: true
    kubernetesCRD:
      enabled: true
    kubernetesIngress:
      enabled: false
  experimental:
    kubernetesGateway:
      enabled: true
  gatewayClass:
    name: traefik
  ports:
    web:
      port: 8000
      exposedPort: 80
    websecure:
      port: 8443
      exposedPort: 443
  metrics:
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: false
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }

certManager:
  enabled: true

cert-manager:
  installCRDs: true
  global:
    leaderElection:
      namespace: cert-manager
  prometheus:
    enabled: true
    servicemonitor:
      enabled: false
  replicaCount: 1
  webhook:
    replicaCount: 1
  cainjector:
    replicaCount: 1
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 200m, memory: 128Mi }

#-----------------------------------------------------------------------------
# Identity: Authentik (SSO) + Hydra (MCP DCR) — ADR-0006
#-----------------------------------------------------------------------------
# Authentik and Hydra reuse the main CNPG cluster (databases
# `authentik` and `hydra`, created by the chart's identity DB-init
# Job) plus the main Valkey for Authentik's cache. This saves
# ~2 GiB versus bundling their own Postgres + Redis.
#-----------------------------------------------------------------------------
# Authentik blueprint mounted into the server pod's /blueprints/
# directory. The chart's templates/configmap-authentik-blueprints.yaml
# renders a ConfigMap from chart/tbite-platform/blueprints/ and the
# authentik.* values below mount it. Set authentikBlueprints.enabled
# to false when an external Authentik is configured via BYO mode.
authentikBlueprints:
  enabled: true
  devUsers:
    enabled: false # opt-in; loads E2E users from blueprints/tbite-dev-users.yaml

# AUTHENTIK_BOOTSTRAP_PASSWORD + TOKEN seed the akadmin user on first boot.
# The secure default is external secret ownership: keep
# authentikBootstrap.enabled=false and provide a SOPS/ExternalSecret-backed
# Secret named `<release>-tbite-platform-authentik-bootstrap`.
authentikBootstrap:
  enabled: false
  password: ""
  apiToken: ""
  email: "ops@tbite.example.com"

authentik:
  enabled: true
  externalHost: ""
  authentik:
    secret_key: ""
    existingSecret:
      secretName: tbite-authentik-config
    error_reporting:
      enabled: false
    postgresql:
      host: tbite-pg-rw.tbite.svc.cluster.local
      name: authentik
      user: authentik
      password: ""
    redis:
      host: tbite-valkey-primary.tbite.svc.cluster.local
  server:
    replicas: 1
    resources:
      requests: { cpu: 200m, memory: 512Mi }
      limits:   { cpu: 1,    memory: 1Gi }
    envFrom:
      - secretRef:
          name: tbite-tbite-platform-authentik-bootstrap
  worker:
    replicas: 1
    resources:
      requests: { cpu: 200m, memory: 384Mi }
      limits:   { cpu: 1,    memory: 768Mi }
    envFrom:
      - secretRef:
          name: tbite-tbite-platform-authentik-bootstrap
  postgresql:
    enabled: false
  redis:
    enabled: false
  # The Authentik subchart's per-server ingress and the top-level
  # ingress block were both deprecated in 2026.5.0. We expose the
  # server via our own HTTPRoute (templates/httproute-authentik.yaml)
  # at `global.baseURL.api`-derived host instead.
  #
  # Blueprint ConfigMap is mounted via the subchart's first-class
  # blueprints.configMaps mechanism (Authentik 2026.5+). Only keys
  # ending in `.yaml` are discovered; tbite.yaml and the optional
  # tbite-dev-users.yaml both qualify.
  blueprints:
    configMaps:
      - tbite-tbite-platform-authentik-blueprints
  # Bootstrap akadmin credentials are mounted as env from the
  # externally managed Secret named above.
  # Without this, Authentik creates akadmin with a random password
  # that only appears in the server log on first boot. The
  # subchart's top-level envFrom field was deprecated in 2026.5; the
  # canonical place is now the per-component (server / worker)
  # envFrom blocks. Both need it because the worker writes audit
  # events on first reconcile that assume akadmin exists.

hydra:
  enabled: true
  externalUrl: ""
  secret:
    enabled: false
    nameOverride: tbite-hydra
    enableDefaultAnnotations: false
  database:
    passwordSecretRef:
      name: tbite-hydra
      key: postgresPassword
  hydra:
    config:
      # Operators MUST set the external `tbite-hydra` Secret in real deploys.
      # It carries `dsn`, `secretsSystem`, `secretsCookie`, and
      # `postgresPassword`; the chart's createIdentityDatabases Job ensures
      # the `hydra` database exists in the main CNPG cluster.
      dsn: ""
      urls:
        self:
          issuer: https://hydra.tbite.example.com
        consent: https://app.tbite.example.com/consent
        login: https://app.tbite.example.com/login
        logout: https://app.tbite.example.com/logout
      secrets:
        system: []
  ingress:
    public:
      enabled: false
    admin:
      enabled: false
  replicaCount: 1
  ingressHost: hydra.tbite.example.com
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }

#-----------------------------------------------------------------------------
# Observability — slim default
#-----------------------------------------------------------------------------
# The single-enterprise prod default ships vmsingle + a small
# Grafana + OTel Collector. vmagent, alertmanager, kube-state-metrics,
# node-exporter, victoria-traces, and victoria-logs are off by
# default; values-prod-ha.yaml enables the complete observability
# stack for installations that need the full vendor-grade
# experience.
#-----------------------------------------------------------------------------
observability:
  dashboards:
    enabled: true
    # dev-loop includes trace drilldowns and local-only links; only
    # provision it when VictoriaTraces is enabled for the release.
    includeDevLoop: false
  victoriaMetrics:
    enabled: true
    retention: "30d"
  victoriaLogs:
    enabled: false
    retention: "7d"
  victoriaTraces:
    enabled: false
    retention: "7d"
  grafana:
    enabled: true
    adminPasswordSecretRef:
      name: tbite-grafana-admin
      key: password
    ingressHost: grafana.tbite.example.com
  otelCollector:
    enabled: true
    serviceName: opentelemetry-collector
    grpcPort: 4317
    httpPort: 4318
    useOperatorCR: false

victoria-metrics-k8s-stack:
  defaultDatasources:
    victoriametrics:
      datasources:
        - name: VictoriaMetrics
          type: prometheus
          access: proxy
          uid: VictoriaMetrics
          isDefault: true
  vmsingle:
    spec:
      retentionPeriod: "30d"
      storage:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 30Gi
      resources:
        requests: { cpu: 200m, memory: 512Mi }
        limits:   { cpu: 1,    memory: 1Gi }
  vmagent:
    enabled: false
  alertmanager:
    enabled: false
  vmalert:
    enabled: true
    spec:
      extraArgs:
        notifier.blackhole: "true"
      resources:
        requests: { cpu: 100m, memory: 128Mi }
        limits:   { cpu: 500m, memory: 256Mi }
  grafana:
    enabled: true
    grafana.ini:
      analytics:
        check_for_updates: false
      plugins:
        preinstall_disabled: true
        disable_plugins: grafana-lokiexplore-app,grafana-pyroscope-app,grafana-exploretraces-app,grafana-metricsdrilldown-app
    admin:
      existingSecret: tbite-grafana-admin
      userKey: admin-user
      passwordKey: password
    adminPassword: ""
    replicas: 1
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 500m, memory: 384Mi }
    readinessProbe:
      timeoutSeconds: 10
      failureThreshold: 6
    livenessProbe:
      timeoutSeconds: 30
  kube-state-metrics:
    enabled: false
  prometheus-node-exporter:
    enabled: false

victoria-logs-single:
  server:
    retentionPeriod: "7d"
    persistentVolume:
      enabled: true
      size: 10Gi
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 500m, memory: 512Mi }

victoria-traces-single:
  server:
    retentionPeriod: "7d"
    persistentVolume:
      enabled: true
      size: 10Gi
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 500m, memory: 256Mi }

opentelemetry-collector:
  mode: deployment
  replicaCount: 1
  image:
    repository: otel/opentelemetry-collector-contrib
  presets:
    kubernetesAttributes:
      enabled: true
  ports:
    otlp:
      enabled: true
      containerPort: 4317
      servicePort: 4317
    otlp-http:
      enabled: true
      containerPort: 4318
      servicePort: 4318
  config:
    exporters:
      debug: {}
      prometheusremotewrite:
        endpoint: http://vmsingle-{{ .Release.Name }}-victoria-metrics-k8s-stack.{{ .Release.Namespace }}.svc.cluster.local:8428/api/v1/write
        resource_to_telemetry_conversion:
          enabled: true
    service:
      pipelines:
        metrics:
          exporters:
            - prometheusremotewrite
  resources:
    requests: { cpu: 100m, memory: 192Mi }
    limits:   { cpu: 500m, memory: 384Mi }

keda:
  enabled: true

#-----------------------------------------------------------------------------
# SOPS / NetworkPolicy / Alerting
#-----------------------------------------------------------------------------
sops:
  enabled: true
  ageRecipientSecretRef:
    name: tbite-sops-age
    key: pub

networkPolicy:
  enabled: true

alerting:
  enabled: true
  thresholds:
    poolSaturationPct: 80
    replicaLagSeconds: 30
    outboxAgeSeconds: 60
    sseConnPerPod: 2400
    fanoutLagSeconds: 5
