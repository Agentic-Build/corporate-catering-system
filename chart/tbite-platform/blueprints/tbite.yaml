# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
#
# T-Bite production Authentik blueprint. Loaded into the Authentik
# server pod at /blueprints/tbite.yaml via the chart's
# templates/configmap-authentik-blueprints.yaml ConfigMap. Authentik
# reconciles entries on change; reapplying the chart with a modified
# blueprint converges the OAuth provider, scope mappings, groups,
# and application without manual UI work.
#
# What this blueprint creates:
#
#   * Three role groups — employee, welfare_admin, vendor_operator —
#     used by the chart's RBAC mapping (Go config reads
#     AUTHENTIK_VENDOR_OPERATOR_GROUP and the api role assigns role
#     attributes from group membership).
#
#   * Two custom scope mappings — `email` and `tbite` — that emit the
#     claims the api role's OIDC verifier expects (email_verified;
#     tbite_role / tbite_employee_id / tbite_plant /
#     tbite_department / tbite_vendor_id).
#
#   * One OAuth2 provider named "T-Bite OIDC" bound to the `tbite`
#     application. redirect_uris are substituted at chart render
#     time from global.baseURL.api so the same blueprint works in
#     dev, staging, and prod without operator-side edits.
#
# Dev-only users live in blueprints/tbite-dev-users.yaml, opt-in via
# authentikBlueprints.devUsers.enabled.
version: 1
metadata:
  name: T-Bite OIDC
  labels:
    blueprints.goauthentik.io/instantiate: "true"

entries:
  - id: tbite-group-employee
    model: authentik_core.group
    state: present
    identifiers:
      name: tbite:role:employee
    attrs:
      attributes:
        tbite_role: employee

  - id: tbite-group-admin
    model: authentik_core.group
    state: present
    identifiers:
      name: tbite:role:welfare_admin
    attrs:
      attributes:
        tbite_role: welfare_admin

  - id: tbite-group-vendor-operator
    model: authentik_core.group
    state: present
    identifiers:
      name: tbite:role:vendor_operator
    attrs:
      attributes:
        tbite_role: vendor_operator

  - id: tbite-scope-email-verified
    model: authentik_providers_oauth2.scopemapping
    state: present
    identifiers:
      name: T-Bite email scope
    attrs:
      scope_name: email
      description: Email claim for T-Bite Authentik users.
      expression: |
        return {
            "email": request.user.email,
            "email_verified": True,
        }

  - id: tbite-scope-claims
    model: authentik_providers_oauth2.scopemapping
    state: present
    identifiers:
      name: T-Bite role claims
    attrs:
      scope_name: tbite
      description: T-Bite role and business identity claims.
      expression: |
        attrs = request.user.attributes or {}
        role = attrs.get("tbite_role", "")
        if role == "":
            if ak_is_group_member(request.user, name="tbite:role:welfare_admin"):
                role = "welfare_admin"
            elif ak_is_group_member(request.user, name="tbite:role:vendor_operator"):
                role = "vendor_operator"
            elif ak_is_group_member(request.user, name="tbite:role:employee"):
                role = "employee"
        return {
            "tbite_role": role,
            "tbite_employee_id": attrs.get("tbite_employee_id", ""),
            "tbite_plant": attrs.get("tbite_plant", ""),
            "tbite_department": attrs.get("tbite_department", ""),
            "tbite_vendor_id": attrs.get("tbite_vendor_id", ""),
        }

  - id: tbite-oauth-provider
    model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: T-Bite OIDC
    attrs:
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_type: confidential
      # Authentik 2026.5+ defaults grant_types to [] (no grants),
      # which makes the api role's authorization_code exchange
      # fail with "Invalid grant_type for provider". Enumerate
      # the two grants we use explicitly: authorization_code for
      # the SSR sign-in flow, refresh_token for session renewal.
      grant_types:
        - authorization_code
        - refresh_token
      client_id: tbite
      # Production client_secret should be rotated post-install via
      # the Authentik UI and the value persisted in the SOPS-encrypted
      # tbite-oidc-clients Secret (key: apiClientSecret). The seed
      # value below allows the first install to complete the OIDC
      # handshake; rotate it on day one.
      client_secret: REPLACE-WITH-SOPS-ENCRYPTED-VALUE
      include_claims_in_id_token: true
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      issuer_mode: per_provider
      sub_mode: user_uuid
      # redirect_uris are substituted by the chart at render time from
      # global.baseURL.api (see templates/configmap-authentik-blueprints.yaml).
      redirect_uris:
        - matching_mode: strict
          url: "{{ TBITE_REDIRECT_URI_AUTHENTIK }}"
        - matching_mode: strict
          url: "{{ TBITE_REDIRECT_URI_OAUTH }}"
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
        - !KeyOf tbite-scope-email-verified
        - !KeyOf tbite-scope-claims

  - id: tbite-application
    model: authentik_core.application
    state: present
    identifiers:
      slug: tbite
    attrs:
      name: T-Bite
      provider: !KeyOf tbite-oauth-provider
      meta_description: T-Bite corporate catering platform.
      policy_engine_mode: all
