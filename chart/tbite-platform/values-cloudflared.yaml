# tbite-platform — Cloudflare Tunnel overlay.
#
# Apply ON TOP of the default values.yaml when public traffic enters
# the cluster through a Cloudflare Tunnel rather than a cluster-local
# Gateway API LoadBalancer + Let's Encrypt:
#
#   helm install tbite chart/tbite-platform \
#     -f chart/tbite-platform/values.yaml \
#     -f chart/tbite-platform/values-cloudflared.yaml
#
# The tunnel itself is created in the Cloudflare Zero Trust dashboard
# (Networks → Tunnels → Create a tunnel → Cloudflared connector). The
# generated token is the only credential the chart needs; encrypt it
# into a SOPS Secret named `tbite-cloudflared` (key `token`). Public-
# hostname → in-cluster-Service mapping is also configured in the
# dashboard under Public Hostnames; Cloudflare auto-creates the DNS
# CNAMEs the moment each hostname is added.
#
# Stackable with values-prod-ha.yaml when multi-AZ HA + Cloudflare
# exposure are both required:
#
#   helm install tbite chart/tbite-platform \
#     -f chart/tbite-platform/values.yaml \
#     -f chart/tbite-platform/values-prod-ha.yaml \
#     -f chart/tbite-platform/values-cloudflared.yaml
#
# Architectural caveat: Cloudflare Tunnel is an opt-in deviation from
# ADR-0006's air-gapped-baseline product requirement. Operators choose
# this overlay when their deployment shape accepts an external vendor
# on the public data path (public-internet, multi-tenant SaaS, or
# non-regulated workloads). For on-prem / air-gapped enterprise
# installs, leave this overlay off and use the default Gateway API +
# cert-manager path.

#-----------------------------------------------------------------------------
# Enable the cloudflared workload.
#-----------------------------------------------------------------------------
cloudflared:
  enabled: true
  tunnel:
    tokenSecretRef:
      name: tbite-cloudflared
      key: token

#-----------------------------------------------------------------------------
# Disable the Traefik + cert-manager + Gateway API path. Cloudflare
# terminates TLS at its edge; the in-cluster path is plain HTTP from
# cloudflared to each role's Service. The Gateway resource and every
# HTTPRoute / Middleware / Certificate / Issuer / ClusterIssuer in
# templates/ becomes inert when these flags flip — the templates
# themselves still ship for operators that may want to re-enable
# the canonical path later without re-rendering.
#-----------------------------------------------------------------------------
traefik:
  enabled: false

certManager:
  enabled: false

ingress:
  gateway:
    enabled: false
  certManager:
    enabled: false

#-----------------------------------------------------------------------------
# Application baseURLs default to https:// in values.yaml because the
# Gateway API path terminates TLS. Cloudflare also terminates TLS so
# the public URLs keep their https:// scheme; no override needed
# here. The realtime gateway's SSE timeout is already 1h in the chart
# default; Cloudflare proxy enforces a 100s edge timeout which the
# realtime handler's 20s heartbeat absorbs.
#-----------------------------------------------------------------------------

#-----------------------------------------------------------------------------
# MinIO public URL for the Cloudflare Tunnel deployment.
#
# Add a Public Hostname route in the Cloudflare Zero Trust dashboard:
#   Hostname:  files-<slug>-tbite.takalawang.dev  (or files.<domain>)
#   Service:   http://minio.<namespace>.svc.cluster.local:9000
#
# Then override S3_PUBLIC_BASE_URL so the API generates URLs browsers
# can reach without going through the in-cluster endpoint.
# NOTE: deploying to the live CD box is a separate manual step; this
# config change only updates the chart — ArgoCD will apply it on next sync.
#-----------------------------------------------------------------------------
global:
  s3:
    # Override in your site-specific values file once the tunnel hostname is known.
    publicBaseURL: "https://files-tbite.takalawang.dev"

hooks:
  bucketBootstrap:
    # Set bucket to public-read so browsers can fetch images directly
    # via the Cloudflare Tunnel MinIO hostname without authentication.
    policy: "download"
