{{- if .Values.cloudflared.enabled }}
{{- /*
Cloudflare Tunnel ingress map. cloudflared runs as a Deployment with
no Service exposure of its own — it dials out to Cloudflare's edge
over a long-lived HTTPS connection and proxies inbound requests
(routed via Cloudflare's network) to the in-cluster Services listed
below.

The ingress list is computed from chart values so the same routes
that the Gateway API renders when Cloudflare is off (api, three web
SSRs, realtime SSE, Grafana) are mirrored into cloudflared. Two
extras are first-class: ArgoCD (cross-namespace by default) and any
operator-supplied additional routes (cloudflared.ingress.extra).

When this map is in use, traefik/cert-manager/ingress.gateway are
typically disabled — TLS terminates at Cloudflare's edge and the
in-cluster traffic is plain HTTP. The chart still ships the
Gateway/HTTPRoute templates so an operator can flip
ingress.gateway.enabled back on without re-rendering this map.
*/ -}}
{{- $g := .Values.global }}
{{- $tunnel := .Values.cloudflared.tunnel }}
{{- $extras := default (list) .Values.cloudflared.ingress.extra }}
{{- $argocd := .Values.cloudflared.ingress.argocd }}
{{- $grafanaHost := default (printf "grafana.%s" $g.domain) .Values.observability.grafana.ingressHost }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tbite.fullname" . }}-cloudflared
  namespace: {{ include "tbite.namespace" . }}
  labels:
    {{- include "tbite.labels" . | nindent 4 }}
    app.kubernetes.io/component: cloudflared
data:
  config.yaml: |
    tunnel: {{ $tunnel.id | quote }}
    {{- if $tunnel.credentialsFile }}
    credentials-file: {{ $tunnel.credentialsFile | quote }}
    {{- end }}
    metrics: 0.0.0.0:2000
    no-autoupdate: true
    ingress:
      {{- if .Values.api.enabled }}
      - hostname: {{ urlParse $g.baseURL.api | dig "host" "" | quote }}
        service: http://{{ include "tbite.fullname" . }}-api.{{ include "tbite.namespace" . }}.svc.cluster.local:{{ .Values.api.port }}
      {{- end }}
      {{- if .Values.realtime.enabled }}
      - hostname: {{ default (printf "rt.%s" $g.domain) (dig "ingress" "host" "" .Values.realtime) | quote }}
        service: http://{{ include "tbite.fullname" . }}-realtime.{{ include "tbite.namespace" . }}.svc.cluster.local:{{ .Values.realtime.port }}
        # SSE: disable TCP keepalive timeout that would close idle
        # connections; rely on the application's own 20s heartbeat.
        originRequest:
          noTLSVerify: true
          connectTimeout: 30s
          disableChunkedEncoding: false
      {{- end }}
      {{- if .Values.web.employee.enabled }}
      - hostname: {{ urlParse $g.baseURL.employee | dig "host" "" | quote }}
        service: http://{{ include "tbite.fullname" . }}-web-employee.{{ include "tbite.namespace" . }}.svc.cluster.local:{{ .Values.web.employee.port }}
      {{- end }}
      {{- if .Values.web.merchant.enabled }}
      - hostname: {{ urlParse $g.baseURL.merchant | dig "host" "" | quote }}
        service: http://{{ include "tbite.fullname" . }}-web-merchant.{{ include "tbite.namespace" . }}.svc.cluster.local:{{ .Values.web.merchant.port }}
      {{- end }}
      {{- if .Values.web.admin.enabled }}
      - hostname: {{ urlParse $g.baseURL.admin | dig "host" "" | quote }}
        service: http://{{ include "tbite.fullname" . }}-web-admin.{{ include "tbite.namespace" . }}.svc.cluster.local:{{ .Values.web.admin.port }}
      {{- end }}
      {{- if .Values.authentik.enabled }}
      - hostname: {{ default (printf "auth.%s" $g.domain) (dig "ingress" "host" "" .Values.authentik) | quote }}
        service: http://{{ .Release.Name }}-authentik-server.{{ include "tbite.namespace" . }}.svc.cluster.local:80
      {{- end }}
      {{- if .Values.hydra.enabled }}
      - hostname: {{ default (printf "hydra.%s" $g.domain) .Values.hydra.ingressHost | quote }}
        service: http://{{ .Release.Name }}-hydra-public.{{ include "tbite.namespace" . }}.svc.cluster.local:4444
      {{- end }}
      {{- if and .Values.observability.grafana.enabled .Values.observability.victoriaMetrics.enabled }}
      - hostname: {{ $grafanaHost | quote }}
        service: http://{{ .Release.Name }}-grafana.{{ include "tbite.namespace" . }}.svc.cluster.local:80
      {{- end }}
      {{- if $argocd.enabled }}
      - hostname: {{ $argocd.host | quote }}
        service: {{ $argocd.serviceURL | quote }}
        originRequest:
          noTLSVerify: true
      {{- end }}
      {{- range $extras }}
      - hostname: {{ .hostname | quote }}
        service: {{ .service | quote }}
      {{- end }}
      # Catch-all: required by cloudflared; rejects unmatched
      # hostnames with HTTP 404 rather than proxying to a default.
      - service: http_status:404
{{- end }}
