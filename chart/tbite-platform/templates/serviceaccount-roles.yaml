{{- $ctx := . -}}
{{- $roles := list -}}
{{- if .Values.api.enabled }}{{- $roles = append $roles "api" -}}{{- end -}}
{{- if .Values.realtime.enabled }}{{- $roles = append $roles "realtime" -}}{{- end -}}
{{- if .Values.web.employee.enabled }}{{- $roles = append $roles "web-employee" -}}{{- end -}}
{{- if .Values.web.merchant.enabled }}{{- $roles = append $roles "web-merchant" -}}{{- end -}}
{{- if .Values.web.admin.enabled }}{{- $roles = append $roles "web-admin" -}}{{- end -}}
{{- if .Values.workers.outboxRelay.enabled }}{{- $roles = append $roles "worker-outbox-relay" -}}{{- end -}}
{{- if .Values.workers.payrollSettler.enabled }}{{- $roles = append $roles "worker-payroll-settler" -}}{{- end -}}
{{- if .Values.workers.onTimeEvaluator.enabled }}{{- $roles = append $roles "worker-on-time-evaluator" -}}{{- end -}}
{{- if .Values.scheduler.cutoffSweeper.enabled }}{{- $roles = append $roles "scheduler-cutoff" -}}{{- end -}}
{{- if .Values.scheduler.noShowSweeper.enabled }}{{- $roles = append $roles "scheduler-no-show" -}}{{- end -}}
{{- if .Values.scheduler.documentExpiryScanner.enabled }}{{- $roles = append $roles "scheduler-doc-expiry" -}}{{- end -}}
{{- if .Values.scheduler.feedbackScanner.enabled }}{{- $roles = append $roles "scheduler-feedback" -}}{{- end -}}
{{- range $role := $roles }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tbite.roleFullname" (dict "ctx" $ctx "role" $role) }}
  namespace: {{ include "tbite.namespace" $ctx }}
  labels:
    {{- include "tbite.roleLabels" (dict "ctx" $ctx "role" $role) | nindent 4 }}
  {{- with $ctx.Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
{{- end }}
