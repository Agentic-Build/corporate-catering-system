{{- if and .Values.api.enabled .Values.api.hpa.enabled }}
{{- $role := "api" -}}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "tbite.roleFullname" (dict "ctx" . "role" $role) }}
  namespace: {{ include "tbite.namespace" . }}
  labels:
    {{- include "tbite.roleLabels" (dict "ctx" . "role" $role) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "tbite.roleFullname" (dict "ctx" . "role" $role) }}
  minReplicas: {{ .Values.api.hpa.minReplicas }}
  maxReplicas: {{ .Values.api.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.api.hpa.targetCPUUtilizationPercentage }}
    {{- if .Values.api.hpa.customMetrics.enabled }}
    - type: Pods
      pods:
        metric:
          name: tbite_api_inflight_requests
        target:
          type: AverageValue
          averageValue: {{ .Values.api.hpa.targetConcurrency | quote }}
    - type: Pods
      pods:
        metric:
          name: tbite_api_requests_per_second
        target:
          type: AverageValue
          averageValue: {{ .Values.api.hpa.targetRPS | quote }}
    {{- end }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max
{{- end }}
