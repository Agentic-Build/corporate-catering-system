{{- if .Values.crdsReady -}}
{{- if and .Values.observability.victoriaMetrics.enabled .Values.alerting.enabled }}
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: {{ include "tbite.fullname" . }}-platform
  namespace: {{ include "tbite.namespace" . }}
  labels:
    {{- include "tbite.labels" . | nindent 4 }}
    app.kubernetes.io/component: alerts
spec:
  groups:
    - name: tbite.platform
      interval: 30s
      rules:
        - alert: TbiteDbPoolSaturation
          expr: |
            max by (pod) (
              tbite_db_pool_acquired_connections / tbite_db_pool_max_connections
            ) * 100 > {{ .Values.alerting.thresholds.poolSaturationPct }}
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Postgres pool saturation > {{ .Values.alerting.thresholds.poolSaturationPct }}%"
            description: "Pod {{ "{{" }} $labels.pod {{ "}}" }} has been above {{ .Values.alerting.thresholds.poolSaturationPct }}% pool saturation for 5m."
        - alert: TbitePgReplicaLagHigh
          expr: |
            max(cnpg_pg_replication_lag_seconds) > {{ .Values.alerting.thresholds.replicaLagSeconds }}
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Postgres replica lag > {{ .Values.alerting.thresholds.replicaLagSeconds }}s"
        - alert: TbiteOutboxAgeHigh
          expr: |
            max(tbite_outbox_oldest_unpublished_age_seconds) > {{ .Values.alerting.thresholds.outboxAgeSeconds }}
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Outbox oldest unpublished age > {{ .Values.alerting.thresholds.outboxAgeSeconds }}s"
        - alert: TbiteSseConnectionsPerPodHigh
          expr: |
            max(tbite_realtime_active_sse_connections) > {{ .Values.alerting.thresholds.sseConnPerPod }}
          for: 5m
          labels:
            severity: info
          annotations:
            summary: "An SSE pod exceeds {{ .Values.alerting.thresholds.sseConnPerPod }} active connections"
        - alert: TbiteRealtimeFanoutLagHigh
          expr: |
            max(tbite_realtime_fanout_lag_seconds) > {{ .Values.alerting.thresholds.fanoutLagSeconds }}
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Realtime fanout lag > {{ .Values.alerting.thresholds.fanoutLagSeconds }}s"
        - alert: TbiteJetStreamConsumerLagHigh
          expr: |
            max by (stream, consumer) (
              nats_consumer_num_pending
            ) > 1000
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "JetStream consumer pending > 1000"
{{- end }}

{{- end -}}
