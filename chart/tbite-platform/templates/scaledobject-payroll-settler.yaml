{{- if .Values.crdsReady -}}
{{- $cfg := .Values.workers.payrollSettler -}}
{{- if and $cfg.enabled $cfg.keda.enabled .Values.keda.enabled }}
{{- $role := "worker-payroll-settler" -}}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "tbite.roleFullname" (dict "ctx" . "role" $role) }}
  namespace: {{ include "tbite.namespace" . }}
  labels:
    {{- include "tbite.roleLabels" (dict "ctx" . "role" $role) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "tbite.roleFullname" (dict "ctx" . "role" $role) }}
  pollingInterval: {{ $cfg.keda.pollingInterval }}
  cooldownPeriod: {{ $cfg.keda.cooldownPeriod }}
  minReplicaCount: {{ $cfg.keda.minReplicas }}
  maxReplicaCount: {{ $cfg.keda.maxReplicas }}
  {{- with $cfg.keda.hpaBehavior }}
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
{{- toYaml . | nindent 8 }}
  {{- end }}
  triggers:
    - type: nats-jetstream
      metadata:
        natsServerMonitoringEndpoint: {{ printf "%s-nats-headless.%s.svc.cluster.local:8222" .Release.Name (include "tbite.namespace" .) | quote }}
        account: "$G"
        stream: {{ $cfg.keda.stream | quote }}
        consumer: {{ $cfg.keda.consumer | quote }}
        lagThreshold: {{ $cfg.keda.lagThreshold | quote }}
{{- end }}

{{- end -}}
