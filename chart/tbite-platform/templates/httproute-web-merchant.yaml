{{- $cfg := .Values.web.merchant -}}
{{- if and $cfg.enabled $cfg.ingress.enabled .Values.ingress.gateway.enabled }}
{{- $role := "web-merchant" -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "tbite.roleFullname" (dict "ctx" . "role" $role) }}
  namespace: {{ include "tbite.namespace" . }}
  labels:
    {{- include "tbite.roleLabels" (dict "ctx" . "role" $role) | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.ingress.gateway.name }}
      sectionName: https
  hostnames:
    - {{ $cfg.ingress.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "tbite.roleFullname" (dict "ctx" . "role" $role) }}
          port: 80
      timeouts:
        request: 30s
{{- end }}
