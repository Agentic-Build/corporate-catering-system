{{- if .Values.crdsReady -}}
{{- if and .Values.ingress.certManager.enabled (eq .Values.ingress.certManager.issuer.kind "ClusterIssuer") }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.ingress.certManager.issuer.name }}
  labels:
    {{- include "tbite.labels" . | nindent 4 }}
spec:
  acme:
    email: {{ .Values.ingress.certManager.issuer.email | quote }}
    server: {{ .Values.ingress.certManager.issuer.server | quote }}
    privateKeySecretRef:
      name: {{ printf "%s-acme-key" .Values.ingress.certManager.issuer.name }}
    solvers:
      {{- if eq .Values.ingress.certManager.issuer.solver "http01" }}
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: {{ .Values.ingress.gateway.name }}
                namespace: {{ include "tbite.namespace" . }}
                kind: Gateway
      {{- else if eq .Values.ingress.certManager.issuer.solver "dns01" }}
      - dns01:
          # Operator-supplied DNS-01 provider config goes here via override.
          {}
      {{- end }}
{{- end }}

{{- end -}}
