apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tbite.fullname" . }}-app-env
  namespace: {{ include "tbite.namespace" . }}
  labels:
    {{- include "tbite.labels" . | nindent 4 }}
data:
  # Native env-var names consumed by services/api/internal/config.
  # Values that originate from secrets are wired via envFromSecrets
  # in each role's Deployment (DATABASE_RW_URL, DATABASE_RO_URL,
  # AUTHENTIK_API_TOKEN, S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY,
  # OIDC client_secret values).
  NATS_URL: {{ .Values.global.nats.url | quote }}
  REDIS_URL: {{ .Values.global.redisURL | quote }}
  S3_ENDPOINT: {{ .Values.global.s3.endpoint | quote }}
  S3_REGION: {{ .Values.global.s3.region | quote }}
  S3_BUCKET: {{ .Values.global.s3.bucket | quote }}
  S3_USE_PATH_STYLE: {{ .Values.global.s3.usePathStyle | quote }}
  OIDC_CALLBACK_BASE_URL: {{ .Values.global.baseURL.api | quote }}
  AUTHENTIK_BASE_URL: {{ .Values.global.authentik.baseURL | quote }}
  AUTHENTIK_VENDOR_OPERATOR_GROUP: {{ .Values.global.authentik.vendorOperatorGroup | quote }}
  AUTH_PROVIDER_SLUGS: {{ .Values.global.authentik.providerSlugs | quote }}
  APP_BASE_URL_EMPLOYEE: {{ .Values.global.baseURL.employee | quote }}
  APP_BASE_URL_MERCHANT: {{ .Values.global.baseURL.merchant | quote }}
  APP_BASE_URL_ADMIN: {{ .Values.global.baseURL.admin | quote }}
  DB_MAX_CONNS: {{ .Values.api.database.maxConns | quote }}
  DB_MAX_CONNS_RO: {{ .Values.api.database.maxConnsRO | quote }}
  # TBITE_* mirrors of the same values for SSR/MCP roles that may
  # want a namespaced view.
  TBITE_PROFILE: {{ .Values.profile.size | quote }}
  TBITE_DOMAIN: {{ .Values.global.domain | quote }}
  TBITE_REALTIME_TOPIC_SCOPE: {{ .Values.realtime.topicScope | quote }}
  TBITE_REALTIME_SSE_IDLE_TIMEOUT: {{ .Values.realtime.sseIdleTimeout | quote }}
{{- if .Values.observability.otelCollector.enabled }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ printf "http://%s" (include "tbite.otelCollectorEndpoint" .) | quote }}
  OTEL_EXPORTER_OTLP_PROTOCOL: {{ .Values.otel.exporterProtocol | quote }}
  OTEL_SERVICE_NAMESPACE: {{ .Values.otel.serviceNamespace | quote }}
{{- end }}
