{{- if .Values.cloudflared.enabled }}
{{- /*
cloudflared Deployment — outbound-only connector that dials out to
Cloudflare's edge over QUIC/HTTPS and proxies inbound requests routed
via the named tunnel into in-cluster Services. Multiple replicas
attach to the same tunnel for high-availability (Cloudflare
load-balances across active connections).

This template uses the **remote-managed tunnel** model (Cloudflare's
modern recommended path):

  * Operator creates the tunnel in the Cloudflare Zero Trust
    dashboard (Networks → Tunnels → Create a tunnel → Cloudflared
    connector) and copies the generated token into a SOPS-encrypted
    Secret. The token encodes the tunnel id, account id, and the
    rotating tunnel secret — cloudflared needs nothing else to dial
    home.
  * Operator defines the public-hostname → in-cluster-Service map in
    the same dashboard (Tunnels → <tunnel> → Public Hostnames). DNS
    CNAMEs are created automatically by Cloudflare; ingress rules
    live in Cloudflare, not in a chart-rendered ConfigMap.
  * cloudflared in the cluster runs `tunnel run --token $TUNNEL_TOKEN`
    — no local config.yaml, no credentials file, no `cloudflared
    tunnel route dns` CLI calls.

See docs/deployment/k3s-cloudflare-tsmc.md for the full operator
walkthrough and the public-hostname routing table the operator pastes
into the dashboard.
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tbite.fullname" . }}-cloudflared
  namespace: {{ include "tbite.namespace" . }}
  labels:
    {{- include "tbite.labels" . | nindent 4 }}
    app.kubernetes.io/component: cloudflared
spec:
  replicas: {{ .Values.cloudflared.replicaCount }}
  selector:
    matchLabels:
      {{- include "tbite.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: cloudflared
  template:
    metadata:
      labels:
        {{- include "tbite.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: cloudflared
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containers:
        - name: cloudflared
          image: "{{ .Values.cloudflared.image.repository }}:{{ .Values.cloudflared.image.tag }}"
          imagePullPolicy: {{ .Values.cloudflared.image.pullPolicy }}
          args:
            - tunnel
            - --no-autoupdate
            - --metrics
            - 0.0.0.0:2000
            - run
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cloudflared.tunnel.tokenSecretRef.name | quote }}
                  key:  {{ .Values.cloudflared.tunnel.tokenSecretRef.key | quote }}
          ports:
            - name: metrics
              containerPort: 2000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.cloudflared.resources | nindent 12 }}
{{- end }}
