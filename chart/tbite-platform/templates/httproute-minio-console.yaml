{{- if and .Values.minio.enabled .Values.minio.tenant.enabled .Values.ingress.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "tbite.fullname" . }}-minio-console
  namespace: {{ include "tbite.namespace" . }}
  labels:
    {{- include "tbite.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio-console
spec:
  parentRefs:
    - name: {{ .Values.ingress.gateway.name }}
      sectionName: https
  hostnames:
    - {{ printf "minio.%s" .Values.global.domain | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: tbite-console # MinIO tenant subchart creates this Service
          port: 9090
      timeouts:
        request: 30s
{{- end }}
