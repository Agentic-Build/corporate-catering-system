{{- if and .Values.realtime.enabled .Values.realtime.ingress.enabled .Values.ingress.gateway.enabled }}
{{- $role := "realtime" -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "tbite.roleFullname" (dict "ctx" . "role" $role) }}
  namespace: {{ include "tbite.namespace" . }}
  labels:
    {{- include "tbite.roleLabels" (dict "ctx" . "role" $role) | nindent 4 }}
  annotations:
    # Force Traefik to disable response buffering and use long timeouts for SSE.
    traefik.ingress.kubernetes.io/router.middlewares: {{ printf "%s-%s-sse-passthrough@kubernetescrd" (include "tbite.namespace" .) (include "tbite.fullname" .) | quote }}
spec:
  parentRefs:
    - name: {{ .Values.ingress.gateway.name }}
      sectionName: https
  hostnames:
    - {{ .Values.realtime.ingress.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "tbite.roleFullname" (dict "ctx" . "role" $role) }}
          port: 80
      timeouts:
        request: 0s          # streaming — no overall request timeout
        backendRequest: 3600s
{{- end }}
