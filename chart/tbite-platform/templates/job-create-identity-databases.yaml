{{- if and .Values.hooks.createIdentityDatabases.enabled (or .Values.authentik.enabled .Values.hydra.enabled) (not .Values.postgres.byo.enabled) }}
{{- /*
Bootstraps `authentik` and `hydra` databases (and their roles)
inside the main CNPG Cluster so the two identity subcharts can
share the same Postgres rather than bringing up their own. Runs as
a Helm post-install / post-upgrade hook (after CNPG has elected a
primary). Idempotent.

Reuses the CNPG-generated superuser secret named `<cluster>-superuser`.
*/ -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "tbite.fullname" . }}-identity-db-init
  namespace: {{ include "tbite.namespace" . }}
  labels:
    {{- include "tbite.labels" . | nindent 4 }}
    app.kubernetes.io/component: identity-db-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "tbite.labels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      containers:
        - name: psql
          image: {{ .Values.postgres.cluster.imageName | quote }}
          env:
            - name: PGHOST
              value: {{ printf "%s-rw.%s.svc.cluster.local" .Values.postgres.cluster.name (include "tbite.namespace" .) | quote }}
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-superuser" .Values.postgres.cluster.name | quote }}
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-superuser" .Values.postgres.cluster.name | quote }}
                  key: password
            {{- if .Values.authentik.enabled }}
            - name: AUTHENTIK_POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.authentik.authentik.existingSecret.secretName | quote }}
                  key: AUTHENTIK_POSTGRESQL__PASSWORD
            {{- end }}
            {{- if .Values.hydra.enabled }}
            - name: HYDRA_POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.hydra.database.passwordSecretRef.name | quote }}
                  key: {{ .Values.hydra.database.passwordSecretRef.key | quote }}
            {{- end }}
          command:
            - /bin/sh
            - -ec
            - |
              {{- if .Values.authentik.enabled }}
              psql -v ON_ERROR_STOP=1 -v authentik_password="$AUTHENTIK_POSTGRESQL_PASSWORD" -d postgres <<'SQL'
              SELECT format('CREATE ROLE authentik LOGIN PASSWORD %L', :'authentik_password')
              WHERE NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'authentik') \gexec
              SQL
              psql -v ON_ERROR_STOP=1 -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='authentik'" | grep -q 1 || \
                psql -v ON_ERROR_STOP=1 -d postgres -c "CREATE DATABASE authentik OWNER authentik;"
              {{- end }}
              {{- if .Values.hydra.enabled }}
              psql -v ON_ERROR_STOP=1 -v hydra_password="$HYDRA_POSTGRESQL_PASSWORD" -d postgres <<'SQL'
              SELECT format('CREATE ROLE hydra LOGIN PASSWORD %L', :'hydra_password')
              WHERE NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'hydra') \gexec
              SQL
              psql -v ON_ERROR_STOP=1 -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='hydra'" | grep -q 1 || \
                psql -v ON_ERROR_STOP=1 -d postgres -c "CREATE DATABASE hydra OWNER hydra;"
              {{- end }}
              echo "identity databases provisioned"
          resources:
            requests: { cpu: 50m, memory: 64Mi, ephemeral-storage: 64Mi }
            limits:   { cpu: 200m, memory: 192Mi, ephemeral-storage: 256Mi }
{{- end }}
