{{- if and .Values.authentik.enabled .Values.authentikBootstrap.enabled }}
{{- /*
Authentik picks up AUTHENTIK_BOOTSTRAP_PASSWORD and
AUTHENTIK_BOOTSTRAP_TOKEN from process env on first boot and sets the
default akadmin account accordingly. The Authentik subchart's
envFrom block (set in values.yaml under authentik.envFrom) mounts
this Secret into both the server and worker pods.

Operators that prefer to manage the bootstrap secret themselves can
set authentikBootstrap.enabled=false and supply a Secret with the
same name + keys out-of-band (typically via SOPS in the same
GitOps repo).
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tbite.fullname" . }}-authentik-bootstrap
  namespace: {{ include "tbite.namespace" . }}
  labels:
    {{- include "tbite.labels" . | nindent 4 }}
    app.kubernetes.io/component: authentik-bootstrap
type: Opaque
stringData:
  AUTHENTIK_BOOTSTRAP_PASSWORD: {{ .Values.authentikBootstrap.password | quote }}
  AUTHENTIK_BOOTSTRAP_TOKEN: {{ .Values.authentikBootstrap.apiToken | quote }}
  AUTHENTIK_BOOTSTRAP_EMAIL: {{ .Values.authentikBootstrap.email | quote }}
{{- end }}
