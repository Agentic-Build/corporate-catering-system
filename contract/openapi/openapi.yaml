components:
  parameters:
    CuisineFilterQuery:
      in: query
      name: cuisine
      required: false
      schema:
        maxLength: 32
        minLength: 2
        type: string
    FromDateQuery:
      in: query
      name: fromDate
      required: false
      schema:
        format: date
        type: string
    HealthTagFilterQuery:
      in: query
      name: healthTag
      required: false
      schema:
        $ref: '#/components/schemas/MenuHealthTag'
    MenuDateQuery:
      in: query
      name: menuDate
      required: true
      schema:
        format: date
        type: string
    MenuItemIdPath:
      in: path
      name: menuItemId
      required: true
      schema:
        pattern: ^menu-[a-z0-9]{8,32}$
        type: string
    MenuSortByQuery:
      in: query
      name: sortBy
      required: false
      schema:
        $ref: '#/components/schemas/MenuSortField'
    OrderIdPath:
      in: path
      name: orderId
      required: true
      schema:
        pattern: ^ord-[a-z0-9]{8,32}$
        type: string
    OrderStatusFilterQuery:
      in: query
      name: status
      required: false
      schema:
        $ref: '#/components/schemas/EmployeeOrderStatus'
    PageQuery:
      in: query
      name: page
      required: false
      schema:
        default: 1
        minimum: 1
        type: integer
    PageSizeQuery:
      in: query
      name: pageSize
      required: false
      schema:
        default: 20
        maximum: 200
        minimum: 1
        type: integer
    PayPeriodQuery:
      in: query
      name: payPeriod
      required: true
      schema:
        examples:
        - 2026-04
        pattern: ^[0-9]{4}-[0-9]{2}$
        type: string
    PayrollSortByQuery:
      in: query
      name: sortBy
      required: false
      schema:
        $ref: '#/components/schemas/PayrollSortField'
    PlantIdQuery:
      description: Target plant for scoping.
      in: query
      name: plantId
      required: true
      schema:
        $ref: '#/components/schemas/PlantId'
    SortOrderQuery:
      in: query
      name: sortOrder
      required: false
      schema:
        $ref: '#/components/schemas/SortOrder'
    ToDateQuery:
      in: query
      name: toDate
      required: false
      schema:
        format: date
        type: string
    VendorIdPath:
      in: path
      name: vendorId
      required: true
      schema:
        pattern: ^ven-[a-z0-9]{8,32}$
        type: string
    VendorOrderSortByQuery:
      in: query
      name: sortBy
      required: false
      schema:
        $ref: '#/components/schemas/VendorOrderSortField'
    VendorSortByQuery:
      in: query
      name: sortBy
      required: false
      schema:
        $ref: '#/components/schemas/VendorSortField'
    VendorStatusFilterQuery:
      in: query
      name: status
      required: false
      schema:
        $ref: '#/components/schemas/VendorStatus'
  responses:
    BadRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: Request payload or query is invalid.
    Conflict:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: Request conflicts with business constraints.
    Forbidden:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: Authenticated actor is not authorized to perform this operation.
    NotFound:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: Requested resource was not found.
    Unauthorized:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: Authentication token is missing or invalid.
    ValidationFailed:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: Request is syntactically valid but violates business validation rules.
  schemas:
    ActorId:
      pattern: ^[a-z0-9][a-z0-9-]{2,63}$
      type: string
    AdminVendorApprovalRequest:
      additionalProperties: false
      properties:
        comment:
          maxLength: 280
          minLength: 5
          type: string
        decision:
          enum:
          - APPROVED
          - REJECTED
          type: string
      required:
      - decision
      - comment
      type: object
    AuthenticationSource:
      enum:
      - CORPORATE_SSO
      - VENDOR_ACCOUNT_MFA
      type: string
    EmployeeOrder:
      additionalProperties: false
      properties:
        createdAt:
          format: date-time
          type: string
        deliveryDate:
          format: date
          type: string
        employeeActorId:
          $ref: '#/components/schemas/ActorId'
        lineItems:
          items:
            $ref: '#/components/schemas/OrderLineItem'
          minItems: 1
          type: array
        orderId:
          pattern: ^ord-[a-z0-9]{8,32}$
          type: string
        plantId:
          $ref: '#/components/schemas/PlantId'
        status:
          $ref: '#/components/schemas/EmployeeOrderStatus'
        total:
          $ref: '#/components/schemas/Money'
      required:
      - orderId
      - employeeActorId
      - plantId
      - deliveryDate
      - status
      - lineItems
      - total
      type: object
    EmployeeOrderCreateRequest:
      additionalProperties: false
      properties:
        deliveryDate:
          format: date
          type: string
        employeeNote:
          maxLength: 200
          type: string
        lineItems:
          items:
            $ref: '#/components/schemas/OrderLineItemRequest'
          maxItems: 10
          minItems: 1
          type: array
        plantId:
          $ref: '#/components/schemas/PlantId'
      required:
      - plantId
      - deliveryDate
      - lineItems
      type: object
    EmployeeOrderPatchRequest:
      additionalProperties: false
      properties:
        cancelReason:
          maxLength: 200
          minLength: 5
          type: string
        status:
          enum:
          - CANCELLED
          type: string
      required:
      - status
      type: object
    EmployeeOrderStatus:
      enum:
      - PENDING
      - CONFIRMED
      - CANCELLED
      - FULFILLED
      type: string
    ErrorCode:
      enum:
      - BAD_REQUEST
      - UNAUTHORIZED
      - FORBIDDEN
      - NOT_FOUND
      - CONFLICT
      - VALIDATION_FAILED
      type: string
    ErrorDetail:
      additionalProperties: false
      properties:
        field:
          maxLength: 128
          minLength: 1
          type: string
        reason:
          maxLength: 280
          minLength: 1
          type: string
      required:
      - field
      - reason
      type: object
    ErrorResponse:
      additionalProperties: false
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        details:
          items:
            $ref: '#/components/schemas/ErrorDetail'
          type: array
        message:
          maxLength: 280
          minLength: 1
          type: string
        requestId:
          maxLength: 128
          minLength: 1
          type: string
      required:
      - code
      - message
      - requestId
      type: object
    MenuHealthTag:
      enum:
      - LOW_CALORIE
      - HIGH_PROTEIN
      - VEGETARIAN
      - VEGAN
      - GLUTEN_FREE
      type: string
    MenuListItem:
      additionalProperties: false
      properties:
        cuisine:
          maxLength: 32
          minLength: 2
          type: string
        deliverablePlantIds:
          items:
            $ref: '#/components/schemas/PlantId'
          minItems: 1
          type: array
          uniqueItems: true
        deliveryDate:
          format: date
          type: string
        description:
          maxLength: 280
          type: string
        healthTags:
          items:
            $ref: '#/components/schemas/MenuHealthTag'
          type: array
          uniqueItems: true
        menuItemId:
          pattern: ^menu-[a-z0-9]{8,32}$
          type: string
        name:
          maxLength: 80
          minLength: 1
          type: string
        price:
          $ref: '#/components/schemas/Money'
        remainingQuantity:
          maximum: 2000
          minimum: 0
          type: integer
        vendorId:
          pattern: ^ven-[a-z0-9]{8,32}$
          type: string
      required:
      - menuItemId
      - vendorId
      - name
      - price
      - remainingQuantity
      - deliveryDate
      - deliverablePlantIds
      - healthTags
      type: object
    MenuPage:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: '#/components/schemas/MenuListItem'
          type: array
        page:
          $ref: '#/components/schemas/PageMeta'
      required:
      - items
      - page
      type: object
    MenuSortField:
      enum:
      - name
      - priceMinor
      - remainingQuantity
      - deliveryDate
      type: string
    Money:
      additionalProperties: false
      properties:
        amountMinor:
          minimum: 0
          type: integer
        currency:
          examples:
          - TWD
          pattern: ^[A-Z]{3}$
          type: string
      required:
      - currency
      - amountMinor
      type: object
    OrderLineItem:
      additionalProperties: false
      properties:
        menuItemId:
          pattern: ^menu-[a-z0-9]{8,32}$
          type: string
        pricePerUnit:
          $ref: '#/components/schemas/Money'
        quantity:
          maximum: 20
          minimum: 1
          type: integer
      required:
      - menuItemId
      - quantity
      - pricePerUnit
      type: object
    OrderLineItemRequest:
      additionalProperties: false
      properties:
        menuItemId:
          pattern: ^menu-[a-z0-9]{8,32}$
          type: string
        note:
          maxLength: 120
          type: string
        quantity:
          maximum: 20
          minimum: 1
          type: integer
      required:
      - menuItemId
      - quantity
      type: object
    PageMeta:
      additionalProperties: false
      properties:
        page:
          minimum: 1
          type: integer
        pageSize:
          maximum: 200
          minimum: 1
          type: integer
        totalItems:
          minimum: 0
          type: integer
        totalPages:
          minimum: 0
          type: integer
      required:
      - page
      - pageSize
      - totalItems
      - totalPages
      type: object
    PayrollDeductionPage:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: '#/components/schemas/PayrollDeductionRecord'
          type: array
        page:
          $ref: '#/components/schemas/PageMeta'
      required:
      - items
      - page
      type: object
    PayrollDeductionRecord:
      additionalProperties: false
      properties:
        amount:
          $ref: '#/components/schemas/Money'
        deliveryDate:
          format: date
          type: string
        employeeActorId:
          $ref: '#/components/schemas/ActorId'
        orderId:
          pattern: ^ord-[a-z0-9]{8,32}$
          type: string
        payPeriod:
          pattern: ^[0-9]{4}-[0-9]{2}$
          type: string
        status:
          enum:
          - READY
          - LOCKED
          - REFUNDED
          type: string
      required:
      - employeeActorId
      - orderId
      - deliveryDate
      - amount
      - payPeriod
      - status
      type: object
    PayrollSortField:
      enum:
      - employeeActorId
      - amountMinor
      - deliveryDate
      type: string
    PlantId:
      pattern: ^[a-z0-9][a-z0-9-]{1,31}$
      type: string
    Role:
      enum:
      - EMPLOYEE
      - VENDOR_OPERATOR
      - COMMITTEE_ADMIN
      - PAYROLL_OPERATOR
      type: string
    SortOrder:
      default: asc
      enum:
      - asc
      - desc
      type: string
    VendorEnrollment:
      additionalProperties: false
      properties:
        displayName:
          maxLength: 120
          minLength: 1
          type: string
        status:
          $ref: '#/components/schemas/VendorStatus'
        updatedAt:
          format: date-time
          type: string
        vendorId:
          pattern: ^ven-[a-z0-9]{8,32}$
          type: string
      required:
      - vendorId
      - displayName
      - status
      - updatedAt
      type: object
    VendorEnrollmentPage:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: '#/components/schemas/VendorEnrollment'
          type: array
        page:
          $ref: '#/components/schemas/PageMeta'
      required:
      - items
      - page
      type: object
    VendorMenuItem:
      additionalProperties: false
      properties:
        deliverablePlantIds:
          items:
            $ref: '#/components/schemas/PlantId'
          minItems: 1
          type: array
          uniqueItems: true
        deliveryDate:
          format: date
          type: string
        description:
          maxLength: 280
          minLength: 1
          type: string
        healthTags:
          items:
            $ref: '#/components/schemas/MenuHealthTag'
          type: array
          uniqueItems: true
        maxDailyQuantity:
          maximum: 2000
          minimum: 1
          type: integer
        menuItemId:
          pattern: ^menu-[a-z0-9]{8,32}$
          type: string
        name:
          maxLength: 80
          minLength: 1
          type: string
        price:
          $ref: '#/components/schemas/Money'
        vendorId:
          pattern: ^ven-[a-z0-9]{8,32}$
          type: string
      required:
      - menuItemId
      - vendorId
      - name
      - description
      - price
      - maxDailyQuantity
      - deliveryDate
      - deliverablePlantIds
      type: object
    VendorMenuItemUpsertRequest:
      additionalProperties: false
      properties:
        deliverablePlantIds:
          items:
            $ref: '#/components/schemas/PlantId'
          minItems: 1
          type: array
          uniqueItems: true
        deliveryDate:
          format: date
          type: string
        description:
          maxLength: 280
          minLength: 1
          type: string
        healthTags:
          items:
            $ref: '#/components/schemas/MenuHealthTag'
          type: array
          uniqueItems: true
        maxDailyQuantity:
          maximum: 2000
          minimum: 1
          type: integer
        name:
          maxLength: 80
          minLength: 1
          type: string
        price:
          $ref: '#/components/schemas/Money'
      required:
      - name
      - description
      - price
      - maxDailyQuantity
      - deliveryDate
      - deliverablePlantIds
      type: object
    VendorOrderBoardEntry:
      additionalProperties: false
      properties:
        deliveryDate:
          format: date
          type: string
        lineItems:
          items:
            $ref: '#/components/schemas/OrderLineItem'
          minItems: 1
          type: array
        orderId:
          pattern: ^ord-[a-z0-9]{8,32}$
          type: string
        plantId:
          $ref: '#/components/schemas/PlantId'
        status:
          $ref: '#/components/schemas/EmployeeOrderStatus'
      required:
      - orderId
      - plantId
      - deliveryDate
      - status
      - lineItems
      type: object
    VendorOrderPage:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: '#/components/schemas/VendorOrderBoardEntry'
          type: array
        page:
          $ref: '#/components/schemas/PageMeta'
      required:
      - items
      - page
      type: object
    VendorOrderSortField:
      enum:
      - deliveryDate
      - plantId
      - status
      - createdAt
      type: string
    VendorSortField:
      enum:
      - createdAt
      - status
      - displayName
      type: string
    VendorStatus:
      enum:
      - PENDING_REVIEW
      - APPROVED
      - REJECTED
      - SUSPENDED
      type: string
  securitySchemes:
    corporateSsoBearer:
      bearerFormat: JWT
      description: Corporate SSO issued bearer token.
      scheme: bearer
      type: http
      x-authentication-source: CORPORATE_SSO
    vendorMfaBearer:
      bearerFormat: JWT
      description: Vendor account token issued only after MFA challenge.
      scheme: bearer
      type: http
      x-authentication-source: VENDOR_ACCOUNT_MFA
info:
  description: Contract-first API definition for employee, vendor, admin, and integration APIs.
  summary: Canonical machine-verifiable HTTP contract
  title: Corporate Catering System API
  version: 1.0.0
jsonSchemaDialect: https://spec.openapis.org/oas/3.1/dialect/base
openapi: 3.1.0
paths:
  /api/v1/admin/vendors:
    get:
      operationId: listAdminVendors
      parameters:
      - $ref: '#/components/parameters/PageQuery'
      - $ref: '#/components/parameters/PageSizeQuery'
      - $ref: '#/components/parameters/VendorSortByQuery'
      - $ref: '#/components/parameters/SortOrderQuery'
      - $ref: '#/components/parameters/VendorStatusFilterQuery'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorEnrollmentPage'
          description: Paginated vendor enrollments
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
      - corporateSsoBearer: []
      summary: List vendor enrollments
      tags:
      - Admin
  /api/v1/admin/vendors/{vendorId}/approvals:
    post:
      operationId: approveVendorEnrollment
      parameters:
      - $ref: '#/components/parameters/VendorIdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminVendorApprovalRequest'
        required: true
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorEnrollment'
          description: Vendor enrollment decision accepted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
      security:
      - corporateSsoBearer: []
      summary: Approve or reject vendor enrollment
      tags:
      - Admin
  /api/v1/employee/menus:
    get:
      operationId: listEmployeeMenus
      parameters:
      - $ref: '#/components/parameters/PlantIdQuery'
      - $ref: '#/components/parameters/MenuDateQuery'
      - $ref: '#/components/parameters/PageQuery'
      - $ref: '#/components/parameters/PageSizeQuery'
      - $ref: '#/components/parameters/MenuSortByQuery'
      - $ref: '#/components/parameters/SortOrderQuery'
      - $ref: '#/components/parameters/CuisineFilterQuery'
      - $ref: '#/components/parameters/HealthTagFilterQuery'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuPage'
          description: Paginated menu list
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
      - corporateSsoBearer: []
      summary: List available menus
      tags:
      - Employee
  /api/v1/employee/orders:
    post:
      operationId: createEmployeeOrder
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeOrderCreateRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeOrder'
          description: Order created
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
      security:
      - corporateSsoBearer: []
      summary: Create a meal order
      tags:
      - Employee
  /api/v1/employee/orders/{orderId}:
    patch:
      operationId: updateEmployeeOrder
      parameters:
      - $ref: '#/components/parameters/OrderIdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeOrderPatchRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeOrder'
          description: Order updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
      security:
      - corporateSsoBearer: []
      summary: Modify an existing order before cutoff
      tags:
      - Employee
  /api/v1/integrations/payroll/deductions:
    get:
      operationId: exportPayrollDeductions
      parameters:
      - $ref: '#/components/parameters/PayPeriodQuery'
      - $ref: '#/components/parameters/PageQuery'
      - $ref: '#/components/parameters/PageSizeQuery'
      - $ref: '#/components/parameters/PayrollSortByQuery'
      - $ref: '#/components/parameters/SortOrderQuery'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayrollDeductionPage'
          description: Payroll deduction export page
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
      - corporateSsoBearer: []
      summary: Export payroll deduction records
      tags:
      - Integration
  /api/v1/vendor/menu-items/{menuItemId}:
    put:
      operationId: upsertVendorMenuItem
      parameters:
      - $ref: '#/components/parameters/MenuItemIdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VendorMenuItemUpsertRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorMenuItem'
          description: Menu item upserted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationFailed'
      security:
      - vendorMfaBearer: []
      summary: Create or update a vendor menu item
      tags:
      - Vendor
  /api/v1/vendor/orders:
    get:
      operationId: listVendorOrders
      parameters:
      - $ref: '#/components/parameters/PlantIdQuery'
      - $ref: '#/components/parameters/FromDateQuery'
      - $ref: '#/components/parameters/ToDateQuery'
      - $ref: '#/components/parameters/PageQuery'
      - $ref: '#/components/parameters/PageSizeQuery'
      - $ref: '#/components/parameters/VendorOrderSortByQuery'
      - $ref: '#/components/parameters/SortOrderQuery'
      - $ref: '#/components/parameters/OrderStatusFilterQuery'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorOrderPage'
          description: Paginated vendor order board
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
      - vendorMfaBearer: []
      summary: List vendor order board entries
      tags:
      - Vendor
servers:
- description: Production
  url: https://api.corporate-catering.example.com
tags:
- description: Employee ordering and menu access endpoints.
  name: Employee
- description: Vendor menu and fulfillment endpoints.
  name: Vendor
- description: Committee administrator governance endpoints.
  name: Admin
- description: Internal enterprise integration endpoints.
  name: Integration
