components:
    schemas:
        ApproveInputBody:
            additionalProperties: false
            properties:
                $schema:
                    description: A URL to the JSON Schema for this object.
                    examples:
                        - https://example.com/schemas/ApproveInputBody.json
                    format: uri
                    readOnly: true
                    type: string
                plants:
                    items:
                        type: string
                    type:
                        - array
                        - "null"
            required:
                - plants
            type: object
        CategoryDTO:
            additionalProperties: false
            properties:
                id:
                    type: string
                name:
                    type: string
                sort_order:
                    format: int64
                    type: integer
            required:
                - id
                - name
                - sort_order
            type: object
        CreateCategoryInputBody:
            additionalProperties: false
            properties:
                $schema:
                    description: A URL to the JSON Schema for this object.
                    examples:
                        - https://example.com/schemas/CreateCategoryInputBody.json
                    format: uri
                    readOnly: true
                    type: string
                name:
                    minLength: 1
                    type: string
                sort_order:
                    format: int64
                    type: integer
            required:
                - name
                - sort_order
            type: object
        CreateCategoryOutputBody:
            additionalProperties: false
            properties:
                $schema:
                    description: A URL to the JSON Schema for this object.
                    examples:
                        - https://example.com/schemas/CreateCategoryOutputBody.json
                    format: uri
                    readOnly: true
                    type: string
                category:
                    $ref: '#/components/schemas/CategoryDTO'
            required:
                - category
            type: object
        CreateItemInputBody:
            additionalProperties: false
            properties:
                $schema:
                    description: A URL to the JSON Schema for this object.
                    examples:
                        - https://example.com/schemas/CreateItemInputBody.json
                    format: uri
                    readOnly: true
                    type: string
                badges:
                    items:
                        type: string
                    type:
                        - array
                        - "null"
                category_id:
                    type: string
                description:
                    type: string
                name:
                    minLength: 1
                    type: string
                price_minor:
                    format: int64
                    minimum: 0
                    type: integer
                tags:
                    items:
                        type: string
                    type:
                        - array
                        - "null"
            required:
                - name
                - description
                - price_minor
                - tags
                - badges
            type: object
        CreateVendorInputBody:
            additionalProperties: false
            properties:
                $schema:
                    description: A URL to the JSON Schema for this object.
                    examples:
                        - https://example.com/schemas/CreateVendorInputBody.json
                    format: uri
                    readOnly: true
                    type: string
                contact_email:
                    format: email
                    type: string
                display_name:
                    minLength: 1
                    type: string
                legal_name:
                    minLength: 1
                    type: string
            required:
                - display_name
                - legal_name
                - contact_email
            type: object
        CreateVendorOutputBody:
            additionalProperties: false
            properties:
                $schema:
                    description: A URL to the JSON Schema for this object.
                    examples:
                        - https://example.com/schemas/CreateVendorOutputBody.json
                    format: uri
                    readOnly: true
                    type: string
                vendor:
                    $ref: '#/components/schemas/VendorDTO'
            required:
                - vendor
            type: object
        EmployeeMenuItemDTO:
            additionalProperties: false
            properties:
                badges:
                    items:
                        type: string
                    type:
                        - array
                        - "null"
                capacity:
                    format: int64
                    type: integer
                description:
                    type: string
                eta_label:
                    type: string
                id:
                    type: string
                images:
                    items:
                        type: string
                    type:
                        - array
                        - "null"
                name:
                    type: string
                pickup_window:
                    type: string
                price_minor:
                    format: int64
                    type: integer
                remain:
                    format: int64
                    type: integer
                sold_out:
                    type: boolean
                tags:
                    items:
                        type: string
                    type:
                        - array
                        - "null"
                vendor:
                    type: string
                vendor_id:
                    type: string
            required:
                - id
                - vendor
                - vendor_id
                - name
                - description
                - price_minor
                - tags
                - badges
                - remain
                - capacity
                - pickup_window
                - eta_label
                - sold_out
            type: object
        ErrorDetail:
            additionalProperties: false
            properties:
                location:
                    description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
                    type: string
                message:
                    description: Error message text
                    type: string
                value:
                    description: The value at the given location
            type: object
        ErrorModel:
            additionalProperties: false
            properties:
                $schema:
                    description: A URL to the JSON Schema for this object.
                    examples:
                        - https://example.com/schemas/ErrorModel.json
                    format: uri
                    readOnly: true
                    type: string
                detail:
                    description: A human-readable explanation specific to this occurrence of the problem.
                    examples:
                        - Property foo is required but is missing.
                    type: string
                errors:
                    description: Optional list of individual error details
                    items:
                        $ref: '#/components/schemas/ErrorDetail'
                    type:
                        - array
                        - "null"
                instance:
                    description: A URI reference that identifies the specific occurrence of the problem.
                    examples:
                        - https://example.com/error-log/abc123
                    format: uri
                    type: string
                status:
                    description: HTTP status code
                    examples:
                        - 400
                    format: int64
                    type: integer
                title:
                    description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
                    examples:
                        - Bad Request
                    type: string
                type:
                    default: about:blank
                    description: A URI reference to human-readable documentation for the error.
                    examples:
                        - https://example.com/errors/example
                    format: uri
                    type: string
            type: object
        InviteOutputBody:
            additionalProperties: false
            properties:
                $schema:
                    description: A URL to the JSON Schema for this object.
                    examples:
                        - https://example.com/schemas/InviteOutputBody.json
                    format: uri
                    readOnly: true
                    type: string
                code:
                    type: string
            required:
                - code
            type: object
        ItemDTO:
            additionalProperties: false
            properties:
                badges:
                    items:
                        type: string
                    type:
                        - array
                        - "null"
                category_id:
                    type: string
                description:
                    type: string
                id:
                    type: string
                images:
                    items:
                        type: string
                    type:
                        - array
                        - "null"
                name:
                    type: string
                price_minor:
                    format: int64
                    type: integer
                status:
                    type: string
                tags:
                    items:
                        type: string
                    type:
                        - array
                        - "null"
                vendor_id:
                    type: string
            required:
                - id
                - vendor_id
                - name
                - description
                - price_minor
                - tags
                - badges
                - status
            type: object
        ItemOutputBody:
            additionalProperties: false
            properties:
                $schema:
                    description: A URL to the JSON Schema for this object.
                    examples:
                        - https://example.com/schemas/ItemOutputBody.json
                    format: uri
                    readOnly: true
                    type: string
                item:
                    $ref: '#/components/schemas/ItemDTO'
            required:
                - item
            type: object
        ListCategoriesOutputBody:
            additionalProperties: false
            properties:
                $schema:
                    description: A URL to the JSON Schema for this object.
                    examples:
                        - https://example.com/schemas/ListCategoriesOutputBody.json
                    format: uri
                    readOnly: true
                    type: string
                items:
                    items:
                        $ref: '#/components/schemas/CategoryDTO'
                    type:
                        - array
                        - "null"
            required:
                - items
            type: object
        ListEmployeeMenuOutputBody:
            additionalProperties: false
            properties:
                $schema:
                    description: A URL to the JSON Schema for this object.
                    examples:
                        - https://example.com/schemas/ListEmployeeMenuOutputBody.json
                    format: uri
                    readOnly: true
                    type: string
                items:
                    items:
                        $ref: '#/components/schemas/EmployeeMenuItemDTO'
                    type:
                        - array
                        - "null"
            required:
                - items
            type: object
        ListItemsOutputBody:
            additionalProperties: false
            properties:
                $schema:
                    description: A URL to the JSON Schema for this object.
                    examples:
                        - https://example.com/schemas/ListItemsOutputBody.json
                    format: uri
                    readOnly: true
                    type: string
                items:
                    items:
                        $ref: '#/components/schemas/ItemDTO'
                    type:
                        - array
                        - "null"
            required:
                - items
            type: object
        ListVendorsOutputBody:
            additionalProperties: false
            properties:
                $schema:
                    description: A URL to the JSON Schema for this object.
                    examples:
                        - https://example.com/schemas/ListVendorsOutputBody.json
                    format: uri
                    readOnly: true
                    type: string
                items:
                    items:
                        $ref: '#/components/schemas/VendorDTO'
                    type:
                        - array
                        - "null"
            required:
                - items
            type: object
        MeOutputBody:
            additionalProperties: false
            properties:
                $schema:
                    description: A URL to the JSON Schema for this object.
                    examples:
                        - https://example.com/schemas/MeOutputBody.json
                    format: uri
                    readOnly: true
                    type: string
                department:
                    type: string
                display_name:
                    type: string
                email:
                    type: string
                employee_id:
                    type: string
                plant:
                    type: string
                role:
                    type: string
                user_id:
                    type: string
                vendor_id:
                    type: string
            required:
                - user_id
                - email
                - display_name
                - role
            type: object
        StartLoginInputBody:
            additionalProperties: false
            properties:
                $schema:
                    description: A URL to the JSON Schema for this object.
                    examples:
                        - https://example.com/schemas/StartLoginInputBody.json
                    format: uri
                    readOnly: true
                    type: string
                app:
                    enum:
                        - employee
                        - merchant
                        - admin
                    type: string
                return_to:
                    type: string
            required:
                - app
            type: object
        StartLoginOutputBody:
            additionalProperties: false
            properties:
                $schema:
                    description: A URL to the JSON Schema for this object.
                    examples:
                        - https://example.com/schemas/StartLoginOutputBody.json
                    format: uri
                    readOnly: true
                    type: string
                auth_url:
                    type: string
                state:
                    type: string
            required:
                - auth_url
                - state
            type: object
        UpdateItemInputBody:
            additionalProperties: false
            properties:
                $schema:
                    description: A URL to the JSON Schema for this object.
                    examples:
                        - https://example.com/schemas/UpdateItemInputBody.json
                    format: uri
                    readOnly: true
                    type: string
                badges:
                    items:
                        type: string
                    type:
                        - array
                        - "null"
                category_id:
                    type: string
                description:
                    type: string
                name:
                    minLength: 1
                    type: string
                price_minor:
                    format: int64
                    minimum: 0
                    type: integer
                tags:
                    items:
                        type: string
                    type:
                        - array
                        - "null"
            required:
                - name
                - description
                - price_minor
                - tags
                - badges
            type: object
        VendorDTO:
            additionalProperties: false
            properties:
                approved_at:
                    type: string
                contact_email:
                    type: string
                display_name:
                    type: string
                id:
                    type: string
                legal_name:
                    type: string
                plants:
                    items:
                        type: string
                    type:
                        - array
                        - "null"
                status:
                    type: string
            required:
                - id
                - display_name
                - legal_name
                - contact_email
                - status
            type: object
    securitySchemes:
        bearer:
            scheme: bearer
            type: http
info:
    title: T-Bite API
    version: 0.1.0
openapi: 3.1.0
paths:
    /api/admin/vendors:
        get:
            operationId: listVendors
            parameters:
                - description: Optional status filter
                  explode: false
                  in: query
                  name: status
                  schema:
                    description: Optional status filter
                    enum:
                        - pending
                        - approved
                        - suspended
                        - terminated
                        - ""
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListVendorsOutputBody'
                    description: OK
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: List vendors (admin)
            tags:
                - admin
                - vendor
        post:
            operationId: createPendingVendor
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateVendorInputBody'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CreateVendorOutputBody'
                    description: Created
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: Create a pending vendor
            tags:
                - admin
                - vendor
    /api/admin/vendors/{id}/approve:
        post:
            operationId: approveVendor
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                    format: uuid
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ApproveInputBody'
                required: true
            responses:
                "204":
                    description: No Content
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: Approve vendor + set plants
            tags:
                - admin
                - vendor
    /api/admin/vendors/{id}/invite:
        post:
            operationId: issueVendorInvite
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                    format: uuid
                    type: string
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/InviteOutputBody'
                    description: Created
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: Issue a single-use invite code for a vendor
            tags:
                - admin
                - vendor
    /api/admin/vendors/{id}/reinstate:
        post:
            operationId: reinstateVendor
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                    format: uuid
                    type: string
            responses:
                "204":
                    description: No Content
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: Reinstate a suspended vendor
            tags:
                - admin
                - vendor
    /api/admin/vendors/{id}/suspend:
        post:
            operationId: suspendVendor
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                    format: uuid
                    type: string
            responses:
                "204":
                    description: No Content
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: Suspend an approved vendor
            tags:
                - admin
                - vendor
    /api/employee/menu:
        get:
            operationId: listEmployeeMenu
            parameters:
                - description: Plant code; defaults to caller's plant
                  explode: false
                  in: query
                  name: plant
                  schema:
                    description: Plant code; defaults to caller's plant
                    type: string
                - description: YYYY-MM-DD; defaults to today UTC
                  explode: false
                  in: query
                  name: day
                  schema:
                    description: YYYY-MM-DD; defaults to today UTC
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListEmployeeMenuOutputBody'
                    description: OK
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: List the employee's available menu for a plant + day
            tags:
                - employee
                - menu
    /api/merchant/categories:
        get:
            operationId: listMerchantCategories
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListCategoriesOutputBody'
                    description: OK
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: List the merchant's menu categories
            tags:
                - merchant
                - menu
        post:
            operationId: createMerchantCategory
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateCategoryInputBody'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CreateCategoryOutputBody'
                    description: Created
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: Create a menu category for the merchant
            tags:
                - merchant
                - menu
    /api/merchant/menu-items:
        get:
            operationId: listMerchantMenuItems
            parameters:
                - description: Include archived items in the result
                  explode: false
                  in: query
                  name: include_archived
                  schema:
                    description: Include archived items in the result
                    type: boolean
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListItemsOutputBody'
                    description: OK
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: List the merchant's menu items
            tags:
                - merchant
                - menu
        post:
            operationId: createMerchantMenuItem
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateItemInputBody'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ItemOutputBody'
                    description: Created
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: Create a draft menu item
            tags:
                - merchant
                - menu
    /api/merchant/menu-items/{id}:
        patch:
            operationId: updateMerchantMenuItem
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                    format: uuid
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/UpdateItemInputBody'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ItemOutputBody'
                    description: OK
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: Update a menu item
            tags:
                - merchant
                - menu
    /api/merchant/menu-items/{id}/archive:
        post:
            operationId: archiveMerchantMenuItem
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                    format: uuid
                    type: string
            responses:
                "204":
                    description: No Content
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: Archive a menu item
            tags:
                - merchant
                - menu
    /api/merchant/menu-items/{id}/publish:
        post:
            operationId: publishMerchantMenuItem
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                    format: uuid
                    type: string
            responses:
                "204":
                    description: No Content
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: Publish a draft/archived menu item (status=active)
            tags:
                - merchant
                - menu
    /auth/{provider}/callback:
        get:
            operationId: completeLogin
            parameters:
                - in: path
                  name: provider
                  required: true
                  schema:
                    type: string
                - explode: false
                  in: query
                  name: state
                  schema:
                    type: string
                - explode: false
                  in: query
                  name: code
                  schema:
                    type: string
                - explode: false
                  in: query
                  name: app
                  schema:
                    enum:
                        - employee
                        - merchant
                        - admin
                    type: string
            responses:
                "204":
                    description: No Content
                    headers:
                        Location:
                            schema:
                                type: string
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            summary: Complete OIDC login (redirects to app landing)
            tags:
                - auth
    /auth/{provider}/start:
        post:
            operationId: startLogin
            parameters:
                - description: OIDC provider
                  in: path
                  name: provider
                  required: true
                  schema:
                    description: OIDC provider
                    enum:
                        - google
                        - github
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/StartLoginInputBody'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StartLoginOutputBody'
                    description: OK
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            summary: Start OIDC login
            tags:
                - auth
    /auth/logout:
        post:
            operationId: logout
            responses:
                "204":
                    description: No Content
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: Revoke current session
            tags:
                - auth
    /me:
        get:
            operationId: me
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MeOutputBody'
                    description: OK
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: Get current user
            tags:
                - auth
