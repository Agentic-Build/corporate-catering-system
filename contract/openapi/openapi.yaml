components:
    schemas:
        ErrorDetail:
            additionalProperties: false
            properties:
                location:
                    description: Where the error occurred, e.g. 'body.items[3].tags' or 'path.thing-id'
                    type: string
                message:
                    description: Error message text
                    type: string
                value:
                    description: The value at the given location
            type: object
        ErrorModel:
            additionalProperties: false
            properties:
                $schema:
                    description: A URL to the JSON Schema for this object.
                    examples:
                        - https://example.com/schemas/ErrorModel.json
                    format: uri
                    readOnly: true
                    type: string
                detail:
                    description: A human-readable explanation specific to this occurrence of the problem.
                    examples:
                        - Property foo is required but is missing.
                    type: string
                errors:
                    description: Optional list of individual error details
                    items:
                        $ref: '#/components/schemas/ErrorDetail'
                    type:
                        - array
                        - "null"
                instance:
                    description: A URI reference that identifies the specific occurrence of the problem.
                    examples:
                        - https://example.com/error-log/abc123
                    format: uri
                    type: string
                status:
                    description: HTTP status code
                    examples:
                        - 400
                    format: int64
                    type: integer
                title:
                    description: A short, human-readable summary of the problem type. This value should not change between occurrences of the error.
                    examples:
                        - Bad Request
                    type: string
                type:
                    default: about:blank
                    description: A URI reference to human-readable documentation for the error.
                    examples:
                        - https://example.com/errors/example
                    format: uri
                    type: string
            type: object
        MeOutputBody:
            additionalProperties: false
            properties:
                $schema:
                    description: A URL to the JSON Schema for this object.
                    examples:
                        - https://example.com/schemas/MeOutputBody.json
                    format: uri
                    readOnly: true
                    type: string
                department:
                    type: string
                display_name:
                    type: string
                email:
                    type: string
                employee_id:
                    type: string
                plant:
                    type: string
                role:
                    type: string
                user_id:
                    type: string
                vendor_id:
                    type: string
            required:
                - user_id
                - email
                - display_name
                - role
            type: object
        StartLoginInputBody:
            additionalProperties: false
            properties:
                $schema:
                    description: A URL to the JSON Schema for this object.
                    examples:
                        - https://example.com/schemas/StartLoginInputBody.json
                    format: uri
                    readOnly: true
                    type: string
                app:
                    enum:
                        - employee
                        - merchant
                        - admin
                    type: string
                return_to:
                    type: string
            required:
                - app
            type: object
        StartLoginOutputBody:
            additionalProperties: false
            properties:
                $schema:
                    description: A URL to the JSON Schema for this object.
                    examples:
                        - https://example.com/schemas/StartLoginOutputBody.json
                    format: uri
                    readOnly: true
                    type: string
                auth_url:
                    type: string
                state:
                    type: string
            required:
                - auth_url
                - state
            type: object
    securitySchemes:
        bearer:
            scheme: bearer
            type: http
info:
    title: T-Bite API
    version: 0.1.0
openapi: 3.1.0
paths:
    /auth/{provider}/callback:
        get:
            operationId: completeLogin
            parameters:
                - in: path
                  name: provider
                  required: true
                  schema:
                    type: string
                - explode: false
                  in: query
                  name: state
                  schema:
                    type: string
                - explode: false
                  in: query
                  name: code
                  schema:
                    type: string
                - explode: false
                  in: query
                  name: app
                  schema:
                    enum:
                        - employee
                        - merchant
                        - admin
                    type: string
            responses:
                "204":
                    description: No Content
                    headers:
                        Location:
                            schema:
                                type: string
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            summary: Complete OIDC login (redirects to app landing)
            tags:
                - auth
    /auth/{provider}/start:
        post:
            operationId: startLogin
            parameters:
                - description: OIDC provider
                  in: path
                  name: provider
                  required: true
                  schema:
                    description: OIDC provider
                    enum:
                        - google
                        - github
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/StartLoginInputBody'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/StartLoginOutputBody'
                    description: OK
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            summary: Start OIDC login
            tags:
                - auth
    /auth/logout:
        post:
            operationId: logout
            responses:
                "204":
                    description: No Content
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: Revoke current session
            tags:
                - auth
    /me:
        get:
            operationId: me
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/MeOutputBody'
                    description: OK
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: Get current user
            tags:
                - auth
