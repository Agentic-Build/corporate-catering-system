info:
    title: T-Bite API
    version: 0.1.0
openapi: 3.1.0
paths:
    /api/admin/anomalies:
        get:
            operationId: listAnomalies
            parameters:
                - explode: false
                  in: query
                  name: status
                  schema:
                    enum:
                        - open
                        - triaged
                        - closed
                        - ""
                    type: string
                - explode: false
                  in: query
                  name: severity
                  schema:
                    enum:
                        - low
                        - medium
                        - high
                        - critical
                        - ""
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListAnomaliesOutputBody'
                    description: OK
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: List anomaly alerts filtered by status/severity
            tags:
                - admin
                - compliance
    /api/admin/anomalies/{id}/close:
        post:
            operationId: closeAnomaly
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                    format: uuid
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/AnomalyActionInputBody'
                required: true
            responses:
                "204":
                    description: No Content
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: Close an open/triaged anomaly
            tags:
                - admin
                - compliance
    /api/admin/anomalies/{id}/triage:
        post:
            operationId: triageAnomaly
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                    format: uuid
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/TriageAnomalyInputBody'
                required: true
            responses:
                "204":
                    description: No Content
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: Mark an open anomaly as triaged
            tags:
                - admin
                - compliance
    /api/admin/audit:
        get:
            operationId: listAuditEvents
            parameters:
                - explode: false
                  in: query
                  name: target_kind
                  schema:
                    type: string
                - explode: false
                  in: query
                  name: target_id
                  schema:
                    type: string
                - explode: false
                  in: query
                  name: since
                  schema:
                    type: string
                - explode: false
                  in: query
                  name: limit
                  schema:
                    format: int64
                    type: integer
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListAuditOutputBody'
                    description: OK
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: Query the append-only audit log
            tags:
                - admin
                - compliance
    /api/admin/complaints:
        get:
            operationId: listEscalatedComplaints
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListComplaintsOutputBody'
                    description: OK
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: List complaints escalated to the welfare committee
            tags:
                - admin
                - feedback
    /api/admin/complaints/{id}/resolve:
        post:
            operationId: adminResolveComplaint
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                    format: uuid
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/AdminResolveInputBody'
                required: true
            responses:
                "204":
                    description: No Content
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: Resolve an escalated complaint
            tags:
                - admin
                - feedback
    /api/admin/dlq:
        get:
            operationId: listDLQ
            parameters:
                - explode: false
                  in: query
                  name: stream
                  schema:
                    type: string
                - explode: false
                  in: query
                  name: limit
                  schema:
                    format: int64
                    type: integer
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListOutputBody'
                    description: OK
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: List pending DLQ messages
            tags:
                - admin
                - dlq
    /api/admin/dlq/{id}/replay:
        post:
            operationId: replayDLQMessage
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                    format: uuid
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ReplayOutputBody'
                    description: OK
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: Re-publish a DLQ message to its original subject
            tags:
                - admin
                - dlq
    /api/admin/dlq/{id}/resolve:
        post:
            operationId: resolveDLQMessage
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                    format: uuid
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ResolveInputBody'
                required: true
            responses:
                "204":
                    description: No Content
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: Mark a DLQ message resolved without replay
            tags:
                - admin
                - dlq
    /api/admin/documents/{id}/review:
        post:
            operationId: reviewVendorDocument
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                    format: uuid
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/ReviewDocumentInputBody'
                required: true
            responses:
                "204":
                    description: No Content
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: Approve or reject a pending vendor document
            tags:
                - admin
                - compliance
    /api/admin/payroll/batches:
        get:
            operationId: listPayrollBatches
            parameters:
                - explode: false
                  in: query
                  name: status
                  schema:
                    enum:
                        - draft
                        - locked
                        - exported
                        - closed
                        - ""
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ListBatchesOutputBody'
                    description: OK
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: List payroll batches
            tags:
                - admin
                - payroll
        post:
            operationId: createPayrollBatch
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateBatchInputBody'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/BatchOutputBody'
                    description: Created
                default:
                    content:
                        application/problem+json:
                            schema:
                                $ref: '#/components/schemas/ErrorModel'
                    description: Error
            security:
                - bearer: []
            summary: Build a draft payroll batch for a period
