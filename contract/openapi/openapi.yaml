components:
  parameters:
    CuisineFilterQuery:
      in: query
      name: cuisine
      required: false
      schema:
        maxLength: 32
        minLength: 2
        type: string
    FromDateQuery:
      in: query
      name: fromDate
      required: false
      schema:
        format: date
        type: string
    HealthTagFilterQuery:
      in: query
      name: healthTag
      required: false
      schema:
        $ref: '#/components/schemas/MenuHealthTag'
    MappingIdPath:
      in: path
      name: mappingId
      required: true
      schema:
        pattern: ^map-[a-z0-9-]{3,64}$
        type: string
    MenuDateQuery:
      in: query
      name: menuDate
      required: true
      schema:
        format: date
        type: string
    MenuItemIdPath:
      in: path
      name: menuItemId
      required: true
      schema:
        pattern: ^menu-[a-z0-9]{8,32}$
        type: string
    MenuSortByQuery:
      in: query
      name: sortBy
      required: false
      schema:
        $ref: '#/components/schemas/MenuSortField'
    OrderIdPath:
      in: path
      name: orderId
      required: true
      schema:
        pattern: ^ord-[a-z0-9]{8,32}$
        type: string
    OrderStatusFilterQuery:
      in: query
      name: status
      required: false
      schema:
        $ref: '#/components/schemas/EmployeeOrderStatus'
    PageQuery:
      in: query
      name: page
      required: false
      schema:
        default: 1
        minimum: 1
        type: integer
    PageSizeQuery:
      in: query
      name: pageSize
      required: false
      schema:
        default: 20
        maximum: 200
        minimum: 1
        type: integer
    PayPeriodQuery:
      in: query
      name: payPeriod
      required: true
      schema:
        examples:
        - 2026-04
        pattern: ^[0-9]{4}-[0-9]{2}$
        type: string
    PayrollSortByQuery:
      in: query
      name: sortBy
      required: false
      schema:
        $ref: '#/components/schemas/PayrollSortField'
    PlantIdFilterQuery:
      in: query
      name: plantId
      required: false
      schema:
        $ref: '#/components/schemas/PlantId'
    PlantIdQuery:
      description: Target plant for scoping.
      in: query
      name: plantId
      required: true
      schema:
        $ref: '#/components/schemas/PlantId'
    ServiceWindowActiveAtQuery:
      description: Evaluate mappings active at this fixed Asia/Taipei business timestamp.
      in: query
      name: activeAt
      required: false
      schema:
        $ref: '#/components/schemas/TaipeiBusinessDateTime'
    SortOrderQuery:
      in: query
      name: sortOrder
      required: false
      schema:
        $ref: '#/components/schemas/SortOrder'
    TemplateIdPath:
      in: path
      name: templateId
      required: true
      schema:
        pattern: ^tmpl-[a-z0-9-]{3,64}$
        type: string
    ToDateQuery:
      in: query
      name: toDate
      required: false
      schema:
        format: date
        type: string
    VendorCategoryFilterQuery:
      in: query
      name: vendorCategory
      required: false
      schema:
        $ref: '#/components/schemas/VendorCategory'
    VendorCategoryPath:
      in: path
      name: vendorCategory
      required: true
      schema:
        $ref: '#/components/schemas/VendorCategory'
    VendorIdFilterQuery:
      in: query
      name: vendorId
      required: false
      schema:
        pattern: ^ven-[a-z0-9]{8,32}$
        type: string
    VendorIdPath:
      in: path
      name: vendorId
      required: true
      schema:
        pattern: ^ven-[a-z0-9]{8,32}$
        type: string
    VendorOrderSortByQuery:
      in: query
      name: sortBy
      required: false
      schema:
        $ref: '#/components/schemas/VendorOrderSortField'
    VendorSortByQuery:
      in: query
      name: sortBy
      required: false
      schema:
        $ref: '#/components/schemas/VendorSortField'
    VendorStatusFilterQuery:
      in: query
      name: status
      required: false
      schema:
        $ref: '#/components/schemas/VendorStatus'
  responses:
    BadRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: Request payload or query is invalid.
    Conflict:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: Request conflicts with business constraints.
    Forbidden:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: Authenticated actor is not authorized to perform this operation.
    NotFound:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: Requested resource was not found.
    Unauthorized:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: Authentication token is missing or invalid.
    ValidationFailed:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
      description: Request is syntactically valid but violates business validation rules.
  schemas:
    ActorId:
      pattern: ^[a-z0-9][a-z0-9-]{2,63}$
      type: string
    AdminVendorReviewRequest:
      additionalProperties: false
      properties:
        comment:
          maxLength: 280
          minLength: 5
          type: string
        decision:
          $ref: '#/components/schemas/VendorReviewDecision'
      required:
      - decision
      - comment
      type: object
    AuthenticationSource:
      enum:
      - CORPORATE_SSO
      - VENDOR_ACCOUNT_MFA
      type: string
    EmployeeOrder:
      additionalProperties: false
      properties:
        createdAt:
          format: date-time
          type: string
        deliveryDate:
          format: date
          type: string
        employeeActorId:
          $ref: '#/components/schemas/ActorId'
        lineItems:
          items:
            $ref: '#/components/schemas/OrderLineItem'
          minItems: 1
          type: array
        orderId:
          pattern: ^ord-[a-z0-9]{8,32}$
          type: string
        plantId:
          $ref: '#/components/schemas/PlantId'
        status:
          $ref: '#/components/schemas/EmployeeOrderStatus'
        total:
          $ref: '#/components/schemas/Money'
      required:
      - orderId
      - employeeActorId
      - plantId
      - deliveryDate
      - status
      - lineItems
      - total
      type: object
    EmployeeOrderCancelPatchRequest:
      additionalProperties: false
      properties:
        cancelReason:
          maxLength: 200
          minLength: 5
          type: string
        operation:
          enum:
          - CANCEL
          type: string
      required:
      - operation
      - cancelReason
      type: object
    EmployeeOrderCreateRequest:
      additionalProperties: false
      properties:
        deliveryDate:
          format: date
          type: string
        employeeNote:
          maxLength: 200
          type: string
        lineItems:
          items:
            $ref: '#/components/schemas/OrderLineItemRequest'
          maxItems: 10
          minItems: 1
          type: array
        plantId:
          $ref: '#/components/schemas/PlantId'
      required:
      - plantId
      - deliveryDate
      - lineItems
      type: object
    EmployeeOrderPatchRequest:
      description: Order patch command. Supports line-item replacement and cancellation under the same cutoff governance.
      oneOf:
      - $ref: '#/components/schemas/EmployeeOrderReplaceLineItemsPatchRequest'
      - $ref: '#/components/schemas/EmployeeOrderCancelPatchRequest'
    EmployeeOrderReplaceLineItemsPatchRequest:
      additionalProperties: false
      properties:
        lineItems:
          items:
            $ref: '#/components/schemas/OrderLineItemRequest'
          maxItems: 10
          minItems: 1
          type: array
        operation:
          enum:
          - REPLACE_LINE_ITEMS
          type: string
      required:
      - operation
      - lineItems
      type: object
    EmployeeOrderStatus:
      enum:
      - PENDING
      - CONFIRMED
      - CANCELLED
      - FULFILLED
      type: string
    ErrorCode:
      enum:
      - BAD_REQUEST
      - UNAUTHORIZED
      - FORBIDDEN
      - NOT_FOUND
      - CONFLICT
      - VALIDATION_FAILED
      type: string
    ErrorDetail:
      additionalProperties: false
      properties:
        field:
          maxLength: 128
          minLength: 1
          type: string
        reason:
          maxLength: 280
          minLength: 1
          type: string
      required:
      - field
      - reason
      type: object
    ErrorResponse:
      additionalProperties: false
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        details:
          items:
            $ref: '#/components/schemas/ErrorDetail'
          type: array
        message:
          maxLength: 280
          minLength: 1
          type: string
        requestId:
          maxLength: 128
          minLength: 1
          type: string
      required:
      - code
      - message
      - requestId
      type: object
    MenuHealthTag:
      enum:
      - LOW_CALORIE
      - HIGH_PROTEIN
      - VEGETARIAN
      - VEGAN
      - GLUTEN_FREE
      type: string
    MenuListItem:
      additionalProperties: false
      properties:
        cuisine:
          maxLength: 32
          minLength: 2
          type: string
        deliveryDate:
          format: date
          type: string
        description:
          maxLength: 280
          type: string
        healthTags:
          items:
            $ref: '#/components/schemas/MenuHealthTag'
          type: array
          uniqueItems: true
        imageUrl:
          format: uri
          maxLength: 512
          type: string
        menuItemId:
          pattern: ^menu-[a-z0-9]{8,32}$
          type: string
        name:
          maxLength: 80
          minLength: 1
          type: string
        price:
          $ref: '#/components/schemas/Money'
        remainingQuantity:
          maximum: 2000
          minimum: 0
          type: integer
        vendorId:
          pattern: ^ven-[a-z0-9]{8,32}$
          type: string
      required:
      - menuItemId
      - vendorId
      - name
      - price
      - remainingQuantity
      - deliveryDate
      - healthTags
      type: object
    MenuPage:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: '#/components/schemas/MenuListItem'
          type: array
        page:
          $ref: '#/components/schemas/PageMeta'
      required:
      - items
      - page
      type: object
    MenuSortField:
      enum:
      - name
      - priceMinor
      - remainingQuantity
      - deliveryDate
      type: string
    Money:
      additionalProperties: false
      properties:
        amountMinor:
          minimum: 0
          type: integer
        currency:
          examples:
          - TWD
          pattern: ^[A-Z]{3}$
          type: string
      required:
      - currency
      - amountMinor
      type: object
    OrderLineItem:
      additionalProperties: false
      properties:
        menuItemId:
          pattern: ^menu-[a-z0-9]{8,32}$
          type: string
        pricePerUnit:
          $ref: '#/components/schemas/Money'
        quantity:
          maximum: 20
          minimum: 1
          type: integer
      required:
      - menuItemId
      - quantity
      - pricePerUnit
      type: object
    OrderLineItemRequest:
      additionalProperties: false
      properties:
        menuItemId:
          pattern: ^menu-[a-z0-9]{8,32}$
          type: string
        quantity:
          maximum: 20
          minimum: 1
          type: integer
        specialRequests:
          items:
            $ref: '#/components/schemas/SpecialRequestOption'
          maxItems: 3
          type: array
          uniqueItems: true
      required:
      - menuItemId
      - quantity
      type: object
    PageMeta:
      additionalProperties: false
      properties:
        page:
          minimum: 1
          type: integer
        pageSize:
          maximum: 200
          minimum: 1
          type: integer
        totalItems:
          minimum: 0
          type: integer
        totalPages:
          minimum: 0
          type: integer
      required:
      - page
      - pageSize
      - totalItems
      - totalPages
      type: object
    PayrollDeductionPage:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: '#/components/schemas/PayrollDeductionRecord'
          type: array
        page:
          $ref: '#/components/schemas/PageMeta'
      required:
      - items
      - page
      type: object
    PayrollDeductionRecord:
      additionalProperties: false
      properties:
        amount:
          $ref: '#/components/schemas/Money'
        deliveryDate:
          format: date
          type: string
        employeeActorId:
          $ref: '#/components/schemas/ActorId'
        orderId:
          pattern: ^ord-[a-z0-9]{8,32}$
          type: string
        payPeriod:
          pattern: ^[0-9]{4}-[0-9]{2}$
          type: string
        status:
          enum:
          - READY
          - LOCKED
          - REFUNDED
          type: string
      required:
      - employeeActorId
      - orderId
      - deliveryDate
      - amount
      - payPeriod
      - status
      type: object
    PayrollSortField:
      enum:
      - employeeActorId
      - amountMinor
      - deliveryDate
      type: string
    PlantId:
      pattern: ^[a-z0-9][a-z0-9-]{1,31}$
      type: string
    Role:
      enum:
      - EMPLOYEE
      - VENDOR_OPERATOR
      - COMMITTEE_ADMIN
      - PAYROLL_OPERATOR
      type: string
    SortOrder:
      default: asc
      enum:
      - asc
      - desc
      type: string
    SpecialRequestOption:
      description: Controlled special-request options. Free-text instructions are intentionally disabled pending final policy clarification.
      enum:
      - LESS_RICE
      - NO_GREEN_ONION
      - SAUCE_ON_SIDE
      - NO_UTENSILS
      - EXTRA_SPICY
      type: string
    TaipeiBusinessDateTime:
      description: Fixed Asia/Taipei business timestamp. Always serialize with +08:00 offset.
      format: date-time
      pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}\+08:00$
      type: string
    VendorCategory:
      enum:
      - RESTAURANT
      - BEVERAGE
      - DESSERT
      - HEALTHY_MEAL
      - SNACK
      type: string
    VendorComplianceDocumentRecord:
      additionalProperties: false
      properties:
        documentRef:
          maxLength: 128
          minLength: 1
          type: string
        expiresOn:
          format: date
          type: string
        status:
          $ref: '#/components/schemas/VendorComplianceDocumentStatus'
        submittedAt:
          format: date-time
          type: string
        templateId:
          pattern: ^tmpl-[a-z0-9-]{3,64}$
          type: string
      required:
      - templateId
      - documentRef
      - submittedAt
      - expiresOn
      - status
      type: object
    VendorComplianceDocumentStatus:
      enum:
      - VALID
      - EXPIRING_SOON
      - EXPIRED
      - MISSING
      type: string
    VendorComplianceDocumentTemplate:
      additionalProperties: false
      properties:
        displayName:
          maxLength: 120
          minLength: 1
          type: string
        maxValidityDays:
          maximum: 3650
          minimum: 1
          type: integer
        reminderDaysBeforeExpiry:
          items:
            maximum: 3650
            minimum: 1
            type: integer
          type: array
          uniqueItems: true
        required:
          type: boolean
        suspensionGraceDays:
          maximum: 365
          minimum: 0
          type: integer
        templateId:
          pattern: ^tmpl-[a-z0-9-]{3,64}$
          type: string
        updatedAt:
          format: date-time
          type: string
        vendorCategory:
          $ref: '#/components/schemas/VendorCategory'
      required:
      - templateId
      - vendorCategory
      - displayName
      - required
      - maxValidityDays
      - reminderDaysBeforeExpiry
      - suspensionGraceDays
      type: object
    VendorComplianceDocumentTemplatePage:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: '#/components/schemas/VendorComplianceDocumentTemplate'
          type: array
        page:
          $ref: '#/components/schemas/PageMeta'
      required:
      - items
      - page
      type: object
    VendorComplianceDocumentTemplateUpsertRequest:
      additionalProperties: false
      properties:
        displayName:
          maxLength: 120
          minLength: 1
          type: string
        maxValidityDays:
          maximum: 3650
          minimum: 1
          type: integer
        reminderDaysBeforeExpiry:
          items:
            maximum: 3650
            minimum: 1
            type: integer
          type: array
          uniqueItems: true
        required:
          type: boolean
        suspensionGraceDays:
          maximum: 365
          minimum: 0
          type: integer
      required:
      - displayName
      - required
      - maxValidityDays
      - reminderDaysBeforeExpiry
      - suspensionGraceDays
      type: object
    VendorComplianceLifecycleExecutionRequest:
      additionalProperties: false
      properties:
        dryRun:
          default: false
          type: boolean
        runDate:
          format: date
          type: string
      required:
      - runDate
      type: object
    VendorComplianceLifecycleExecutionResult:
      additionalProperties: false
      properties:
        reinstatementCount:
          minimum: 0
          type: integer
        reminderCount:
          minimum: 0
          type: integer
        runDate:
          format: date
          type: string
        suspensionCount:
          minimum: 0
          type: integer
      required:
      - runDate
      - reminderCount
      - suspensionCount
      - reinstatementCount
      type: object
    VendorComplianceRetentionPolicy:
      additionalProperties: false
      properties:
        lifecycleHistoryDays:
          maximum: 36500
          minimum: 1
          type: integer
        rejectedVendorDeletionDays:
          maximum: 3650
          minimum: 1
          type: integer
        reviewHistoryDays:
          maximum: 36500
          minimum: 1
          type: integer
      required:
      - reviewHistoryDays
      - lifecycleHistoryDays
      - rejectedVendorDeletionDays
      type: object
    VendorComplianceSummary:
      additionalProperties: false
      properties:
        documents:
          items:
            $ref: '#/components/schemas/VendorComplianceDocumentRecord'
          type: array
        lifecycleHistory:
          items:
            $ref: '#/components/schemas/VendorLifecycleEvent'
          type: array
        retentionPolicy:
          $ref: '#/components/schemas/VendorComplianceRetentionPolicy'
      required:
      - documents
      - lifecycleHistory
      - retentionPolicy
      type: object
    VendorEnrollment:
      additionalProperties: false
      properties:
        compliance:
          $ref: '#/components/schemas/VendorComplianceSummary'
        displayName:
          maxLength: 120
          minLength: 1
          type: string
        reviewHistory:
          items:
            $ref: '#/components/schemas/VendorReviewHistoryEntry'
          type: array
        status:
          $ref: '#/components/schemas/VendorStatus'
        updatedAt:
          format: date-time
          type: string
        vendorCategory:
          $ref: '#/components/schemas/VendorCategory'
        vendorId:
          pattern: ^ven-[a-z0-9]{8,32}$
          type: string
      required:
      - vendorId
      - displayName
      - vendorCategory
      - status
      - reviewHistory
      - compliance
      - updatedAt
      type: object
    VendorEnrollmentPage:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: '#/components/schemas/VendorEnrollment'
          type: array
        page:
          $ref: '#/components/schemas/PageMeta'
      required:
      - items
      - page
      type: object
    VendorLifecycleEvent:
      additionalProperties: false
      properties:
        actorId:
          $ref: '#/components/schemas/ActorId'
        actorRole:
          $ref: '#/components/schemas/Role'
        eventType:
          $ref: '#/components/schemas/VendorLifecycleEventType'
        occurredAt:
          format: date-time
          type: string
        summary:
          maxLength: 280
          minLength: 1
          type: string
        suspensionReasonCode:
          $ref: '#/components/schemas/VendorSuspensionReasonCode'
        templateId:
          pattern: ^tmpl-[a-z0-9-]{3,64}$
          type: string
      required:
      - occurredAt
      - eventType
      - actorId
      - actorRole
      - summary
      type: object
    VendorLifecycleEventType:
      enum:
      - APPLICATION_SUBMITTED
      - DOCUMENT_SUBMITTED
      - REVIEW_DECISION
      - EXPIRY_REMINDER_ISSUED
      - SUSPENDED
      - REINSTATED
      type: string
    VendorMenuItem:
      additionalProperties: false
      properties:
        deliveryDate:
          format: date
          type: string
        description:
          maxLength: 280
          minLength: 1
          type: string
        healthTags:
          items:
            $ref: '#/components/schemas/MenuHealthTag'
          type: array
          uniqueItems: true
        imageUrl:
          format: uri
          maxLength: 512
          type: string
        maxDailyQuantity:
          maximum: 2000
          minimum: 1
          type: integer
        menuItemId:
          pattern: ^menu-[a-z0-9]{8,32}$
          type: string
        modifyCancelCutoffMinuteOfDay:
          maximum: 1200
          minimum: 900
          type: integer
        name:
          maxLength: 80
          minLength: 1
          type: string
        preorderOpenDaysAhead:
          maximum: 7
          minimum: 1
          type: integer
        price:
          $ref: '#/components/schemas/Money'
        remainingQuantity:
          maximum: 2000
          minimum: 0
          type: integer
        vendorId:
          pattern: ^ven-[a-z0-9]{8,32}$
          type: string
      required:
      - menuItemId
      - vendorId
      - name
      - description
      - price
      - maxDailyQuantity
      - remainingQuantity
      - preorderOpenDaysAhead
      - modifyCancelCutoffMinuteOfDay
      - deliveryDate
      type: object
    VendorMenuItemUpsertRequest:
      additionalProperties: false
      properties:
        deliveryDate:
          format: date
          type: string
        description:
          maxLength: 280
          minLength: 1
          type: string
        healthTags:
          items:
            $ref: '#/components/schemas/MenuHealthTag'
          type: array
          uniqueItems: true
        imageUrl:
          format: uri
          maxLength: 512
          type: string
        maxDailyQuantity:
          maximum: 2000
          minimum: 1
          type: integer
        modifyCancelCutoffMinuteOfDayOverride:
          description: Optional vendor override minute-of-day (Asia/Taipei) for previous-day modify/cancel cutoff.
          maximum: 1200
          minimum: 900
          type: integer
        name:
          maxLength: 80
          minLength: 1
          type: string
        preorderOpenDaysAheadOverride:
          description: Optional vendor override for how many days ahead preorder stays open.
          maximum: 7
          minimum: 1
          type: integer
        price:
          $ref: '#/components/schemas/Money'
      required:
      - name
      - description
      - price
      - maxDailyQuantity
      - deliveryDate
      type: object
    VendorOrderBoardEntry:
      additionalProperties: false
      properties:
        deliveryDate:
          format: date
          type: string
        lineItems:
          items:
            $ref: '#/components/schemas/OrderLineItem'
          minItems: 1
          type: array
        orderId:
          pattern: ^ord-[a-z0-9]{8,32}$
          type: string
        plantId:
          $ref: '#/components/schemas/PlantId'
        status:
          $ref: '#/components/schemas/EmployeeOrderStatus'
      required:
      - orderId
      - plantId
      - deliveryDate
      - status
      - lineItems
      type: object
    VendorOrderPage:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: '#/components/schemas/VendorOrderBoardEntry'
          type: array
        page:
          $ref: '#/components/schemas/PageMeta'
      required:
      - items
      - page
      type: object
    VendorOrderSortField:
      enum:
      - deliveryDate
      - plantId
      - status
      - createdAt
      type: string
    VendorPlantDeliveryMapping:
      additionalProperties: false
      properties:
        effect:
          $ref: '#/components/schemas/VendorPlantDeliveryRuleEffect'
        mappingId:
          pattern: ^map-[a-z0-9-]{3,64}$
          type: string
        plantId:
          $ref: '#/components/schemas/PlantId'
        precedence:
          maximum: 65535
          minimum: 0
          type: integer
        serviceWindow:
          $ref: '#/components/schemas/VendorPlantDeliveryServiceWindow'
        updatedAt:
          $ref: '#/components/schemas/TaipeiBusinessDateTime'
        updatedByActorId:
          $ref: '#/components/schemas/ActorId'
        vendorId:
          pattern: ^ven-[a-z0-9]{8,32}$
          type: string
      required:
      - mappingId
      - vendorId
      - plantId
      - serviceWindow
      - effect
      - precedence
      - updatedAt
      - updatedByActorId
      type: object
    VendorPlantDeliveryMappingAuditEntry:
      additionalProperties: false
      properties:
        actorId:
          $ref: '#/components/schemas/ActorId'
        actorRole:
          $ref: '#/components/schemas/Role'
        eventType:
          $ref: '#/components/schemas/VendorPlantDeliveryMappingAuditEventType'
        mapping:
          $ref: '#/components/schemas/VendorPlantDeliveryMapping'
        occurredAt:
          $ref: '#/components/schemas/TaipeiBusinessDateTime'
        operationId:
          maxLength: 128
          minLength: 1
          type: string
      required:
      - occurredAt
      - actorId
      - actorRole
      - operationId
      - eventType
      - mapping
      type: object
    VendorPlantDeliveryMappingAuditEventType:
      enum:
      - UPSERTED
      - REMOVED
      type: string
    VendorPlantDeliveryMappingPage:
      additionalProperties: false
      properties:
        auditTrail:
          items:
            $ref: '#/components/schemas/VendorPlantDeliveryMappingAuditEntry'
          type: array
        items:
          items:
            $ref: '#/components/schemas/VendorPlantDeliveryMapping'
          type: array
        page:
          $ref: '#/components/schemas/PageMeta'
      required:
      - items
      - auditTrail
      - page
      type: object
    VendorPlantDeliveryMappingUpsertRequest:
      additionalProperties: false
      properties:
        effect:
          $ref: '#/components/schemas/VendorPlantDeliveryRuleEffect'
        plantId:
          $ref: '#/components/schemas/PlantId'
        precedence:
          maximum: 65535
          minimum: 0
          type: integer
        serviceWindow:
          $ref: '#/components/schemas/VendorPlantDeliveryServiceWindow'
      required:
      - plantId
      - serviceWindow
      - effect
      - precedence
      type: object
    VendorPlantDeliveryRuleEffect:
      enum:
      - ALLOW
      - DENY
      type: string
    VendorPlantDeliveryServiceWindow:
      additionalProperties: false
      properties:
        endsAt:
          $ref: '#/components/schemas/TaipeiBusinessDateTime'
        startsAt:
          $ref: '#/components/schemas/TaipeiBusinessDateTime'
      required:
      - startsAt
      - endsAt
      type: object
    VendorReviewDecision:
      enum:
      - APPROVED
      - REJECTED
      - REQUEST_FIX
      type: string
    VendorReviewHistoryEntry:
      additionalProperties: false
      properties:
        comment:
          maxLength: 280
          minLength: 5
          type: string
        decidedAt:
          format: date-time
          type: string
        decidedByActorId:
          $ref: '#/components/schemas/ActorId'
        decision:
          $ref: '#/components/schemas/VendorReviewDecision'
      required:
      - decidedAt
      - decidedByActorId
      - decision
      - comment
      type: object
    VendorSortField:
      enum:
      - createdAt
      - status
      - displayName
      - vendorCategory
      type: string
    VendorStatus:
      enum:
      - PENDING_REVIEW
      - FIX_REQUESTED
      - APPROVED
      - REJECTED
      - SUSPENDED
      type: string
    VendorSuspensionReasonCode:
      enum:
      - MISSING_REQUIRED_DOCUMENT
      - EXPIRED_REQUIRED_DOCUMENT
      type: string
  securitySchemes:
    corporateSsoBearer:
      bearerFormat: JWT
      description: Corporate SSO issued bearer token.
      scheme: bearer
      type: http
      x-authentication-source: CORPORATE_SSO
    vendorMfaBearer:
      bearerFormat: JWT
      description: Vendor account token issued only after MFA challenge.
      scheme: bearer
      type: http
      x-authentication-source: VENDOR_ACCOUNT_MFA
info:
  description: Contract-first API definition for employee, vendor, admin, and integration APIs.
  summary: Canonical machine-verifiable HTTP contract
  title: Corporate Catering System API
  version: 1.0.0
jsonSchemaDialect: https://spec.openapis.org/oas/3.1/dialect/base
openapi: 3.1.0
paths:
  /api/v1/admin/compliance/document-templates:
    get:
      operationId: listComplianceDocumentTemplates
      parameters:
      - $ref: '#/components/parameters/VendorCategoryFilterQuery'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorComplianceDocumentTemplatePage'
          description: Compliance document templates
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
      - corporateSsoBearer: []
      summary: List vendor compliance document templates by category
      tags:
      - Admin
  /api/v1/admin/compliance/document-templates/{vendorCategory}/{templateId}:
    put:
      operationId: upsertComplianceDocumentTemplate
      parameters:
      - $ref: '#/components/parameters/VendorCategoryPath'
      - $ref: '#/components/parameters/TemplateIdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VendorComplianceDocumentTemplateUpsertRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorComplianceDocumentTemplate'
          description: Template upserted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationFailed'
      security:
      - corporateSsoBearer: []
      summary: Create or update a compliance document template for a vendor category
      tags:
      - Admin
  /api/v1/admin/compliance/lifecycle/executions:
    post:
      operationId: runVendorComplianceLifecycle
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VendorComplianceLifecycleExecutionRequest'
        required: true
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorComplianceLifecycleExecutionResult'
          description: Lifecycle evaluation accepted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationFailed'
      security:
      - corporateSsoBearer: []
      summary: Run automated compliance lifecycle evaluation
      tags:
      - Admin
  /api/v1/admin/vendor-plant-delivery-mappings:
    get:
      operationId: listVendorPlantDeliveryMappings
      parameters:
      - $ref: '#/components/parameters/VendorIdFilterQuery'
      - $ref: '#/components/parameters/PlantIdFilterQuery'
      - $ref: '#/components/parameters/ServiceWindowActiveAtQuery'
      - $ref: '#/components/parameters/PageQuery'
      - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorPlantDeliveryMappingPage'
          description: Paginated vendor plant delivery mappings
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
      - corporateSsoBearer: []
      summary: List vendor plant delivery mappings and their audit history
      tags:
      - Admin
  /api/v1/admin/vendors:
    get:
      operationId: listAdminVendors
      parameters:
      - $ref: '#/components/parameters/PageQuery'
      - $ref: '#/components/parameters/PageSizeQuery'
      - $ref: '#/components/parameters/VendorSortByQuery'
      - $ref: '#/components/parameters/SortOrderQuery'
      - $ref: '#/components/parameters/VendorStatusFilterQuery'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorEnrollmentPage'
          description: Paginated vendor enrollments
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
      - corporateSsoBearer: []
      summary: List vendor enrollments
      tags:
      - Admin
  /api/v1/admin/vendors/{vendorId}/plant-delivery-mappings/{mappingId}:
    delete:
      operationId: deleteVendorPlantDeliveryMapping
      parameters:
      - $ref: '#/components/parameters/VendorIdPath'
      - $ref: '#/components/parameters/MappingIdPath'
      responses:
        '204':
          description: Vendor plant delivery mapping deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      security:
      - corporateSsoBearer: []
      summary: Delete a vendor plant delivery mapping
      tags:
      - Admin
    put:
      operationId: upsertVendorPlantDeliveryMapping
      parameters:
      - $ref: '#/components/parameters/VendorIdPath'
      - $ref: '#/components/parameters/MappingIdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VendorPlantDeliveryMappingUpsertRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorPlantDeliveryMapping'
          description: Vendor plant delivery mapping upserted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
      security:
      - corporateSsoBearer: []
      summary: Create or update a vendor plant delivery mapping
      tags:
      - Admin
  /api/v1/admin/vendors/{vendorId}/reviews:
    post:
      operationId: reviewVendorApplication
      parameters:
      - $ref: '#/components/parameters/VendorIdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminVendorReviewRequest'
        required: true
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorEnrollment'
          description: Vendor enrollment decision accepted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
      security:
      - corporateSsoBearer: []
      summary: Approve, reject, or request fixes for vendor application
      tags:
      - Admin
  /api/v1/employee/menus:
    get:
      operationId: listEmployeeMenus
      parameters:
      - $ref: '#/components/parameters/PlantIdQuery'
      - $ref: '#/components/parameters/MenuDateQuery'
      - $ref: '#/components/parameters/PageQuery'
      - $ref: '#/components/parameters/PageSizeQuery'
      - $ref: '#/components/parameters/MenuSortByQuery'
      - $ref: '#/components/parameters/SortOrderQuery'
      - $ref: '#/components/parameters/CuisineFilterQuery'
      - $ref: '#/components/parameters/HealthTagFilterQuery'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuPage'
          description: Paginated menu list
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
      - corporateSsoBearer: []
      summary: List available menus
      tags:
      - Employee
      x-deliverability-enforcement:
        apiContexts:
        - BROWSE
        - SEARCH
        enabled: true
        ruleSource: VENDOR_PLANT_DELIVERY_MAPPING
        timezone: Asia/Taipei
  /api/v1/employee/orders:
    post:
      operationId: createEmployeeOrder
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeOrderCreateRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeOrder'
          description: Order created
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
      security:
      - corporateSsoBearer: []
      summary: Create a meal order
      tags:
      - Employee
      x-deliverability-enforcement:
        apiContexts:
        - ORDER
        enabled: true
        ruleSource: VENDOR_PLANT_DELIVERY_MAPPING
        timezone: Asia/Taipei
      x-order-governance:
        modifyCancelCutoff:
          defaultRule:
            minuteOfDay: 1020
            relativeDayFromDelivery: -1
          vendorOverrideBounds:
            maximumMinuteOfDay: 1200
            minimumMinuteOfDay: 900
        preorderWindow:
          defaultOpenDaysAhead: 7
          vendorOverrideBounds:
            maximum: 7
            minimum: 1
        specialRequestPolicy:
          allowFreeText: false
          mode: CONTROLLED_ENUM_ONLY
        timezone: Asia/Taipei
  /api/v1/employee/orders/{orderId}:
    patch:
      operationId: updateEmployeeOrder
      parameters:
      - $ref: '#/components/parameters/OrderIdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeOrderPatchRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeOrder'
          description: Order updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
      security:
      - corporateSsoBearer: []
      summary: Modify an existing order before cutoff
      tags:
      - Employee
      x-order-governance:
        modifyCancelCutoff:
          defaultRule:
            minuteOfDay: 1020
            relativeDayFromDelivery: -1
          vendorOverrideBounds:
            maximumMinuteOfDay: 1200
            minimumMinuteOfDay: 900
        supportedOperations:
        - REPLACE_LINE_ITEMS
        - CANCEL
        timezone: Asia/Taipei
  /api/v1/integrations/payroll/deductions:
    get:
      operationId: exportPayrollDeductions
      parameters:
      - $ref: '#/components/parameters/PayPeriodQuery'
      - $ref: '#/components/parameters/PageQuery'
      - $ref: '#/components/parameters/PageSizeQuery'
      - $ref: '#/components/parameters/PayrollSortByQuery'
      - $ref: '#/components/parameters/SortOrderQuery'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayrollDeductionPage'
          description: Payroll deduction export page
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
      - corporateSsoBearer: []
      summary: Export payroll deduction records
      tags:
      - Integration
  /api/v1/vendor/menu-items/{menuItemId}:
    put:
      operationId: upsertVendorMenuItem
      parameters:
      - $ref: '#/components/parameters/MenuItemIdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VendorMenuItemUpsertRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorMenuItem'
          description: Menu item upserted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationFailed'
      security:
      - vendorMfaBearer: []
      summary: Create or update a vendor menu item
      tags:
      - Vendor
  /api/v1/vendor/orders:
    get:
      operationId: listVendorOrders
      parameters:
      - $ref: '#/components/parameters/PlantIdQuery'
      - $ref: '#/components/parameters/FromDateQuery'
      - $ref: '#/components/parameters/ToDateQuery'
      - $ref: '#/components/parameters/PageQuery'
      - $ref: '#/components/parameters/PageSizeQuery'
      - $ref: '#/components/parameters/VendorOrderSortByQuery'
      - $ref: '#/components/parameters/SortOrderQuery'
      - $ref: '#/components/parameters/OrderStatusFilterQuery'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VendorOrderPage'
          description: Paginated vendor order board
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      security:
      - vendorMfaBearer: []
      summary: List vendor order board entries
      tags:
      - Vendor
servers:
- description: Production
  url: https://api.corporate-catering.example.com
tags:
- description: Employee ordering and menu access endpoints.
  name: Employee
- description: Vendor menu and fulfillment endpoints.
  name: Vendor
- description: Committee administrator governance endpoints.
  name: Admin
- description: Internal enterprise integration endpoints.
  name: Integration
