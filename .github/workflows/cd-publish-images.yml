name: cd-publish-images
on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: api,           file: services/api/Dockerfile,  context: . }
          - { name: web-employee,  file: apps/employee/Dockerfile, context: . }
          - { name: web-merchant,  file: apps/merchant/Dockerfile, context: . }
          - { name: web-admin,     file: apps/admin/Dockerfile,    context: . }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Compute short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # Only push on main / tags. On pull_request we build & verify only.
      - name: Log in to GHCR
        if: ${{ github.event_name == 'push' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata for ${{ matrix.name }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/agentic-build/tbite-${{ matrix.name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build (and push on main/tags) ${{ matrix.name }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          # Multi-arch on push so Apple Silicon kind/k3d/OrbStack
          # local clusters (architecture #47 first-class targets)
          # can pull the image without operators rebuilding. PRs
          # build linux/amd64 only because docker/build-push-action's
          # `load: true` does not accept a platforms list.
          platforms: ${{ github.event_name == 'push' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.event_name == 'push' }}
          load: ${{ github.event_name != 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy on built image
        if: ${{ matrix.name == 'api' }}
        uses: aquasecurity/trivy-action@master
        with:
          # On push we have a pushed digest; on PR we scan the locally
          # loaded image by its `sha-<short>` tag (matches metadata-action).
          image-ref: >-
            ${{ github.event_name == 'push'
              && format('ghcr.io/agentic-build/tbite-{0}@{1}', matrix.name, steps.build.outputs.digest)
              || format('ghcr.io/agentic-build/tbite-{0}:sha-{1}', matrix.name, steps.vars.outputs.short_sha) }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: '0'   # Don't fail on findings yet; just report

  # Close the CD loop: after the images are pushed on a main build, bump the
  # single-node overlay's image tags to this build's immutable sha so ArgoCD
  # (which syncs the overlay from main) redeploys the new build automatically.
  # The commit carries [skip ci] so it does not re-trigger this workflow.
  # Only GITHUB_SHA (a trusted hex commit id) is used in run: — no untrusted input.
  bump-image-tags:
    needs: publish
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Bump chart image.tag
        run: |
          set -euo pipefail
          SHA="sha-${GITHUB_SHA::7}"
          f=chart/tbite-platform/values.yaml
          sed -i -E "s|^(  tag: )\"sha-[0-9a-f]+\"|\\1\"${SHA}\"|" "$f"
          if git diff --quiet -- "$f"; then
            echo "image tag already at ${SHA}; nothing to commit"
            exit 0
          fi
          git config user.name "tbite-ci[bot]"
          git config user.email "tbite-ci@users.noreply.github.com"
          git add "$f"
          git commit -m "chore(cd): chart image.tag -> ${SHA} [skip ci]"
          git push origin HEAD:main
