name: cd-publish-images
on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: cd-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: api,           file: services/api/Dockerfile,  context: . }
          - { name: web-employee,  file: apps/employee/Dockerfile, context: . }
          - { name: web-merchant,  file: apps/merchant/Dockerfile, context: . }
          - { name: web-admin,     file: apps/admin/Dockerfile,    context: . }
          - { name: migrations,    file: migrations/Dockerfile,    context: . }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Compute short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # Only push on main / tags. On pull_request we build & verify only.
      - name: Log in to GHCR
        if: ${{ github.event_name == 'push' }}
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata for ${{ matrix.name }}
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ghcr.io/agentic-build/tbite-${{ matrix.name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build (and push on main/tags) ${{ matrix.name }}
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          # Main deploys target the t-bite x86_64 cluster, so keep the
          # publish path single-arch and fast. Tags still publish a
          # multi-arch manifest for portable release images.
          platforms: ${{ github.event_name == 'push' && github.ref != 'refs/heads/main' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.event_name == 'push' }}
          load: ${{ github.event_name != 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy on built image
        if: ${{ matrix.name == 'api' }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          # On push we have a pushed digest; on PR we scan the locally
          # loaded image by its `sha-<short>` tag (matches metadata-action).
          image-ref: >-
            ${{ github.event_name == 'push'
              && format('ghcr.io/agentic-build/tbite-{0}@{1}', matrix.name, steps.build.outputs.digest)
              || format('ghcr.io/agentic-build/tbite-{0}:sha-{1}', matrix.name, steps.vars.outputs.short_sha) }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: '0'   # Don't fail on findings yet; just report

  # Close the CD loop: after the images are pushed on a main build, bump the
  # single-node overlay's image tags to this build's immutable sha so ArgoCD
  # (which syncs the overlay from main) redeploys the new build automatically.
  # The commit carries [skip ci] so it does not re-trigger this workflow.
  # Only GITHUB_SHA (a trusted hex commit id) is used in run: — no untrusted input.
  bump-image-tags:
    needs: publish
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Serialize the write-back so two main builds (e.g. PRs merged close
    # together) never push to main concurrently. cancel-in-progress: false
    # queues rather than drops, so every build's tag bump still lands.
    concurrency:
      group: cd-bump-main
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Bump chart image.tag
        run: |
          set -euo pipefail
          SHA="sha-${GITHUB_SHA::7}"
          f=chart/tbite-platform/values.yaml
          git config user.name "tbite-ci[bot]"
          git config user.email "tbite-ci@users.noreply.github.com"
          # Re-apply the bump on top of the freshest main each attempt and retry
          # on a racing push (non-fast-forward). reset+re-sed avoids rebase
          # conflicts on the tag line; last writer wins, which is the intent.
          for attempt in 1 2 3 4 5; do
            git fetch --quiet origin main
            git reset --hard --quiet origin/main
            sed -i -E "s|^(  tag: )\"sha-[0-9a-f]+\"|\\1\"${SHA}\"|" "$f"
            if git diff --quiet -- "$f"; then
              echo "image tag already at ${SHA}; nothing to commit"
              exit 0
            fi
            git add "$f"
            git commit -m "chore(cd): chart image.tag -> ${SHA} [skip ci]"
            if git push origin HEAD:main; then
              echo "pushed tag bump on attempt ${attempt}"
              exit 0
            fi
            echo "push raced (attempt ${attempt}); retrying"
          done
          echo "::error::failed to push image tag bump after retries" >&2
          exit 1
