name: ci-lint-test
on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10.28.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Seed per-app .env from .env.example for build-time PUBLIC_* imports
        run: |
          shopt -s nullglob
          for ex in apps/*/.env.example; do
            cp -n "$ex" "$(dirname "$ex")/.env"
          done
      - run: pnpm -r --filter "./apps/*" exec svelte-kit sync
      - run: pnpm -r check
      - run: pnpm -r lint
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -l services/)
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-clean — run 'gofmt -w services/':" >&2
            echo "$unformatted" >&2
            exit 1
          fi
      - run: go vet ./...
      - name: SQL injection guard (fmt.Sprintf with SQL keywords)
        run: scripts/security/check-sql-strings.sh
      - run: go build ./...
      - name: Go tests (with testcontainers)
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: go test ./... -timeout 10m
  contract-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache: true
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10.28.0
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Regenerate contract artifacts
        run: |
          go run ./services/api/cmd/contract-export
          pnpm --filter @tbite/api-client generate
      - name: Assert no diff
        run: |
          if ! git diff --exit-code -- contract/openapi packages/api-client/src/schema.d.ts; then
            echo "::error::Contract drift detected. Run 'make contract-sync' and commit." >&2
            exit 1
          fi
