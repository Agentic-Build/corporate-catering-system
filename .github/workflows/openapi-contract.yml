name: OpenAPI Contract Platform

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  contract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust test suite
        run: cargo test --all-targets

      - name: Export OpenAPI artifacts
        run: cargo run --quiet --bin export_openapi_contract -- artifacts/openapi

      - name: Upload machine-readable spec artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: |
            artifacts/openapi/openapi.json
            artifacts/openapi/openapi.yaml

      - name: Upload browsable docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-docs
          path: |
            artifacts/openapi/index.html
            artifacts/openapi/openapi.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install TypeScript generator dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate generated TypeScript client and types
        run: pnpm run contract:verify

      - name: Upload generated TypeScript client artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-ts-client
          path: generated/ts-client
