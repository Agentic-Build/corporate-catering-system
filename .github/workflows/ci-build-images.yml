name: ci-build-images
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: api,           file: services/api/Dockerfile,  context: . }
          - { name: web-employee,  file: apps/employee/Dockerfile, context: . }
          - { name: web-merchant,  file: apps/merchant/Dockerfile, context: . }
          - { name: web-admin,     file: apps/admin/Dockerfile,    context: . }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          load: true
          tags: tbite/${{ matrix.name }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run Trivy on built image
        if: ${{ matrix.name == 'api' }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: tbite/${{ matrix.name }}:ci
          format: table
          severity: HIGH,CRITICAL
          exit-code: '0'   # Don't fail on findings yet; just report
