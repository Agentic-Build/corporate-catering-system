name: image-build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  image-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Run build-correctness gate
        run: ./scripts/check-image-build.sh --evidence-output artifacts/image-build/image-build-evidence.json

      - name: Upload image-build evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-build-evidence
          path: artifacts/image-build
