name: Observability Hard SLO Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  hard-slo-gate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/catering_observability_slo
      PRELAUNCH_AUDIT_TRAIL_ENCRYPTION_KEY_HEX: 1111111111111111111111111111111111111111111111111111111111111111
      PRELAUNCH_PAYROLL_EXPORT_ENCRYPTION_KEY_HEX: 2222222222222222222222222222222222222222222222222222222222222222
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: catering_observability_slo
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d catering_observability_slo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Hard-SLO baseline gate
        run: ./scripts/check-observability-slo-baseline.sh
