name: load-gate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  load-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Start local runtime dependencies
        run: ./scripts/setup-dev.sh up

      - name: Run hard-SLO load gate
        run: |
          set -a
          source ./.env.development
          if [[ -f ./.env.local ]]; then
            source ./.env.local
          fi
          set +a
          ./scripts/check-observability-slo-baseline.sh

      - name: Emit load-gate evidence
        run: |
          mkdir -p artifacts/load-gate
          cat > artifacts/load-gate/load-gate-evidence.json <<JSON
          {
            "gate": "load-gate",
            "status": "passed",
            "generatedAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "commitSha": "${GITHUB_SHA}",
            "checks": [
              "scripts/check-observability-slo-baseline.sh",
              "k6 scenario thresholds from hard-slo-policy.yaml",
              "kustomize production/staging/dev overlay rendering",
              "staged-capacity-policy CLAR-008 validation"
            ],
            "artifacts": [
              "ops/observability/load/reports/prelaunch-k6-summary.json",
              "ops/observability/load/reports/prelaunch-slo-report.json",
              "ops/observability/load/reports/staged-capacity-report.json"
            ]
          }
          JSON

      - name: Upload load-gate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: load-gate-artifacts
          path: |
            artifacts/load-gate
            ops/observability/load/reports/prelaunch-k6-summary.json
            ops/observability/load/reports/prelaunch-slo-report.json
            ops/observability/load/reports/staged-capacity-report.json

      - name: Tear down local runtime dependencies
        if: always()
        run: ./scripts/setup-dev.sh down
