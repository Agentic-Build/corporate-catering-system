name: Observability Hard SLO Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  hard-slo-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Hard-SLO baseline gate
        run: ./scripts/check-observability-slo-baseline.sh
