name: e2e-smoke

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://127.0.0.1:4317

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install web test dependencies
        run: pnpm --dir apps/web install --frozen-lockfile

      - name: Run role-critical smoke gate
        run: ./scripts/check-e2e-smoke.sh --evidence-output artifacts/e2e-smoke/e2e-smoke-evidence.json

      - name: Upload e2e-smoke evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-evidence
          path: artifacts/e2e-smoke
