name: deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  image-build-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Run image-build gate
        run: ./scripts/check-image-build.sh --evidence-output artifacts/deploy-gates/image-build-evidence.json

      - name: Upload image-build gate evidence
        uses: actions/upload-artifact@v4
        with:
          name: deploy-image-build-evidence
          path: artifacts/deploy-gates/image-build-evidence.json

  migration-check-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres,rustls

      - name: Run migration-check gate
        run: ./scripts/check-sqlx-migrations.sh

      - name: Emit migration-check gate evidence
        run: |
          mkdir -p artifacts/deploy-gates
          cat > artifacts/deploy-gates/migration-check-evidence.json <<JSON
          {
            "gate": "migration-check",
            "status": "passed",
            "generatedAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "commitSha": "${GITHUB_SHA}"
          }
          JSON

      - name: Upload migration-check gate evidence
        uses: actions/upload-artifact@v4
        with:
          name: deploy-migration-check-evidence
          path: artifacts/deploy-gates/migration-check-evidence.json

  e2e-smoke-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://127.0.0.1:4317

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install web test dependencies
        run: pnpm --dir apps/web install --frozen-lockfile

      - name: Run e2e-smoke gate
        run: ./scripts/check-e2e-smoke.sh --evidence-output artifacts/deploy-gates/e2e-smoke-evidence.json

      - name: Upload e2e-smoke gate evidence
        uses: actions/upload-artifact@v4
        with:
          name: deploy-e2e-smoke-evidence
          path: artifacts/deploy-gates/e2e-smoke-evidence.json

  load-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Start local runtime dependencies
        run: ./scripts/setup-dev.sh up

      - name: Run hard-SLO load gate
        run: |
          set -a
          source ./.env.development
          if [[ -f ./.env.local ]]; then
            source ./.env.local
          fi
          set +a
          ./scripts/check-observability-slo-baseline.sh

      - name: Emit load-gate evidence
        run: |
          mkdir -p artifacts/deploy-gates
          cat > artifacts/deploy-gates/load-gate-evidence.json <<JSON
          {
            "gate": "load-gate",
            "status": "passed",
            "generatedAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "commitSha": "${GITHUB_SHA}",
            "artifacts": [
              "ops/observability/load/reports/prelaunch-k6-summary.json",
              "ops/observability/load/reports/prelaunch-slo-report.json"
            ]
          }
          JSON

      - name: Upload load-gate gate evidence
        uses: actions/upload-artifact@v4
        with:
          name: deploy-load-gate-evidence
          path: |
            artifacts/deploy-gates/load-gate-evidence.json
            ops/observability/load/reports/prelaunch-k6-summary.json
            ops/observability/load/reports/prelaunch-slo-report.json

      - name: Tear down local runtime dependencies
        if: always()
        run: ./scripts/setup-dev.sh down

  production-overlay-artifact:
    runs-on: ubuntu-latest
    needs:
      - image-build-gate
      - migration-check-gate
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Render production overlay artifact
        run: ./scripts/render-production-overlay.sh --output-dir artifacts/production-overlay

      - name: Upload production overlay artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-overlay-artifacts
          path: artifacts/production-overlay

  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - image-build-gate
      - migration-check-gate
      - e2e-smoke-gate
      - load-gate
      - production-overlay-artifact
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download production overlay artifacts
        uses: actions/download-artifact@v4
        with:
          name: production-overlay-artifacts
          path: artifacts/production-overlay

      - name: Verify production overlay artifact files
        run: |
          test -f artifacts/production-overlay/production-overlay.yaml
          test -f artifacts/production-overlay/production-overlay.sha256
          test -f artifacts/production-overlay/production-overlay-images.txt

      - name: Emit production release evidence
        run: |
          ./scripts/emit-release-evidence.sh \
            --overlay-manifest artifacts/production-overlay/production-overlay.yaml \
            --overlay-digest-file artifacts/production-overlay/production-overlay.sha256 \
            --decision-issue-id ISS-005 \
            --gates image-build,migration-check,e2e-smoke,load-gate,deploy \
            --output artifacts/release/release-evidence.json

      - name: Upload production release evidence
        uses: actions/upload-artifact@v4
        with:
          name: production-release-evidence
          path: artifacts/release/release-evidence.json
