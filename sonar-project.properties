sonar.projectKey=Agentic-Build_corporate-catering-system
sonar.organization=agentic-build

sonar.sources=.
sonar.sourceEncoding=UTF-8

sonar.exclusions=\
    scripts/dev/**/*,\
    scripts/**/*.sql,\
    migrations/**/*.sql,\
    migrations/Dockerfile,\
    ops/load/**/*,\
    ops/demo/**/*,\
    services/api/cmd/lunch-flow/**/*,\
    services/api/cmd/stress/**/*,\
    services/api/cmd/contract-export/**/*,\
    **/*_test.go,\
    **/*.test.ts,\
    **/*.test.tsx,\
    **/*.spec.ts,\
    **/*.spec.tsx,\
    **/testdata/**/*,\
    **/mocks/**/*,\
    **/*.gen.go,\
    **/*.pb.go,\
    **/node_modules/**/*,\
    **/dist/**/*,\
    **/build/**/*,\
    **/.svelte-kit/**/*,\
    contract/**/*

sonar.go.coverage.reportPaths=coverage.out
sonar.javascript.lcov.reportPaths=apps/admin/coverage/lcov.info,apps/employee/coverage/lcov.info,apps/merchant/coverage/lcov.info,packages/*/coverage/lcov.info

sonar.coverage.exclusions=\
    scripts/**/*,\
    migrations/**/*,\
    ops/**/*,\
    services/api/cmd/**/*,\
    tests/**/*,\
    **/*_test.go,\
    **/*.test.ts,\
    **/*.test.tsx,\
    **/testdata/**/*,\
    **/mocks/**/*,\
    **/*.gen.go,\
    **/*.pb.go,\
    chart/**/*,\
    .github/**/*
