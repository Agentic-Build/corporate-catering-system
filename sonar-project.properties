sonar.projectKey=Agentic-Build_corporate-catering-system
sonar.organization=agentic-build

sonar.sources=.
sonar.sourceEncoding=UTF-8

sonar.exclusions=\
    scripts/dev/**,\
    migrations/**.sql,\
    ops/load/**,\
    services/api/cmd/lunch-flow/**,\
    services/api/cmd/stress/**,\
    services/api/cmd/contract-export/**,\
    **/*_test.go,\
    **/*.test.ts,\
    **/*.test.tsx,\
    **/testdata/**,\
    **/mocks/**,\
    **/*.gen.go,\
    **/*.pb.go,\
    node_modules/**,\
    **/dist/**,\
    **/build/**,\
    **/.svelte-kit/**

sonar.go.coverage.reportPaths=coverage.out
sonar.javascript.lcov.reportPaths=apps/admin/coverage/lcov.info,apps/employee/coverage/lcov.info,apps/merchant/coverage/lcov.info,packages/*/coverage/lcov.info

sonar.coverage.exclusions=\
    scripts/**,\
    migrations/**,\
    ops/**,\
    services/api/cmd/**,\
    tests/**,\
    **/*_test.go,\
    **/*.test.ts,\
    **/*.test.tsx,\
    **/testdata/**,\
    **/mocks/**,\
    **/*.gen.go,\
    **/*.pb.go,\
    chart/**,\
    .github/**

sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=docker:S6504
sonar.issue.ignore.multicriteria.e1.resourceKey=migrations/Dockerfile
