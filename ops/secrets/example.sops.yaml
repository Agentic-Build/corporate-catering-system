# ---------------------------------------------------------------------------
# Example secret manifest for the tbite-platform chart.
#
# This file is the SHAPE operators are expected to maintain — the Kubernetes
# Secrets the chart references. Secret names and keys must match the *SecretRef
# values in chart/tbite-platform/values.yaml (global.s3/nats/oidcClientsSecretRef,
# global.authentik.apiTokenSecretRef, api.database.{rw,ro}UrlSecretRef, valkey
# existingSecret, …), which are the authoritative source.
#
# Workflow:
#   1. Copy this file:           cp ops/secrets/example.sops.yaml ops/secrets/<env>/app.sops.yaml
#   2. Fill in real values       (replace every REPLACE_ME below).
#   3. Encrypt in place:         make sops-encrypt FILE=ops/secrets/<env>/app.sops.yaml
#      (equivalent to:           sops -e -i ops/secrets/<env>/app.sops.yaml)
#   4. Commit the encrypted file. The repo's `.sops.yaml` keeps
#      apiVersion/kind/metadata/type in plaintext, so kubectl can still
#      parse the manifest's outer shape post-decrypt.
#   5. Apply at deploy time:     sops -d ops/secrets/<env>/app.sops.yaml | kubectl apply -f -
#      (or let ArgoCD's sops / kustomize-sops plugin handle it; see
#       docs/deployment/secrets.md).
#
# DO NOT encrypt THIS file. It lives in-repo as a documented template;
# encrypting it would just produce noise. Real env files belong under
# ops/secrets/<env>/.
# ---------------------------------------------------------------------------

# --- Postgres DSNs (api.database.{rw,ro}UrlSecretRef = tbite-db) -----------
# rw goes to the CNPG primary, ro to the `-ro` replica service. Format:
#   postgres://USER:PASSWORD@HOST:5432/DBNAME?sslmode=require
apiVersion: v1
kind: Secret
metadata:
  name: tbite-db
  namespace: tbite
  labels:
    app.kubernetes.io/part-of: tbite-platform
    app.kubernetes.io/managed-by: sops
type: Opaque
stringData:
  rwUrl: REPLACE_ME
  roUrl: REPLACE_ME
---
# --- S3 / MinIO (global.s3.credentialsSecretRef = tbite-s3) -----------------
# Used by the API for media uploads + the export worker for report artefacts.
apiVersion: v1
kind: Secret
metadata:
  name: tbite-s3
  namespace: tbite
  labels:
    app.kubernetes.io/part-of: tbite-platform
    app.kubernetes.io/managed-by: sops
type: Opaque
stringData:
  accessKeyID: REPLACE_ME
  secretAccessKey: REPLACE_ME
---
# --- NATS JetStream (global.nats.credentialsSecretRef = tbite-nats) ---------
# `creds` is the NATS credentials file contents (nkey/JWT). Plain user/pass
# deployments can embed them in global.nats.url instead and leave this empty.
apiVersion: v1
kind: Secret
metadata:
  name: tbite-nats
  namespace: tbite
  labels:
    app.kubernetes.io/part-of: tbite-platform
    app.kubernetes.io/managed-by: sops
type: Opaque
stringData:
  creds: REPLACE_ME
---
# --- API OIDC client_secret (global.oidcClientsSecretRef = tbite-oidc-clients)
# The API role reads AUTH_PROVIDER_AUTHENTIK_CLIENT_SECRET from this secret's
# `apiClientSecret` key (client_id `tbite` is non-secret, set in values.yaml).
# Authentik generates the client_secret on install; the chart does NOT create
# this secret, so mirror Authentik's value here (this is the historical
# login-502 drift source — keep the two in sync). The SSR frontends do not
# need their own client_secret; they sign in through the API's auth endpoints.
apiVersion: v1
kind: Secret
metadata:
  name: tbite-oidc-clients
  namespace: tbite
  labels:
    app.kubernetes.io/part-of: tbite-platform
    app.kubernetes.io/managed-by: sops
type: Opaque
stringData:
  apiClientSecret: REPLACE_ME
---
# --- Authentik admin API token (global.authentik.apiTokenSecretRef = tbite-authentik)
apiVersion: v1
kind: Secret
metadata:
  name: tbite-authentik
  namespace: tbite
  labels:
    app.kubernetes.io/part-of: tbite-platform
    app.kubernetes.io/managed-by: sops
type: Opaque
stringData:
  apiToken: REPLACE_ME
---
# --- Valkey/Redis password (valkey.auth.existingSecret = tbite-valkey) ------
apiVersion: v1
kind: Secret
metadata:
  name: tbite-valkey
  namespace: tbite
  labels:
    app.kubernetes.io/part-of: tbite-platform
    app.kubernetes.io/managed-by: sops
type: Opaque
stringData:
  password: REPLACE_ME

---
apiVersion: v1
kind: Secret
metadata:
  name: tbite-authentik-config
  namespace: tbite
  labels:
    app.kubernetes.io/part-of: tbite-platform
    app.kubernetes.io/managed-by: sops
type: Opaque
stringData:
  AUTHENTIK_SECRET_KEY: REPLACE_ME
  AUTHENTIK_POSTGRESQL__HOST: tbite-pg-rw.tbite.svc.cluster.local
  AUTHENTIK_POSTGRESQL__NAME: authentik
  AUTHENTIK_POSTGRESQL__USER: authentik
  AUTHENTIK_POSTGRESQL__PASSWORD: REPLACE_ME
  AUTHENTIK_REDIS__HOST: tbite-valkey-primary.tbite.svc.cluster.local
---
apiVersion: v1
kind: Secret
metadata:
  # Must match `<release>-tbite-platform-authentik-bootstrap` for the
  # default release name `tbite`.
  name: tbite-tbite-platform-authentik-bootstrap
  namespace: tbite
  labels:
    app.kubernetes.io/part-of: tbite-platform
    app.kubernetes.io/managed-by: sops
type: Opaque
stringData:
  AUTHENTIK_BOOTSTRAP_PASSWORD: REPLACE_ME
  AUTHENTIK_BOOTSTRAP_TOKEN: REPLACE_ME
  AUTHENTIK_BOOTSTRAP_EMAIL: ops@tbite.example.com
---
apiVersion: v1
kind: Secret
metadata:
  name: tbite-hydra
  namespace: tbite
  labels:
    app.kubernetes.io/part-of: tbite-platform
    app.kubernetes.io/managed-by: sops
type: Opaque
stringData:
  # The Ory chart reads these exact keys when hydra.secret.enabled=false.
  dsn: postgres://hydra:REPLACE_ME@tbite-pg-rw.tbite.svc.cluster.local:5432/hydra?sslmode=require
  secretsSystem: REPLACE_ME
  secretsCookie: REPLACE_ME
  # The umbrella chart's identity DB hook uses this to create the hydra role.
  postgresPassword: REPLACE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: tbite-grafana-admin
  namespace: tbite
  labels:
    app.kubernetes.io/part-of: tbite-platform
    app.kubernetes.io/managed-by: sops
type: Opaque
stringData:
  admin-user: admin
  password: REPLACE_ME
