# ---------------------------------------------------------------------------
# Example secret manifest for the tbite-platform chart.
#
# This file is the SHAPE operators are expected to maintain — one Kubernetes
# Secret per environment, with stringData keys that match the secretKeyRef
# names referenced by the chart values (and the kustomize overlays under
# ops/kubernetes/overlays/<env>/).
#
# Workflow:
#   1. Copy this file:           cp ops/secrets/example.sops.yaml ops/secrets/<env>/app.sops.yaml
#   2. Fill in real values       (replace every REPLACE_ME below).
#   3. Encrypt in place:         make sops-encrypt FILE=ops/secrets/<env>/app.sops.yaml
#      (equivalent to:           sops -e -i ops/secrets/<env>/app.sops.yaml)
#   4. Commit the encrypted file. The repo's `.sops.yaml` keeps
#      apiVersion/kind/metadata/type in plaintext, so kubectl can still
#      parse the manifest's outer shape post-decrypt.
#   5. Apply at deploy time:     sops -d ops/secrets/<env>/app.sops.yaml | kubectl apply -f -
#      (or let ArgoCD's sops / kustomize-sops plugin handle it; see
#       docs/deployment/secrets.md).
#
# DO NOT encrypt THIS file. It lives in-repo as a documented template;
# encrypting it would just produce noise. Real env files belong under
# ops/secrets/<env>/.
# ---------------------------------------------------------------------------

apiVersion: v1
kind: Secret
metadata:
  name: tbite-app-secrets
  namespace: tbite
  labels:
    app.kubernetes.io/part-of: tbite-platform
    app.kubernetes.io/managed-by: sops
type: Opaque
stringData:
  # --- Postgres (CNPG) ---------------------------------------------------
  # Full DSN used by the API/workers. rw goes to the primary, ro hits the
  # read replicas via the CNPG `-ro` service. Format:
  #   postgres://USER:PASSWORD@HOST:5432/DBNAME?sslmode=require
  DATABASE_RW_URL: REPLACE_ME
  DATABASE_RO_URL: REPLACE_ME

  # --- NATS JetStream ----------------------------------------------------
  # If you front NATS with nkeys or operator-mode JWTs, drop the seed/JWT
  # in here and have the API mount it as a file via subPath. For the
  # simpler username/password path:
  NATS_URL: REPLACE_ME            # e.g. nats://app:PASSWORD@nats.tbite.svc:4222
  NATS_USERNAME: REPLACE_ME
  NATS_PASSWORD: REPLACE_ME

  # --- S3 / MinIO --------------------------------------------------------
  # Used by the API for media uploads + by the export worker for report
  # artefacts. Endpoint is the in-cluster MinIO service when running the
  # bundled tenant, or your cloud S3 endpoint when BYO.
  S3_ENDPOINT: REPLACE_ME         # e.g. https://minio.tbite.svc:9000
  S3_REGION: REPLACE_ME           # e.g. us-east-1 (MinIO ignores but SDK requires)
  S3_BUCKET: REPLACE_ME
  S3_ACCESS_KEY_ID: REPLACE_ME
  S3_SECRET_ACCESS_KEY: REPLACE_ME

  # --- OIDC clients (Authentik issues these; one per SSR frontend +
  #     one for the API's server-to-server flow). ---------------------------
  AUTH_PROVIDER_AUTHENTIK_CLIENT_ID: REPLACE_ME
  AUTH_PROVIDER_AUTHENTIK_CLIENT_SECRET: REPLACE_ME
  AUTH_PROVIDER_AUTHENTIK_EMPLOYEE_CLIENT_ID: REPLACE_ME
  AUTH_PROVIDER_AUTHENTIK_EMPLOYEE_CLIENT_SECRET: REPLACE_ME
  AUTH_PROVIDER_AUTHENTIK_MERCHANT_CLIENT_ID: REPLACE_ME
  AUTH_PROVIDER_AUTHENTIK_MERCHANT_CLIENT_SECRET: REPLACE_ME
  AUTH_PROVIDER_AUTHENTIK_ADMIN_CLIENT_ID: REPLACE_ME
  AUTH_PROVIDER_AUTHENTIK_ADMIN_CLIENT_SECRET: REPLACE_ME

  # --- Authentik admin API (provisioner / user-sync worker) --------------
  AUTHENTIK_API_TOKEN: REPLACE_ME

---
apiVersion: v1
kind: Secret
metadata:
  name: tbite-authentik-config
  namespace: tbite
  labels:
    app.kubernetes.io/part-of: tbite-platform
    app.kubernetes.io/managed-by: sops
type: Opaque
stringData:
  AUTHENTIK_SECRET_KEY: REPLACE_ME
  AUTHENTIK_POSTGRESQL__HOST: tbite-pg-rw.tbite.svc.cluster.local
  AUTHENTIK_POSTGRESQL__NAME: authentik
  AUTHENTIK_POSTGRESQL__USER: authentik
  AUTHENTIK_POSTGRESQL__PASSWORD: REPLACE_ME
  AUTHENTIK_REDIS__HOST: tbite-valkey-primary.tbite.svc.cluster.local
---
apiVersion: v1
kind: Secret
metadata:
  # Must match `<release>-tbite-platform-authentik-bootstrap` for the
  # default release name `tbite`.
  name: tbite-tbite-platform-authentik-bootstrap
  namespace: tbite
  labels:
    app.kubernetes.io/part-of: tbite-platform
    app.kubernetes.io/managed-by: sops
type: Opaque
stringData:
  AUTHENTIK_BOOTSTRAP_PASSWORD: REPLACE_ME
  AUTHENTIK_BOOTSTRAP_TOKEN: REPLACE_ME
  AUTHENTIK_BOOTSTRAP_EMAIL: ops@tbite.example.com
---
apiVersion: v1
kind: Secret
metadata:
  name: tbite-hydra
  namespace: tbite
  labels:
    app.kubernetes.io/part-of: tbite-platform
    app.kubernetes.io/managed-by: sops
type: Opaque
stringData:
  # The Ory chart reads these exact keys when hydra.secret.enabled=false.
  dsn: postgres://hydra:REPLACE_ME@tbite-pg-rw.tbite.svc.cluster.local:5432/hydra?sslmode=require
  secretsSystem: REPLACE_ME
  secretsCookie: REPLACE_ME
  # The umbrella chart's identity DB hook uses this to create the hydra role.
  postgresPassword: REPLACE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: tbite-grafana-admin
  namespace: tbite
  labels:
    app.kubernetes.io/part-of: tbite-platform
    app.kubernetes.io/managed-by: sops
type: Opaque
stringData:
  admin-user: admin
  password: REPLACE_ME
