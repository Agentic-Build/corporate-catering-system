# GHCR imagePullSecret TEMPLATE — only needed if the GHCR packages are PRIVATE.
#
# If you set the four `ghcr.io/agentic-build/tbite-*` packages to PUBLIC
# (recommended for this single-node surface), the cluster can pull anonymously
# and you do NOT need this Secret at all.
#
# DO NOT commit a real token. Generate the Secret out-of-band, e.g.:
#
#   kubectl -n tbite create secret docker-registry ghcr-pull \
#     --docker-server=ghcr.io \
#     --docker-username='<github-username>' \
#     --docker-password='<github-PAT-with-read:packages>' \
#     --docker-email='<you@example.com>'
#
# Then reference it from the Deployments (e.g. via a kustomize patch that adds
# `spec.template.spec.imagePullSecrets: [{name: ghcr-pull}]`), or attach it to
# the `default` ServiceAccount in the tbite namespace:
#
#   kubectl -n tbite patch serviceaccount default \
#     -p '{"imagePullSecrets":[{"name":"ghcr-pull"}]}'
#
# The manifest below is the equivalent declarative form with a PLACEHOLDER.
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull
  namespace: tbite
type: kubernetes.io/dockerconfigjson
data:
  # PLACEHOLDER — base64 of a ~/.docker/config.json with ghcr.io auth.
  # Replace before applying; never commit a real value.
  .dockerconfigjson: PLACEHOLDER_BASE64_DOCKERCONFIGJSON
