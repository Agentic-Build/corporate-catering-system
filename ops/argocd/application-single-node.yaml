apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tbite-single-node
  namespace: argocd
  # Image tags are bumped by cd-publish-images git write-back (not the
  # argocd-image-updater, whose v1.x form uses a separate CRD).
spec:
  project: tbite
  source:
    repoURL: https://github.com/Agentic-Build/corporate-catering-system.git
    targetRevision: main
    # Image tags live in the overlay's `images:` (immutable GHCR sha-<gitsha>),
    # bumped by the cd-publish-images git write-back on every push to main — so
    # we do NOT override images here.
    path: ops/kubernetes/overlays/single-node
  destination:
    server: https://kubernetes.default.svc
    namespace: tbite
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
  # The api Deployment is scaled by an HPA (ops/kubernetes/base/hpa-api.yaml).
  # Ignore replica drift so ArgoCD doesn't perpetually report OutOfSync and
  # selfHeal-revert the autoscaler's chosen replica count on every reconcile.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
