apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: tbite
  namespace: argocd
  # Finalizer ensures the project's child Applications are cleaned up first.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: T-Bite corporate catering platform

  # Only this repo may be used as an Application source.
  sourceRepos:
    - https://github.com/Agentic-Build/corporate-catering-system.git

  # In-cluster only. Any namespace: the single-node overlay deploys the app
  # into `tbite` AND composes the monitoring stack (../../monitoring) into the
  # `monitoring` namespace, so the project must permit both. This is a trusted
  # single-node box, so we allow any in-cluster namespace rather than enumerate.
  destinations:
    - server: https://kubernetes.default.svc
      namespace: '*'

  # Namespaced resources the apps need (apps, deployments, services,
  # ingress, configmaps, secrets, HPAs, PDBs, networkpolicies, SAs, ...).
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'

  # Cluster-scoped resources: the overlay renders Namespace + IngressClass, and
  # the monitoring stack adds ClusterRole/ClusterRoleBinding (+ possibly CRDs).
  # Single-node staging — allow all cluster-scoped kinds rather than enumerate.
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
