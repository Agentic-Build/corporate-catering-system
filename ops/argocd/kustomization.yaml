apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Bootstrap the T-Bite CD root: the AppProject + the environment-specific
# default Application.
# Apply against a cluster that already has ArgoCD installed in `argocd`:
#   kubectl apply -k ops/argocd/
#
# The optional GHCR pull Secret template and the generic TSMC demo
# Application are intentionally NOT listed here. Apply
# application-tsmc-demo.yaml directly when following the TSMC demo playbook.
namespace: argocd

resources:
  - project.yaml
  # Helm umbrella chart Application. The Helm chart is the sole
  # canonical deployment path.
  - application-helm.yaml
