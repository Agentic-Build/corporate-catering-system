receivers:
  otlp:
    protocols:
      grpc: {}
      http: {}

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128
  batch:
    send_batch_size: 8192
    timeout: 5s
  resource/correlation:
    attributes:
      - key: service.namespace
        value: corporate-catering
        action: upsert
      - key: deployment.environment
        value: production
        action: upsert
      - key: telemetry.stack
        value: victoria
        action: upsert
  attributes/correlation:
    actions:
      - key: trace_id
        from_attribute: trace_id
        action: upsert
      - key: span_id
        from_attribute: span_id
        action: upsert
      - key: request_id
        from_attribute: request_id
        action: upsert
      - key: operation_id
        from_attribute: operation_id
        action: upsert

exporters:
  otlphttp/victoria_traces:
    endpoint: http://victoria-traces.monitoring.svc.cluster.local:4318
    tls:
      insecure: true
  prometheusremotewrite/victoria_metrics:
    endpoint: http://victoria-metrics-vminsert.monitoring.svc.cluster.local:8480/insert/0/prometheus/api/v1/write
  otlphttp/victoria_logs:
    endpoint: http://victoria-logs.monitoring.svc.cluster.local:9428/insert/opentelemetry/v1/logs
    tls:
      insecure: true

service:
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - resource/correlation
        - batch
      exporters:
        - otlphttp/victoria_traces
    metrics:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - resource/correlation
        - batch
      exporters:
        - prometheusremotewrite/victoria_metrics
    logs:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - resource/correlation
        - attributes/correlation
        - batch
      exporters:
        - otlphttp/victoria_logs
