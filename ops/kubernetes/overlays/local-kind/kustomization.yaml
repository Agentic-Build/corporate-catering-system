apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: catering-local-kind
resources:
  - ../../base
commonAnnotations:
  runtime.corporate-catering.io/environment: local-kind
  runtime.corporate-catering.io/scaling-strategy: single-replica-local-validation
  runtime.corporate-catering.io/topology-strategy: external-host-dependencies
images:
  - name: ghcr.io/corporate-catering/system
    newName: corporate-catering/system
    newTag: dev
  - name: ghcr.io/corporate-catering/web
    newName: corporate-catering/web
    newTag: dev
patches:
  - path: patch-runtime-values.yaml
  - target:
      group: external-secrets.io
      version: v1beta1
      kind: ExternalSecret
      name: corporate-catering-runtime-secrets
    patch: |-
      $patch: delete
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: corporate-catering-runtime-secrets
  - target:
      group: external-secrets.io
      version: v1beta1
      kind: ExternalSecret
      name: corporate-catering-postgres-app-user
    patch: |-
      $patch: delete
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: corporate-catering-postgres-app-user
  - target:
      group: external-secrets.io
      version: v1beta1
      kind: ExternalSecret
      name: corporate-catering-postgres-superuser
    patch: |-
      $patch: delete
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: corporate-catering-postgres-superuser
  - target:
      group: postgresql.cnpg.io
      version: v1
      kind: Cluster
      name: corporate-catering-postgres
    patch: |-
      $patch: delete
      apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      metadata:
        name: corporate-catering-postgres
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: corporate-catering-pgbouncer-rw
