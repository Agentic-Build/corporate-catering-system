      name: corporate-catering-pgbouncer-rw
    patch: |-
      $patch: delete
      apiVersion: v1
      kind: Service
      metadata:
        name: corporate-catering-pgbouncer-rw
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: corporate-catering-pgbouncer-ro
