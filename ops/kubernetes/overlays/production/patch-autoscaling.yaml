apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: corporate-catering-api
spec:
  minReplicas: 6
  maxReplicas: 30
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: corporate-catering-mcp
spec:
  minReplicas: 4
  maxReplicas: 20
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: corporate-catering-web
spec:
  minReplicas: 4
  maxReplicas: 18
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: corporate-catering-compliance-worker
spec:
  minReplicaCount: 3
  maxReplicaCount: 15
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://victoria-metrics-vmsingle.observability.svc.cluster.local:8429
        metricName: compliance_lifecycle_jobs_in_flight
        threshold: "20"
        query: avg(compliance_lifecycle_jobs_in_flight)
    - type: cpu
      metricType: Utilization
      metadata:
        value: "65"
