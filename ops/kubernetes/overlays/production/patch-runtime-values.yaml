apiVersion: apps/v1
kind: Deployment
metadata:
  name: corporate-catering-api
spec:
  replicas: 6
  template:
    spec:
      containers:
        - name: api
          env:
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.namespace=corporate-catering,deployment.environment=production,k8s.namespace.name=$(POD_NAMESPACE)
            - name: DEPLOYMENT_ENVIRONMENT
              value: production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: corporate-catering-mcp
spec:
  replicas: 4
  template:
    spec:
      containers:
        - name: mcp
          env:
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.namespace=corporate-catering,deployment.environment=production,k8s.namespace.name=$(POD_NAMESPACE)
            - name: DEPLOYMENT_ENVIRONMENT
              value: production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: corporate-catering-compliance-worker
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: compliance-worker
          env:
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.namespace=corporate-catering,deployment.environment=production,k8s.namespace.name=$(POD_NAMESPACE)
            - name: DEPLOYMENT_ENVIRONMENT
              value: production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: corporate-catering-web
spec:
  replicas: 4
  template:
    spec:
      containers:
        - name: web
          env:
            - name: DEPLOYMENT_ENVIRONMENT
              value: production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: corporate-catering-pgbouncer-rw
spec:
  replicas: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: corporate-catering-pgbouncer-ro
spec:
  replicas: 3
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: corporate-catering-postgres
spec:
  instances: 3
