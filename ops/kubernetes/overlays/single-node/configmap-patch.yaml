apiVersion: v1
kind: ConfigMap
metadata:
  name: tbite-config
  namespace: tbite
data:
  # Single-node overlay: RW and RO point at the same Postgres pod (no replica in dev).
  DATABASE_RW_URL: "postgres://tbite:tbite@postgres:5432/tbite?sslmode=disable"
  DATABASE_RO_URL: "postgres://tbite:tbite@postgres:5432/tbite?sslmode=disable"
  REDIS_URL: "redis://redis:6379/0"
  NATS_URL: "nats://nats:4222"
  S3_ENDPOINT: "http://minio:9000"
  S3_BUCKET: "tbite"
  # MinIO needs static creds + path-style addressing. Values match the
  # MINIO_ROOT_USER/PASSWORD in secrets-bootstrap (dev values). Without these
  # the worker's startup bucket-ensure fails with "static credentials are empty".
  S3_ACCESS_KEY_ID: "tbite"
  S3_SECRET_ACCESS_KEY: "tbite-dev-secret"
  S3_REGION: "us-east-1"
  S3_USE_PATH_STYLE: "1"
  OIDC_CALLBACK_BASE_URL: "https://api-tbite.takalawang.dev"
  AUTH_PROVIDER_SLUGS: "authentik"
  AUTH_PROVIDER_AUTHENTIK_DISPLAY_NAME: "Authentik"
  # Public (Cloudflare Tunnel) issuer so it is identical for the API's discovery
  # and the browser-facing authorize/callback — OIDC requires the issuer in the
  # discovery doc, the token `iss`, and the browser redirect to all match.
  # Authentik is exposed at auth-tbite.takalawang.dev via the tunnel.
  AUTH_PROVIDER_AUTHENTIK_ISSUER_URL: "https://auth-tbite.takalawang.dev/application/o/tbite/"
  AUTH_PROVIDER_AUTHENTIK_SCOPES: "openid email profile tbite"
  # Admin API stays in-cluster (server-to-server, no browser) to avoid hairpin.
  AUTHENTIK_BASE_URL: "http://authentik:9000"
  AUTHENTIK_API_TOKEN: "tbite-dev-authentik-api-token"
  AUTHENTIK_VENDOR_OPERATOR_GROUP: "tbite:role:vendor_operator"
  HYDRA_PUBLIC_URL: "http://hydra:4444"
  HYDRA_ADMIN_URL: "http://hydra:4445"
  APP_BASE_URL_EMPLOYEE: "https://employee-tbite.takalawang.dev"
  APP_BASE_URL_MERCHANT: "https://merchant-tbite.takalawang.dev"
  APP_BASE_URL_ADMIN:    "https://admin-tbite.takalawang.dev"
