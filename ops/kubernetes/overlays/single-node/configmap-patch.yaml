apiVersion: v1
kind: ConfigMap
metadata:
  name: tbite-config
  namespace: tbite
data:
  # Single-node overlay: RW and RO point at the same Postgres pod (no replica in dev).
  DATABASE_RW_URL: "postgres://tbite:tbite@postgres:5432/tbite?sslmode=disable"
  DATABASE_RO_URL: "postgres://tbite:tbite@postgres:5432/tbite?sslmode=disable"
  REDIS_URL: "redis://redis:6379/0"
  NATS_URL: "nats://nats:4222"
  S3_ENDPOINT: "http://minio:9000"
  S3_BUCKET: "tbite"
  # MinIO needs static creds + path-style addressing. Values match the
  # MINIO_ROOT_USER/PASSWORD in secrets-bootstrap (dev values). Without these
  # the worker's startup bucket-ensure fails with "static credentials are empty".
  S3_ACCESS_KEY_ID: "tbite"
  S3_SECRET_ACCESS_KEY: "tbite-dev-secret"
  S3_REGION: "us-east-1"
  S3_USE_PATH_STYLE: "1"
  OIDC_CALLBACK_BASE_URL: "http://api.tbite.test"
  AUTH_PROVIDER_SLUGS: "authentik"
  AUTH_PROVIDER_AUTHENTIK_DISPLAY_NAME: "Authentik"
  # In-cluster Service URLs so the API's boot-time OIDC/Hydra discovery
  # succeeds and the pods reach Running/Healthy. The browser-facing OIDC flow
  # (issuer/redirect consistency through the ingress) is follow-up work; this
  # overlay's goal is pod liveness + API healthz, not the full login round-trip.
  AUTH_PROVIDER_AUTHENTIK_ISSUER_URL: "http://authentik:9000/application/o/tbite/"
  AUTH_PROVIDER_AUTHENTIK_SCOPES: "openid email profile tbite"
  AUTHENTIK_BASE_URL: "http://authentik:9000"
  AUTHENTIK_API_TOKEN: "tbite-dev-authentik-api-token"
  AUTHENTIK_VENDOR_OPERATOR_GROUP: "tbite:role:vendor_operator"
  HYDRA_PUBLIC_URL: "http://hydra:4444"
  HYDRA_ADMIN_URL: "http://hydra:4445"
  APP_BASE_URL_EMPLOYEE: "http://app.tbite.test"
  APP_BASE_URL_MERCHANT: "http://merchant.tbite.test"
  APP_BASE_URL_ADMIN:    "http://admin.tbite.test"
