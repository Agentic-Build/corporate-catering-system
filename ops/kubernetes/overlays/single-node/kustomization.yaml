apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Single-node overlay (k3d / kind / Docker Desktop K8s).
# Adds self-hosted single-pod Postgres / Redis / NATS / MinIO / Authentik /
# Hydra + a dev Secret + an allow-all NetworkPolicy (relaxes the base
# default-deny on this trusted single-node box) + patches the base ConfigMap
# with in-cluster connection strings, AND composes the monitoring stack
# (../../monitoring) so Grafana/VM/VL/VT/OTel/exporters/vmalert run alongside
# the app. HA / clustered variants land in P8.
#
# No top-level `namespace:` because we compose two bases (../../base in tbite
# and ../../monitoring in monitoring) — letting kustomize rewrite both to a
# single namespace would collide.

resources:
  - ../../base
  - ../../monitoring
  - secrets-bootstrap.yaml
  - monitoring-secrets.yaml
  - allow-all.yaml
  - postgres.yaml
  - redis.yaml
  - nats.yaml
  - minio.yaml
  - authentik.yaml
  - hydra.yaml
  - nginx-ingress.yaml
  - cloudflared.yaml
  - db-migrate.yaml

# Authentik blueprint mounted into the server + worker pods at
# /blueprints/tbite.yaml (mirrors the compose bind-mount). The blueprint is
# vendored as authentik-blueprint.tbite.yaml (a copy of the canonical
# ops/local/authentik/blueprints/tbite.yaml) because kustomize's default
# load-restrictor — which ArgoCD also enforces — forbids reading files outside
# the kustomization root. Keep the two copies in sync.
configMapGenerator:
  - name: authentik-blueprints
    files:
      - tbite.yaml=authentik-blueprint.tbite.yaml

generatorOptions:
  disableNameSuffixHash: true

# Merge dev URLs into the base ConfigMap.
patches:
  - path: configmap-patch.yaml
    target:
      kind: ConfigMap
      name: tbite-config
  # Single-node Grafana: anonymous Admin so devs land straight in the UI.
  - path: grafana-runtime-patch.yaml
    target:
      kind: ConfigMap
      name: grafana-runtime-config

# Pin app images to the local :dev tag built by `make dev-up` (Task 14).
images:
  - name: tbite/api
    newTag: dev
  - name: tbite/web-employee
    newTag: dev
  - name: tbite/web-merchant
    newTag: dev
  - name: tbite/web-admin
    newTag: dev
