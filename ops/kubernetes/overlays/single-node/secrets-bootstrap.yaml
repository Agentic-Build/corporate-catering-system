# DO NOT USE OUTSIDE LOCAL DEV. Plaintext dev secrets.
# This Secret bootstraps single-node dev credentials for Postgres + MinIO.
# Real environments must source secrets from an external manager (ESO / SOPS / cloud KMS).
apiVersion: v1
kind: Secret
metadata:
  name: tbite-dev-secrets
  namespace: tbite
  labels:
    app.kubernetes.io/part-of: tbite
    app.kubernetes.io/managed-by: kustomize
type: Opaque
stringData:
  POSTGRES_DB: tbite
  POSTGRES_USER: tbite
  POSTGRES_PASSWORD: tbite
  MINIO_ROOT_USER: tbite
  MINIO_ROOT_PASSWORD: tbite-dev-secret
  # Authentik dev placeholders. Replace in any environment beyond the local
  # single-node overlay.
  AUTH_PROVIDER_AUTHENTIK_CLIENT_ID: "tbite-local"
  AUTH_PROVIDER_AUTHENTIK_CLIENT_SECRET: "tbite-local-client-secret"
  AUTHENTIK_API_TOKEN: "tbite-dev-authentik-api-token"
