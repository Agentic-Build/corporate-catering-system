# DO NOT USE OUTSIDE LOCAL DEV. Plaintext dev secrets.
# This Secret bootstraps single-node dev credentials for Postgres + MinIO.
# Real environments must source secrets from an external manager (ESO / SOPS / cloud KMS).
apiVersion: v1
kind: Secret
metadata:
  name: tbite-dev-secrets
  namespace: tbite
  labels:
    app.kubernetes.io/part-of: tbite
    app.kubernetes.io/managed-by: kustomize
type: Opaque
stringData:
  POSTGRES_DB: tbite
  POSTGRES_USER: tbite
  POSTGRES_PASSWORD: tbite
  MINIO_ROOT_USER: tbite
  MINIO_ROOT_PASSWORD: tbite-dev-secret
  # OIDC dev placeholders. Replace with real client credentials in any
  # environment beyond the local single-node overlay.
  OIDC_GOOGLE_CLIENT_ID: "dev-google-client-id"
  OIDC_GOOGLE_CLIENT_SECRET: "dev-google-client-secret"
  OIDC_GITHUB_CLIENT_ID: "dev-github-client-id"
  OIDC_GITHUB_CLIENT_SECRET: "dev-github-client-secret"
