# Schema migration for the app database.
#
# Runs `migrate up` against Postgres on every ArgoCD sync (Sync hook, recreated
# each time) so the schema is applied automatically on deploy and stays current
# as migrations are added. Idempotent: `up` is a no-op when already current.
#
# Migrations are read straight from the PUBLIC repo via golang-migrate's github
# source (works token-less for public repos) — avoids vendoring the SQL into the
# overlay (kustomize's load-restrictor forbids reading repo-root /migrations) and
# avoids building a dedicated image. The retry loop waits for Postgres to accept
# connections, so this is NOT a PreSync hook (a PreSync hook would run before
# postgres/networkpolicy exist and deadlock).
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: tbite
  labels:
    app.kubernetes.io/name: db-migrate
    app.kubernetes.io/component: migrate
    app.kubernetes.io/part-of: tbite
    app.kubernetes.io/managed-by: kustomize
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db-migrate
        app.kubernetes.io/component: migrate
        app.kubernetes.io/part-of: tbite
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: migrate/migrate:v4.18.1
          env:
            - name: DATABASE_RW_URL
              valueFrom:
                configMapKeyRef:
                  name: tbite-config
                  key: DATABASE_RW_URL
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -u
              SRC='github://Agentic-Build/corporate-catering-system/migrations#main'
              i=0
              while :; do
                i=$((i + 1))
                if out=$(migrate -source "$SRC" -database "$DATABASE_RW_URL" up 2>&1); then
                  echo "$out"; echo "migrations applied"; exit 0
                fi
                case "$out" in
                  *"no change"*) echo "$out"; echo "schema already up-to-date"; exit 0 ;;
                esac
                echo "attempt $i failed: $out"
                [ "$i" -ge 40 ] && { echo "giving up after $i attempts"; exit 1; }
                sleep 3
              done
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
