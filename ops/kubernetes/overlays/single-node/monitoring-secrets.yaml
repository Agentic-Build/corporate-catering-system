# DO NOT USE OUTSIDE LOCAL / SINGLE-NODE DEV. Plaintext dev credentials
# for the observability exporters. Real environments source these from
# External Secrets / KMS (see overlays/gcp/external-secrets.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: monitoring-secrets
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: tbite-observability
    app.kubernetes.io/managed-by: kustomize
type: Opaque
stringData:
  # Single-node overlay deploys postgres / redis / nats inside the tbite
  # namespace, so these DSNs cross namespaces.
  POSTGRES_DSN: "postgresql://tbite:tbite@postgres.tbite.svc.cluster.local:5432/tbite?sslmode=disable"
  REDIS_ADDR: "redis://redis.tbite.svc.cluster.local:6379"
  NATS_MONITORING_URL: "http://nats.tbite.svc.cluster.local:8222"
  # Grafana is anonymous Admin on single-node, so admin user/pwd are placeholders.
  GRAFANA_ADMIN_USER: "admin"
  GRAFANA_ADMIN_PASSWORD: "tbite-dev-grafana"
