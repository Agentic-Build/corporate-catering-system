# Single-node ingress strategy
# ----------------------------
# This overlay does NOT bundle the ingress-nginx controller. Shipping the
# full controller manifest would duplicate hundreds of lines of upstream
# YAML that drift quickly. Instead, the dev-up flow (Task 14, make dev-up)
# is expected to install ingress-nginx via Helm against the dev cluster:
#
#   k3d cluster create tbite \
#       --k3s-arg "--disable=traefik@server:0" \
#       -p "80:80@loadbalancer" -p "443:443@loadbalancer"
#
#   helm upgrade --install ingress-nginx ingress-nginx \
#       --repo https://kubernetes.github.io/ingress-nginx \
#       --namespace ingress-nginx --create-namespace
#
# kind users: use cloud-provider-kind or the upstream
# https://kind.sigs.k8s.io/docs/user/ingress/#ingress-nginx manifest.
#
# We declare an IngressClass here so the base Ingress (ingressClassName: nginx)
# binds correctly once the controller is installed.
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: nginx
  labels:
    app.kubernetes.io/part-of: tbite
    app.kubernetes.io/managed-by: kustomize
  annotations:
    ingressclass.kubernetes.io/is-default-class: "true"
spec:
  controller: k8s.io/ingress-nginx
