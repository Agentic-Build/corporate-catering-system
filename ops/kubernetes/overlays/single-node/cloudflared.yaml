# Cloudflare Tunnel connector for the single-node overlay.
#
# Exposes the cluster to the internet over an OUTBOUND tunnel (no inbound port,
# HTTPS terminated at Cloudflare's edge — required because `.dev` is HSTS-preload
# HTTPS-only). cloudflared dials Cloudflare and serves the public hostnames
# (employee/merchant/admin/api/auth-tbite.takalawang.dev) straight to the
# in-cluster Services, replacing an ingress controller for this deployment.
#
# Two pieces live OUTSIDE git and must exist for this to work:
#   1. Secret `cloudflared-token` (key `token`) — the tunnel connector token.
#      Created out-of-band (a credential, never committed). Obtain via the
#      Cloudflare API (`GET /accounts/{acct}/cfd_tunnel/{id}/token`) or the
#      Zero Trust dashboard ("Install connector"), then:
#        kubectl -n tbite create secret generic cloudflared-token --from-literal=token=<TOKEN>
#   2. The tunnel itself + its ingress routing + DNS CNAMEs — managed in the
#      Cloudflare account (remotely-managed tunnel `T-Bite`). These survive
#      cluster rebuilds; only the Secret above must be recreated.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: tbite
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/component: tunnel
    app.kubernetes.io/part-of: tbite
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflared
        app.kubernetes.io/component: tunnel
        app.kubernetes.io/part-of: tbite
        app.kubernetes.io/managed-by: kustomize
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2025.11.1
          args: ["tunnel", "--no-autoupdate", "--metrics", "0.0.0.0:2000", "run"]
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-token
                  key: token
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
