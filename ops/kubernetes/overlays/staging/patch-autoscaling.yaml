apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: corporate-catering-api
spec:
  minReplicas: 3
  maxReplicas: 12
  behavior:
    scaleUp:
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 3
          periodSeconds: 60
    scaleDown:
      policies:
        - type: Percent
          value: 20
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Pods
      pods:
        metric:
          name: http_server_requests_per_second
        target:
          type: AverageValue
          averageValue: "80"
    - type: Pods
      pods:
        metric:
          name: in_flight_requests
        target:
          type: AverageValue
          averageValue: "30"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: corporate-catering-mcp
spec:
  minReplicas: 2
  maxReplicas: 10
  behavior:
    scaleUp:
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      policies:
        - type: Percent
          value: 20
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Pods
      pods:
        metric:
          name: mcp_tool_requests_per_second
        target:
          type: AverageValue
          averageValue: "55"
    - type: Pods
      pods:
        metric:
          name: mcp_tool_in_flight_requests
        target:
          type: AverageValue
          averageValue: "20"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: corporate-catering-web
spec:
  minReplicas: 2
  maxReplicas: 10
  behavior:
    scaleUp:
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: corporate-catering-compliance-worker
spec:
  minReplicaCount: 2
  maxReplicaCount: 10
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          policies:
            - type: Percent
              value: 100
              periodSeconds: 60
            - type: Pods
              value: 2
              periodSeconds: 60
        scaleDown:
          policies:
            - type: Percent
              value: 20
              periodSeconds: 60
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://victoria-metrics-vmsingle.observability.svc.cluster.local:8429
        metricName: compliance_lifecycle_jobs_in_flight
        threshold: "12"
        query: avg(compliance_lifecycle_jobs_in_flight)
    - type: cpu
      metricType: Utilization
      metadata:
        value: "60"
