apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: corporate-catering-api
spec:
  minReplicas: 4
  maxReplicas: 16
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      selectPolicy: Max
      policies:
        - type: Percent
          value: 80
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 240
      selectPolicy: Min
      policies:
        - type: Percent
          value: 12
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Pods
      pods:
        metric:
          name: http_server_requests_per_second
        target:
          type: AverageValue
          averageValue: "85"
    - type: Pods
      pods:
        metric:
          name: in_flight_requests
        target:
          type: AverageValue
          averageValue: "32"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: corporate-catering-mcp
spec:
  minReplicas: 3
  maxReplicas: 12
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 15
      selectPolicy: Max
      policies:
        - type: Percent
          value: 80
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 240
      selectPolicy: Min
      policies:
        - type: Percent
          value: 12
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Pods
      pods:
        metric:
          name: mcp_tool_requests_per_second
        target:
          type: AverageValue
          averageValue: "60"
    - type: Pods
      pods:
        metric:
          name: mcp_tool_in_flight_requests
        target:
          type: AverageValue
          averageValue: "22"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: corporate-catering-web
spec:
  minReplicas: 2
  maxReplicas: 12
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      selectPolicy: Max
      policies:
        - type: Percent
          value: 80
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 240
      selectPolicy: Min
      policies:
        - type: Percent
          value: 15
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: corporate-catering-compliance-worker
spec:
  pollingInterval: 15
  cooldownPeriod: 240
  minReplicaCount: 2
  maxReplicaCount: 12
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 15
          selectPolicy: Max
          policies:
            - type: Percent
              value: 80
              periodSeconds: 60
            - type: Pods
              value: 2
              periodSeconds: 60
        scaleDown:
          stabilizationWindowSeconds: 240
          selectPolicy: Min
          policies:
            - type: Percent
              value: 15
              periodSeconds: 60
            - type: Pods
              value: 1
              periodSeconds: 60
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://victoria-metrics-vmsingle.observability.svc.cluster.local:8429
        metricName: compliance_lifecycle_jobs_in_flight
        threshold: "14"
        query: avg(compliance_lifecycle_jobs_in_flight)
    - type: cpu
      metricType: Utilization
      metadata:
        value: "62"
