# Cloud SQL binding
# -----------------
# In the GCP overlay we do NOT run Postgres in-cluster. Instead the
# cloud-sql-proxy Deployment exposes the managed Cloud SQL instance as a
# cluster-internal Service named `postgres:5432`, matching the hostname the
# base application Deployments + configmap-patch.yaml expect.
#
# PLACEHOLDER values to fill before apply:
#   - INSTANCE_CONNECTION_NAME : "PROJECT_ID:REGION:INSTANCE_NAME"
#     e.g. "acme-prod:us-central1:tbite-pg-prod"
#   - For RO traffic, point a second proxy at the read replica or use the
#     `--instances` flag with two instance strings (P0 only ships RW path).
#
# Cloud SQL Auth Proxy authenticates via the bound GSA (see workload-identity.yaml).
# The KSA `tbite-cloudsql-proxy` is annotated with the GSA email; Workload
# Identity supplies credentials with role roles/cloudsql.client.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tbite-cloudsql-proxy
  namespace: tbite
  annotations:
    # PLACEHOLDER: replace PROJECT_ID with your GCP project ID
    iam.gke.io/gcp-service-account: tbite-cloudsql-proxy@PROJECT_ID.iam.gserviceaccount.com
  labels:
    app.kubernetes.io/name: cloud-sql-proxy
    app.kubernetes.io/component: db-proxy
    app.kubernetes.io/part-of: tbite
    app.kubernetes.io/managed-by: kustomize
automountServiceAccountToken: true
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: tbite
  labels:
    app.kubernetes.io/name: cloud-sql-proxy
    app.kubernetes.io/component: db-proxy
    app.kubernetes.io/part-of: tbite
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cloud-sql-proxy
    app.kubernetes.io/component: db-proxy
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-sql-proxy
  namespace: tbite
  labels:
    app.kubernetes.io/name: cloud-sql-proxy
    app.kubernetes.io/component: db-proxy
    app.kubernetes.io/part-of: tbite
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: cloud-sql-proxy
      app.kubernetes.io/component: db-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloud-sql-proxy
        app.kubernetes.io/component: db-proxy
        app.kubernetes.io/part-of: tbite
        app.kubernetes.io/managed-by: kustomize
    spec:
      serviceAccountName: tbite-cloudsql-proxy
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.4
          args:
            - "--address=0.0.0.0"
            - "--port=5432"
            - "--structured-logs"
            - "--health-check"
            - "--http-address=0.0.0.0"
            - "--http-port=9090"
            # PLACEHOLDER: instance connection name "PROJECT_ID:REGION:INSTANCE_NAME"
            - "$(INSTANCE_CONNECTION_NAME)"
          env:
            - name: INSTANCE_CONNECTION_NAME
              # PLACEHOLDER: fill at deploy time (envsubst or kustomize edit)
              value: "PROJECT_ID:us-central1:tbite-pg-prod"
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
            - name: health
              containerPort: 9090
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readiness
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /liveness
              port: health
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
