# Cloud Storage (GCS) binding
# ---------------------------
# We use the GCS S3-interoperability endpoint so the same S3 client code path
# works on both single-node (MinIO) and GCP (GCS).
#
# Authentication options (pick ONE at deploy time):
#   1. Workload Identity (preferred): the KSA tbite-api (see
#      workload-identity.yaml) is bound to a GSA that holds
#      roles/storage.objectAdmin on the bucket. The S3 client must use the
#      GCS XML API HMAC keys provisioned for the GSA, OR switch to the GCS
#      native Go SDK in P6.
#   2. HMAC keys: store ACCESS_KEY and SECRET_KEY in Secret Manager and
#      surface via External Secrets (see external-secrets.yaml entries
#      S3_ACCESS_KEY / S3_SECRET_KEY). P0 ships placeholders only.
#
# PLACEHOLDER: replace PROJECT_ID in the bucket name with your GCP project ID
# (or whatever bucket naming convention you adopt -- the bucket must already
# exist; create it via Terraform / gcloud, NOT via this overlay).
#
# This file does not declare resources directly; configmap-patch.yaml carries
# the S3_ENDPOINT and S3_BUCKET values. We keep this file as a placement
# marker + documentation so future ops engineers find the GCS wiring in the
# same place as the other bindings.
---
# Empty stanza -- kustomize requires at least one valid YAML doc in the file.
# Keep this as a no-op ConfigMap that documents the GCS wiring; it merges
# additively with tbite-config via the strategic patch in kustomization.yaml
# only because the name matches (left here ONLY as inert metadata; the real
# value-bearing patch lives in configmap-patch.yaml).
apiVersion: v1
kind: ConfigMap
metadata:
  name: tbite-gcs-binding-docs
  namespace: tbite
  labels:
    app.kubernetes.io/name: gcs-binding
    app.kubernetes.io/component: object-storage
    app.kubernetes.io/part-of: tbite
    app.kubernetes.io/managed-by: kustomize
  annotations:
    tbite.io/purpose: |
      Documentation-only ConfigMap. Real S3_ENDPOINT / S3_BUCKET values are
      patched into tbite-config via configmap-patch.yaml. Workload Identity
      grants Storage Object Admin on the bucket to the bound GSA.
data:
  README: |
    GCS S3-interop endpoint: https://storage.googleapis.com
    Bucket name pattern   : tbite-PROJECT_ID-prod  (PLACEHOLDER)
    Auth                  : Workload Identity preferred; HMAC fallback via ESO.
