# Workload Identity binding for the api KSA
# -----------------------------------------
# This is a strategic-merge patch that adds the
# `iam.gke.io/gcp-service-account` annotation to the base ServiceAccount
# `tbite-api`. Once applied, pods running as this KSA receive ambient
# credentials for the bound GSA (no static SA key files).
#
# Out-of-band setup (NOT in this overlay):
#   1. Create the GSA:
#        gcloud iam service-accounts create tbite-api
#   2. Grant the IAM roles needed by the app:
#        - roles/cloudsql.client          (Cloud SQL Auth Proxy)
#        - roles/storage.objectAdmin      (GCS bucket, scoped)
#        - roles/secretmanager.secretAccessor (Secret Manager)
#        - roles/redis.editor             (Memorystore management; optional)
#   3. Bind KSA -> GSA:
#        gcloud iam service-accounts add-iam-policy-binding \
#          tbite-api@PROJECT_ID.iam.gserviceaccount.com \
#          --role roles/iam.workloadIdentityUser \
#          --member "serviceAccount:PROJECT_ID.svc.id.goog[tbite/tbite-api]"
#
# PLACEHOLDER: replace PROJECT_ID with your GCP project ID.
#
# Also: `automountServiceAccountToken: true` is required so the GKE metadata
# server can intercept token requests. The base SA has it disabled for the
# single-node case; we re-enable it here.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tbite-api
  namespace: tbite
  annotations:
    # PLACEHOLDER: replace PROJECT_ID with the GCP project ID
    iam.gke.io/gcp-service-account: tbite-api@PROJECT_ID.iam.gserviceaccount.com
  labels:
    app.kubernetes.io/part-of: tbite
    app.kubernetes.io/managed-by: kustomize
automountServiceAccountToken: true
