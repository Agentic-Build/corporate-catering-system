apiVersion: v1
kind: ConfigMap
metadata:
  name: tbite-config
  namespace: tbite
data:
  # GCP overlay connection strings.
  # ------------------------------------------------------------------
  # POSTGRES_PASSWORD is injected into the pod environment from the
  # Secret tbite-postgres-password (materialized by ExternalSecret in
  # external-secrets.yaml). The DSN uses $(POSTGRES_PASSWORD) so the
  # variable is expanded at pod startup, not stored in the ConfigMap.
  #
  # RW and RO point at the same `postgres` ClusterIP Service for P0;
  # the Service is fronted by the cloud-sql-proxy Deployment which
  # currently targets the primary instance. To route reads to a read
  # replica, run a second proxy Deployment + Service `postgres-ro` and
  # set DATABASE_RO_URL accordingly (P6 split).
  DATABASE_RW_URL: "postgres://tbite:$(POSTGRES_PASSWORD)@postgres:5432/tbite?sslmode=require"
  DATABASE_RO_URL: "postgres://tbite:$(POSTGRES_PASSWORD)@postgres:5432/tbite?sslmode=require"

  # Memorystore Redis via the ExternalName Service `redis`.
  REDIS_URL: "redis://redis:6379/0"

  # Self-hosted NATS on GKE (same as single-node, just inside the cluster).
  NATS_URL: "nats://nats:4222"

  # GCS via the S3 interoperability endpoint.
  S3_ENDPOINT: "https://storage.googleapis.com"
  # PLACEHOLDER: replace PROJECT_ID with your GCP project ID at deploy time.
  S3_BUCKET: "tbite-PROJECT_ID-prod"
  OIDC_CALLBACK_BASE_URL: "https://api.tbite.com"
  AUTH_PROVIDER_SLUGS: "authentik"
  AUTH_PROVIDER_AUTHENTIK_DISPLAY_NAME: "Authentik"
  AUTH_PROVIDER_AUTHENTIK_ISSUER_URL: "https://auth.PROD_DOMAIN/application/o/tbite/"
  AUTH_PROVIDER_AUTHENTIK_SCOPES: "openid email profile tbite"
  AUTHENTIK_BASE_URL: "https://auth.PROD_DOMAIN"
  AUTHENTIK_VENDOR_OPERATOR_GROUP: "tbite:role:vendor_operator"
  APP_BASE_URL_EMPLOYEE: "https://app.tbite.com"
  APP_BASE_URL_MERCHANT: "https://merchant.tbite.com"
  APP_BASE_URL_ADMIN: "https://admin.tbite.com"
