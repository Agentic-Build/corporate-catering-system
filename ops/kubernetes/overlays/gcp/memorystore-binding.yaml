# Memorystore Redis binding
# -------------------------
# Memorystore Redis Standard tier exposes a private IP inside the VPC. The
# GKE cluster must have the corresponding VPC peering / direct-VPC-egress
# configured (see design doc §8). We expose Memorystore as a cluster-internal
# Service named `redis` using ExternalName, so the base ConfigMap
# REDIS_URL=redis://redis:6379/0 resolves transparently.
#
# PLACEHOLDER: replace 10.0.0.0 with the actual Memorystore primary IP
# returned by `gcloud redis instances describe tbite-redis-prod`.
# If using a hostname instead of an IP, set externalName to that FQDN.
#
# NOTE: ExternalName Services do not support port mapping, so callers must
# use the upstream port 6379 (which matches the Memorystore default).
#
# If Memorystore AUTH is enabled, the auth string is mounted from the Secret
# created by external-secrets.yaml (REDIS_AUTH_TOKEN) and applied app-side.
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: tbite
  labels:
    app.kubernetes.io/name: memorystore-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: tbite
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ExternalName
  # PLACEHOLDER: replace with Memorystore primary endpoint IP or FQDN
  externalName: "10.0.0.0"
