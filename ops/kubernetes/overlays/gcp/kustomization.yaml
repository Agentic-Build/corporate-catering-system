apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# GCP overlay (GKE Autopilot or Standard).
# Binds the base tbite manifests to managed GCP services:
#   - Cloud SQL Postgres (via cloud-sql-proxy sidecar Deployment + ClusterIP Service)
#   - Memorystore Redis (via ExternalName Service)
#   - Cloud Storage (S3-interop endpoint + bucket via ConfigMap)
#   - GKE Ingress + ManagedCertificate + Cloud Armor BackendConfig
#   - Workload Identity (KSA <-> GSA binding annotation)
#   - External Secrets Operator -> GCP Secret Manager
# NATS stays self-hosted on GKE (see design doc §8 "GCP" column).
#
# All "PLACEHOLDER" / "PROJECT_ID" markers are intentional. A future ops
# engineer must `grep -R PLACEHOLDER ops/kubernetes/overlays/gcp` and fill in
# project-specific values before `kubectl apply`. P0 only requires that this
# overlay renders.
#
# Prerequisites (cluster-level installs, NOT part of this overlay):
#   - GKE Workload Identity enabled on the cluster
#   - External Secrets Operator (helm install external-secrets ...)
#   - Cloud Armor security policy `tbite-prod-armor` reserved in the project
#   - Reserved global static IP `tbite-prod-ip`
#   - Managed Certificate domains pointed via Cloud DNS to that IP
#
# No top-level `namespace:` because we compose two bases (../../base in
# tbite and ../../monitoring in monitoring) — letting kustomize rewrite both
# to a single namespace would collide.

resources:
  - ../../base
  - ../../monitoring
  - cloudsql-binding.yaml
  - memorystore-binding.yaml
  - gcs-binding.yaml
  - nats.yaml
  - gke-ingress.yaml
  - cloud-armor-policy.yaml
  - external-secrets.yaml
  - monitoring-external-secrets.yaml

# Patches applied on top of the base manifests.
patches:
  # Merge GCP connection strings into the base ConfigMap.
  - path: configmap-patch.yaml
    target:
      kind: ConfigMap
      name: tbite-config

  # Bind the api KSA to a GCP Service Account via Workload Identity.
  - path: workload-identity.yaml
    target:
      kind: ServiceAccount
      name: tbite-api

  # Retarget the base Ingress at the GCE external HTTPS load balancer.
  # Flips ingressClassName, swaps to *.tbite.com hostnames, attaches the
  # ManagedCertificate / FrontendConfig, and pins the reserved static IP.
  - target:
      kind: Ingress
      name: tbite
    patch: |-
      - op: replace
        path: /spec/ingressClassName
        value: ""
      - op: add
        path: /metadata/annotations
        value:
          kubernetes.io/ingress.class: "gce"
          cloud.google.com/load-balancer-type: "External"
          # PLACEHOLDER: must match a reserved global static IP
          kubernetes.io/ingress.global-static-ip-name: "tbite-prod-ip"
          networking.gke.io/managed-certificates: "tbite-prod-cert"
          networking.gke.io/v1beta1.FrontendConfig: "tbite-prod-frontend"
      - op: replace
        path: /spec/rules
        value:
          - host: app.tbite.com
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: web-employee
                      port:
                        number: 80
          - host: merchant.tbite.com
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: web-merchant
                      port:
                        number: 80
          - host: admin.tbite.com
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: web-admin
                      port:
                        number: 80
          - host: api.tbite.com
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: api
                      port:
                        number: 8080

  # Attach Cloud Armor BackendConfig + NEG annotations to the api Service.
  - target:
      kind: Service
      name: api
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          cloud.google.com/backend-config: '{"default": "tbite-prod-backend"}'
          cloud.google.com/neg: '{"ingress": true}'

# Repoint all 4 application images at Artifact Registry.
# PLACEHOLDER: replace PROJECT_ID and PLACEHOLDER tag at deploy time
# (typically via `kustomize edit set image` in the deploy pipeline).
images:
  - name: tbite/api
    newName: us-central1-docker.pkg.dev/PROJECT_ID/tbite/api
    newTag: PLACEHOLDER
  - name: tbite/web-employee
    newName: us-central1-docker.pkg.dev/PROJECT_ID/tbite/web-employee
    newTag: PLACEHOLDER
  - name: tbite/web-merchant
    newName: us-central1-docker.pkg.dev/PROJECT_ID/tbite/web-merchant
    newTag: PLACEHOLDER
  - name: tbite/web-admin
    newName: us-central1-docker.pkg.dev/PROJECT_ID/tbite/web-admin
    newTag: PLACEHOLDER
