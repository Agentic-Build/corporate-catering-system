# External Secrets Operator (ESO) + GCP Secret Manager
# -----------------------------------------------------
# ESO is installed cluster-wide via its Helm chart (NOT here). This overlay
# declares one SecretStore (scoped to the tbite namespace) and three
# ExternalSecret resources that materialize Secret Manager values into
# native K8s Secrets:
#
#   - tbite-postgres-password : Cloud SQL DB password (key POSTGRES_PASSWORD)
#   - tbite-redis-auth        : Memorystore AUTH token (key REDIS_AUTH_TOKEN)
#                               (only meaningful if Memorystore AUTH is enabled)
#   - tbite-app-secrets       : generic app secret bag (JWT signing key, S3
#                               HMAC keys, OAuth client secrets, ...)
#
# ESO authenticates to Secret Manager via Workload Identity using the KSA
# `tbite-external-secrets` (also declared below). The bound GSA must hold
# roles/secretmanager.secretAccessor on each referenced secret.
#
# PLACEHOLDER values to replace before apply:
#   - PROJECT_ID in projectID + GSA email
#   - the actual secret resource names in Secret Manager
#     (if you choose different names than tbite-postgres-password etc.)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tbite-external-secrets
  namespace: tbite
  annotations:
    # PLACEHOLDER: replace PROJECT_ID
    iam.gke.io/gcp-service-account: tbite-external-secrets@PROJECT_ID.iam.gserviceaccount.com
  labels:
    app.kubernetes.io/part-of: tbite
    app.kubernetes.io/managed-by: kustomize
automountServiceAccountToken: true
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: tbite-gcp-secret-manager
  namespace: tbite
  labels:
    app.kubernetes.io/part-of: tbite
    app.kubernetes.io/managed-by: kustomize
spec:
  provider:
    gcpsm:
      # PLACEHOLDER: replace PROJECT_ID
      projectID: "PROJECT_ID"
      auth:
        workloadIdentity:
          # PLACEHOLDER: replace PROJECT_ID
          clusterLocation: us-central1
          clusterName: tbite-prod
          clusterProjectID: "PROJECT_ID"
          serviceAccountRef:
            name: tbite-external-secrets
---
# Postgres password (used by cloud-sql-proxy clients and app DSN composition).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tbite-postgres-password
  namespace: tbite
  labels:
    app.kubernetes.io/part-of: tbite
    app.kubernetes.io/managed-by: kustomize
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: tbite-gcp-secret-manager
    kind: SecretStore
  target:
    name: tbite-postgres-password
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        # PLACEHOLDER: Secret Manager secret name (without projects/... prefix)
        # full path: projects/PROJECT_ID/secrets/tbite-postgres-password
        key: tbite-postgres-password
---
# Memorystore AUTH token (only used if AUTH enabled on the Memorystore instance).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tbite-redis-auth
  namespace: tbite
  labels:
    app.kubernetes.io/part-of: tbite
    app.kubernetes.io/managed-by: kustomize
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: tbite-gcp-secret-manager
    kind: SecretStore
  target:
    name: tbite-redis-auth
    creationPolicy: Owner
  data:
    - secretKey: REDIS_AUTH_TOKEN
      remoteRef:
        # PLACEHOLDER: Secret Manager resource projects/PROJECT_ID/secrets/tbite-redis-auth
        key: tbite-redis-auth
---
# Generic app secret bag (JWT signing key, S3 HMAC, OAuth client secrets, ...).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tbite-app-secrets
  namespace: tbite
  labels:
    app.kubernetes.io/part-of: tbite
    app.kubernetes.io/managed-by: kustomize
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: tbite-gcp-secret-manager
    kind: SecretStore
  target:
    name: tbite-app-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        # PLACEHOLDER: Secret Manager resource projects/PROJECT_ID/secrets/tbite-app-secrets
        # The secret payload is expected to be a JSON object whose keys become
        # individual entries in the resulting K8s Secret.
        key: tbite-app-secrets
