# Observability secrets sourced from GCP Secret Manager. The collector,
# exporters, and Grafana in the monitoring namespace consume the resulting
# `monitoring-secrets` Secret.
#
# Required keys in Secret Manager `tbite-monitoring`:
#   POSTGRES_DSN           — Cloud SQL DSN for postgres-exporter
#   REDIS_ADDR             — Memorystore reachable URI for redis-exporter
#   NATS_MONITORING_URL    — NATS /varz endpoint (cluster-local)
#   GRAFANA_ADMIN_USER     — Grafana admin login
#   GRAFANA_ADMIN_PASSWORD — Grafana admin password
#
# PLACEHOLDER: replace PROJECT_ID before apply.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: monitoring-external-secrets
  namespace: monitoring
  annotations:
    # PLACEHOLDER: same GSA model as tbite-external-secrets; either reuse
    # that GSA (granting access to tbite-monitoring) or provision a
    # dedicated one.
    iam.gke.io/gcp-service-account: tbite-external-secrets@PROJECT_ID.iam.gserviceaccount.com
  labels:
    app.kubernetes.io/part-of: tbite-observability
    app.kubernetes.io/managed-by: kustomize
automountServiceAccountToken: true
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: monitoring-gcp-secret-manager
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: tbite-observability
    app.kubernetes.io/managed-by: kustomize
spec:
  provider:
    gcpsm:
      projectID: "PROJECT_ID"
      auth:
        workloadIdentity:
          clusterLocation: us-central1
          clusterName: tbite-prod
          clusterProjectID: "PROJECT_ID"
          serviceAccountRef:
            name: monitoring-external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: monitoring-secrets
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: tbite-observability
    app.kubernetes.io/managed-by: kustomize
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: monitoring-gcp-secret-manager
    kind: SecretStore
  target:
    name: monitoring-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        # PLACEHOLDER: projects/PROJECT_ID/secrets/tbite-monitoring (JSON payload).
        key: tbite-monitoring
