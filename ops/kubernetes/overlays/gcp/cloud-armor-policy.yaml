# Cloud Armor BackendConfig
# -------------------------
# A BackendConfig references a Cloud Armor security policy by name. The
# actual policy (rule set: OWASP CRS, rate limiting, country block, etc.)
# is provisioned out-of-band via Terraform / gcloud, NOT this overlay:
#
#   gcloud compute security-policies create tbite-prod-armor \
#     --description "WAF + DDoS for tbite-prod"
#   gcloud compute security-policies rules create ... (OWASP CRS preconfig)
#
# Services that should be protected attach this BackendConfig via the
# `cloud.google.com/backend-config` annotation on the Service. We attach
# this to the api Service via the strategic-merge patch in
# kustomization.yaml (api-service-patch). Web frontends can be added in P6.
#
# PLACEHOLDER values to replace:
#   - securityPolicy name `tbite-prod-armor` -- must match the gcloud-created policy.
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: tbite-prod-backend
  namespace: tbite
  labels:
    app.kubernetes.io/part-of: tbite
    app.kubernetes.io/managed-by: kustomize
spec:
  # PLACEHOLDER: name of a pre-created Cloud Armor security policy.
  securityPolicy:
    name: "tbite-prod-armor"
  # 30s timeout matches the API Deployment readinessProbe / write SLOs.
  timeoutSec: 30
  connectionDraining:
    drainingTimeoutSec: 60
  healthCheck:
    type: HTTP
    requestPath: /healthz
    port: 8080
  logging:
    enable: true
    sampleRate: 1.0
