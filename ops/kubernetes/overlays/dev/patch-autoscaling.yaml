---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: corporate-catering-compliance-worker
spec:
  minReplicaCount: 1
  maxReplicaCount: 4
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          policies:
            - type: Percent
              value: 100
              periodSeconds: 60
            - type: Pods
              value: 1
              periodSeconds: 60
        scaleDown:
          policies:
            - type: Percent
              value: 25
              periodSeconds: 60
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://victoria-metrics-vmsingle.observability.svc.cluster.local:8429
        metricName: compliance_lifecycle_jobs_in_flight
        threshold: "6"
        query: avg(compliance_lifecycle_jobs_in_flight)
    - type: cpu
      metricType: Utilization
      metadata:
        value: "55"
