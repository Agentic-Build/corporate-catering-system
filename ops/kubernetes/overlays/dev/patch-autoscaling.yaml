apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: corporate-catering-api
spec:
  minReplicas: 1
  maxReplicas: 4
  behavior:
    scaleUp:
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Pods
      pods:
        metric:
          name: http_server_requests_per_second
        target:
          type: AverageValue
          averageValue: "35"
    - type: Pods
      pods:
        metric:
          name: in_flight_requests
        target:
          type: AverageValue
          averageValue: "15"
---
