apiVersion: v1
kind: ServiceAccount
metadata:
  name: tbite-scheduler
  namespace: tbite
  labels:
    app.kubernetes.io/part-of: tbite
    app.kubernetes.io/managed-by: kustomize
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tbite-scheduler-lease
  namespace: tbite
  labels:
    app.kubernetes.io/part-of: tbite
    app.kubernetes.io/managed-by: kustomize
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tbite-scheduler-lease
  namespace: tbite
  labels:
    app.kubernetes.io/part-of: tbite
    app.kubernetes.io/managed-by: kustomize
subjects:
  - kind: ServiceAccount
    name: tbite-scheduler
    namespace: tbite
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tbite-scheduler-lease
