apiVersion: batch/v1
kind: Job
metadata:
  name: corporate-catering-object-storage-provision
  labels:
    app.kubernetes.io/name: corporate-catering-object-storage-provision
    app.kubernetes.io/part-of: corporate-catering-system
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: corporate-catering-object-storage-provision
        app.kubernetes.io/part-of: corporate-catering-system
    spec:
      restartPolicy: OnFailure
      containers:
        - name: provision
          image: minio/mc:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              : "${MINIO_ENDPOINT:?missing MINIO_ENDPOINT}"
              : "${MINIO_ROOT_USER:?missing MINIO_ROOT_USER}"
              : "${MINIO_ROOT_PASSWORD:?missing MINIO_ROOT_PASSWORD}"
              : "${MINIO_BUCKET_MENU_IMAGES:?missing MINIO_BUCKET_MENU_IMAGES}"
              : "${MINIO_BUCKET_COMPLIANCE_EVIDENCE:?missing MINIO_BUCKET_COMPLIANCE_EVIDENCE}"
              : "${MINIO_BUCKET_FULFILLMENT_EXPORTS:?missing MINIO_BUCKET_FULFILLMENT_EXPORTS}"

              endpoint="${MINIO_ENDPOINT}"
              case "${endpoint}" in
                http://*|https://*) ;;
                *) endpoint="http://${endpoint}" ;;
              esac

              mc alias set runtime "${endpoint}" "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"
              for bucket in \
                "${MINIO_BUCKET_MENU_IMAGES}" \
                "${MINIO_BUCKET_COMPLIANCE_EVIDENCE}" \
                "${MINIO_BUCKET_FULFILLMENT_EXPORTS}"
              do
                mc mb --ignore-existing "runtime/${bucket}" >/dev/null
                mc anonymous set none "runtime/${bucket}" >/dev/null
              done
          env:
            - name: MINIO_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: object_storage_endpoint
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: object_storage_access_key_id
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: object_storage_secret_access_key
            - name: MINIO_BUCKET_MENU_IMAGES
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: object_storage_bucket_menu_images
            - name: MINIO_BUCKET_COMPLIANCE_EVIDENCE
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: object_storage_bucket_compliance_evidence
            - name: MINIO_BUCKET_FULFILLMENT_EXPORTS
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: object_storage_bucket_fulfillment_exports
