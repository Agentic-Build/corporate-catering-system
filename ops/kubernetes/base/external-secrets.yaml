apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: corporate-catering-runtime-secrets
  labels:
    app.kubernetes.io/name: corporate-catering-runtime-secrets
    app.kubernetes.io/part-of: corporate-catering-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: corporate-catering-secret-store
  target:
    name: corporate-catering-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: database_rw_url
      remoteRef:
        key: prod/corporate-catering/runtime
        property: database_rw_url
    - secretKey: database_ro_url
      remoteRef:
        key: prod/corporate-catering/runtime
        property: database_ro_url
    - secretKey: valkey_url
      remoteRef:
        key: prod/corporate-catering/runtime
        property: valkey_url
    - secretKey: nats_url
      remoteRef:
        key: prod/corporate-catering/runtime
        property: nats_url
    - secretKey: postgresql_database_name
      remoteRef:
        key: prod/corporate-catering/runtime
        property: postgresql_database_name
    - secretKey: postgresql_app_user
      remoteRef:
        key: prod/corporate-catering/runtime
        property: postgresql_app_user
    - secretKey: postgresql_app_password_current
      remoteRef:
        key: prod/corporate-catering/runtime
        property: postgresql_app_password_current
    - secretKey: postgresql_app_password_next
      remoteRef:
        key: prod/corporate-catering/runtime
        property: postgresql_app_password_next
    - secretKey: pickup_totp_secret
      remoteRef:
        key: prod/corporate-catering/runtime
        property: pickup_totp_secret
    - secretKey: mock_auth_signing_secret
      remoteRef:
        key: prod/corporate-catering/runtime
        property: mock_auth_signing_secret
    - secretKey: prelaunch_audit_trail_encryption_key_hex
      remoteRef:
        key: prod/corporate-catering/runtime
        property: prelaunch_audit_trail_encryption_key_hex
    - secretKey: prelaunch_payroll_export_encryption_key_hex
      remoteRef:
        key: prod/corporate-catering/runtime
        property: prelaunch_payroll_export_encryption_key_hex
    - secretKey: object_storage_endpoint
      remoteRef:
        key: prod/corporate-catering/runtime
        property: object_storage_endpoint
    - secretKey: object_storage_access_key_id
      remoteRef:
        key: prod/corporate-catering/runtime
        property: object_storage_access_key_id
    - secretKey: object_storage_secret_access_key
      remoteRef:
        key: prod/corporate-catering/runtime
        property: object_storage_secret_access_key
    - secretKey: object_storage_bucket_menu_images
      remoteRef:
        key: prod/corporate-catering/runtime
        property: object_storage_bucket_menu_images
    - secretKey: object_storage_bucket_compliance_evidence
      remoteRef:
        key: prod/corporate-catering/runtime
        property: object_storage_bucket_compliance_evidence
    - secretKey: object_storage_bucket_fulfillment_exports
      remoteRef:
        key: prod/corporate-catering/runtime
        property: object_storage_bucket_fulfillment_exports
    - secretKey: object_storage_region
      remoteRef:
        key: prod/corporate-catering/runtime
        property: object_storage_region
    - secretKey: object_storage_key_namespace
      remoteRef:
        key: prod/corporate-catering/runtime
        property: object_storage_key_namespace
    - secretKey: corporate_sso_jwt_issuer
      remoteRef:
        key: prod/corporate-catering/runtime
        property: corporate_sso_jwt_issuer
    - secretKey: corporate_sso_jwt_audience
      remoteRef:
        key: prod/corporate-catering/runtime
        property: corporate_sso_jwt_audience
    - secretKey: corporate_sso_jwt_hs256_secret_base64_current
      remoteRef:
        key: prod/corporate-catering/runtime
        property: corporate_sso_jwt_hs256_secret_base64_current
    - secretKey: corporate_sso_jwt_hs256_secret_base64_next
      remoteRef:
        key: prod/corporate-catering/runtime
        property: corporate_sso_jwt_hs256_secret_base64_next
    - secretKey: vendor_mfa_jwt_issuer
      remoteRef:
        key: prod/corporate-catering/runtime
        property: vendor_mfa_jwt_issuer
    - secretKey: vendor_mfa_jwt_audience
      remoteRef:
        key: prod/corporate-catering/runtime
        property: vendor_mfa_jwt_audience
    - secretKey: vendor_mfa_jwt_hs256_secret_base64_current
      remoteRef:
        key: prod/corporate-catering/runtime
        property: vendor_mfa_jwt_hs256_secret_base64_current
    - secretKey: vendor_mfa_jwt_hs256_secret_base64_next
      remoteRef:
        key: prod/corporate-catering/runtime
        property: vendor_mfa_jwt_hs256_secret_base64_next
    - secretKey: mcp_oauth_service_account_issuer
      remoteRef:
        key: prod/corporate-catering/runtime
        property: mcp_oauth_service_account_issuer
    - secretKey: mcp_oauth_service_account_audience
      remoteRef:
        key: prod/corporate-catering/runtime
        property: mcp_oauth_service_account_audience
    - secretKey: mcp_oauth_service_account_hs256_secret_base64_current
      remoteRef:
        key: prod/corporate-catering/runtime
        property: mcp_oauth_service_account_hs256_secret_base64_current
    - secretKey: mcp_oauth_service_account_hs256_secret_base64_next
      remoteRef:
        key: prod/corporate-catering/runtime
        property: mcp_oauth_service_account_hs256_secret_base64_next
    - secretKey: mcp_bridge_key_registry_json
      remoteRef:
        key: prod/corporate-catering/runtime
        property: mcp_bridge_key_registry_json
    - secretKey: web_origin
      remoteRef:
        key: prod/corporate-catering/runtime
        property: web_origin
    - secretKey: web_public_api_base_url
      remoteRef:
        key: prod/corporate-catering/runtime
        property: web_public_api_base_url
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: corporate-catering-postgres-app-user
  labels:
    app.kubernetes.io/name: corporate-catering-postgres-app-user
    app.kubernetes.io/part-of: corporate-catering-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: corporate-catering-secret-store
  target:
    name: corporate-catering-postgres-app-user
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
  data:
    - secretKey: username
      remoteRef:
        key: prod/corporate-catering/postgres
        property: app_username
    - secretKey: password
      remoteRef:
        key: prod/corporate-catering/postgres
        property: app_password_current
---
