apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tbite

labels:
  - pairs:
      app.kubernetes.io/part-of: tbite
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false

resources:
  - namespace.yaml
  - configmap.yaml
  - serviceaccount-api.yaml
  - serviceaccount-scheduler.yaml
  - deployment-api.yaml
  - deployment-worker.yaml
  - deployment-scheduler.yaml
  - deployment-web-employee.yaml
  - deployment-web-merchant.yaml
  - deployment-web-admin.yaml
  - service-api.yaml
  - service-web-employee.yaml
  - service-web-merchant.yaml
  - service-web-admin.yaml
  - ingress.yaml
  - hpa-api.yaml
  - pdb-api.yaml
  - pdb-web-employee.yaml
  - pdb-web-merchant.yaml
  - pdb-web-admin.yaml
  - networkpolicy-default-deny.yaml
  - networkpolicy-allow-otel.yaml
