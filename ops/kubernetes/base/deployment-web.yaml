apiVersion: apps/v1
kind: Deployment
metadata:
  name: corporate-catering-web
  labels:
    app.kubernetes.io/name: corporate-catering-web
    app.kubernetes.io/part-of: corporate-catering-system
spec:
  replicas: 4
  selector:
    matchLabels:
      app.kubernetes.io/name: corporate-catering-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: corporate-catering-web
        app.kubernetes.io/part-of: corporate-catering-system
    spec:
      containers:
        - name: web
          image: ghcr.io/corporate-catering/web:latest
          imagePullPolicy: IfNotPresent
          command:
            - node
            - build
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: production
            - name: FRONTEND_RUNTIME_KIND
              value: sveltekit-adapter-node
            - name: FRONTEND_CACHE_CONTROL_DYNAMIC
              value: no-store
            - name: FRONTEND_CACHE_CONTROL_ASSET
              value: public, max-age=300
            - name: FRONTEND_CACHE_CONTROL_ASSET_IMMUTABLE
              value: public, max-age=31536000, immutable
            - name: ORIGIN
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: web_origin
            - name: PUBLIC_API_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: web_public_api_base_url
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 30
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "800m"
              memory: "512Mi"
