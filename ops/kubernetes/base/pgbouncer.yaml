apiVersion: apps/v1
kind: Deployment
metadata:
  name: corporate-catering-pgbouncer-rw
  labels:
    app.kubernetes.io/name: corporate-catering-pgbouncer-rw
    app.kubernetes.io/part-of: corporate-catering-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: corporate-catering-pgbouncer-rw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: corporate-catering-pgbouncer-rw
        app.kubernetes.io/part-of: corporate-catering-system
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pgbouncer
          image: bitnami/pgbouncer:1.23.1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: pgbouncer
              containerPort: 6432
          env:
            - name: PGBOUNCER_PORT
              value: "6432"
            - name: PGBOUNCER_POOL_MODE
              value: transaction
            - name: PGBOUNCER_AUTH_TYPE
              value: scram-sha-256
            - name: PGBOUNCER_MAX_CLIENT_CONN
              value: "5000"
            - name: PGBOUNCER_DEFAULT_POOL_SIZE
              value: "120"
            - name: PGBOUNCER_RESERVE_POOL_SIZE
              value: "30"
            - name: PGBOUNCER_SERVER_TLS_SSLMODE
              value: require
            - name: PGBOUNCER_CLIENT_TLS_SSLMODE
              value: disable
            - name: POSTGRESQL_HOST
              value: corporate-catering-postgres-rw
            - name: POSTGRESQL_PORT
              value: "5432"
            - name: POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: postgresql_database_name
            - name: POSTGRESQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: postgresql_app_user
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: postgresql_app_password_current
            - name: POSTGRESQL_PASSWORD_NEXT
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: postgresql_app_password_next
          readinessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "750m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: corporate-catering-pgbouncer-rw
  labels:
    app.kubernetes.io/name: corporate-catering-pgbouncer-rw
    app.kubernetes.io/part-of: corporate-catering-system
spec:
  selector:
    app.kubernetes.io/name: corporate-catering-pgbouncer-rw
  ports:
    - name: postgres
      port: 5432
      targetPort: pgbouncer
---
