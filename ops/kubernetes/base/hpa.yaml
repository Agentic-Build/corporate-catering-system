apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: corporate-catering-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: corporate-catering-api
  minReplicas: 6
  maxReplicas: 30
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      selectPolicy: Max
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 6
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      selectPolicy: Min
      policies:
        - type: Percent
          value: 15
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Pods
      pods:
        metric:
          name: http_server_requests_per_second
        target:
          type: AverageValue
          averageValue: "110"
    - type: Pods
      pods:
        metric:
          name: in_flight_requests
        target:
          type: AverageValue
          averageValue: "45"
