apiVersion: apps/v1
kind: Deployment
metadata:
  name: corporate-catering-compliance-worker
  labels:
    app.kubernetes.io/name: corporate-catering-compliance-worker
    app.kubernetes.io/part-of: corporate-catering-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: corporate-catering-compliance-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: corporate-catering-compliance-worker
        app.kubernetes.io/part-of: corporate-catering-system
    spec:
      containers:
        - name: compliance-worker
          image: ghcr.io/corporate-catering/system:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OTEL_SERVICE_NAME
              value: catering-compliance-worker
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4317
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_METRICS_EXPORTER
              value: otlp
            - name: OTEL_LOGS_EXPORTER
              value: otlp
            - name: OTEL_PROPAGATORS
              value: tracecontext,baggage
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.namespace=corporate-catering,deployment.environment=production,k8s.namespace.name=$(POD_NAMESPACE)
            - name: DATABASE_RW_URL
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: database_rw_url
            - name: DATABASE_RO_URL
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: database_ro_url
            - name: CORPORATE_SSO_JWT_ISSUER
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: corporate_sso_jwt_issuer
            - name: CORPORATE_SSO_JWT_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: corporate_sso_jwt_audience
            - name: CORPORATE_SSO_JWT_HS256_SECRET_BASE64
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: corporate_sso_jwt_hs256_secret_base64_current
            - name: CORPORATE_SSO_JWT_HS256_SECRET_BASE64_NEXT
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: corporate_sso_jwt_hs256_secret_base64_next
            - name: VENDOR_MFA_JWT_ISSUER
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: vendor_mfa_jwt_issuer
            - name: VENDOR_MFA_JWT_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: vendor_mfa_jwt_audience
            - name: VENDOR_MFA_JWT_HS256_SECRET_BASE64
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: vendor_mfa_jwt_hs256_secret_base64_current
            - name: VENDOR_MFA_JWT_HS256_SECRET_BASE64_NEXT
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: vendor_mfa_jwt_hs256_secret_base64_next
            - name: MCP_OAUTH_SERVICE_ACCOUNT_ISSUER
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: mcp_oauth_service_account_issuer
            - name: MCP_OAUTH_SERVICE_ACCOUNT_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: mcp_oauth_service_account_audience
            - name: MCP_OAUTH_SERVICE_ACCOUNT_HS256_SECRET_BASE64
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: mcp_oauth_service_account_hs256_secret_base64_current
            - name: MCP_OAUTH_SERVICE_ACCOUNT_HS256_SECRET_BASE64_NEXT
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: mcp_oauth_service_account_hs256_secret_base64_next
            - name: MCP_BRIDGE_KEY_REGISTRY_JSON
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: mcp_bridge_key_registry_json
            - name: MINIO_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: object_storage_endpoint
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: object_storage_access_key_id
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: object_storage_secret_access_key
            - name: MINIO_BUCKET_MENU_IMAGES
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: object_storage_bucket_menu_images
            - name: MINIO_BUCKET_COMPLIANCE_EVIDENCE
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: object_storage_bucket_compliance_evidence
            - name: MINIO_BUCKET_FULFILLMENT_EXPORTS
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: object_storage_bucket_fulfillment_exports
            - name: OBJECT_STORAGE_REGION
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: object_storage_region
            - name: OBJECT_STORAGE_KEY_NAMESPACE
              valueFrom:
                secretKeyRef:
                  name: corporate-catering-secrets
                  key: object_storage_key_namespace
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/startup
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 30
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
