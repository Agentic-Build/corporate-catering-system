apiVersion: apps/v1
kind: Deployment
metadata:
  name: corporate-catering-compliance-worker
  labels:
    app.kubernetes.io/name: corporate-catering-compliance-worker
    app.kubernetes.io/part-of: corporate-catering-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: corporate-catering-compliance-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: corporate-catering-compliance-worker
        app.kubernetes.io/part-of: corporate-catering-system
    spec:
      containers:
        - name: compliance-worker
          image: ghcr.io/corporate-catering/system:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OTEL_SERVICE_NAME
              value: catering-compliance-worker
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4317
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_METRICS_EXPORTER
              value: otlp
            - name: OTEL_LOGS_EXPORTER
              value: otlp
            - name: OTEL_PROPAGATORS
              value: tracecontext,baggage
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.namespace=corporate-catering,deployment.environment=production,k8s.namespace.name=$(POD_NAMESPACE)
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/startup
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 30
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
