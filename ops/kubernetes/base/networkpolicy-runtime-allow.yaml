apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: corporate-catering-runtime-allow-egress-object-storage
  labels:
    app.kubernetes.io/name: corporate-catering-runtime-allow-egress-object-storage
    app.kubernetes.io/part-of: corporate-catering-system
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - corporate-catering-api
          - corporate-catering-mcp
          - corporate-catering-compliance-worker
          - corporate-catering-object-storage-provision
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - corporate-catering-object-storage
                  - minio
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 9000
    - to:
        - namespaceSelector:
            matchLabels:
              networking.corporate-catering.io/object-storage: "true"
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 9000
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 9000
    - to:
        - ipBlock:
            cidr: 172.16.0.0/12
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 9000
    - to:
        - ipBlock:
            cidr: 192.168.0.0/16
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 9000
