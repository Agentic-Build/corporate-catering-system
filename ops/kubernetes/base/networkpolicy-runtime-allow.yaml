apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: corporate-catering-runtime-allow-egress-dns
  labels:
    app.kubernetes.io/name: corporate-catering-runtime-allow-egress-dns
    app.kubernetes.io/part-of: corporate-catering-system
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: corporate-catering-pgbouncer-allow-runtime-and-postgres
  labels:
    app.kubernetes.io/name: corporate-catering-pgbouncer-allow-runtime-and-postgres
    app.kubernetes.io/part-of: corporate-catering-system
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - corporate-catering-pgbouncer-rw
          - corporate-catering-pgbouncer-ro
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - corporate-catering-api
                  - corporate-catering-mcp
                  - corporate-catering-compliance-worker
      ports:
