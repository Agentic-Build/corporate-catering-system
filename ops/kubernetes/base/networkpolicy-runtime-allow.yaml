apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: corporate-catering-runtime-allow-ingress-from-edge
  labels:
    app.kubernetes.io/name: corporate-catering-runtime-allow-ingress-from-edge
    app.kubernetes.io/part-of: corporate-catering-system
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - corporate-catering-api
          - corporate-catering-mcp
          - corporate-catering-web
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              networking.corporate-catering.io/edge-gateway: "true"
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
        - protocol: TCP
          port: 3000
---
apiVersion: networking.k8s.io/v1
