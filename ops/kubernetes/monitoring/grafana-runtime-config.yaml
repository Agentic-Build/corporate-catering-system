# Per-overlay Grafana runtime config. The base ships safe defaults that
# disable anonymous access. Overlays patch this ConfigMap (single-node
# enables anonymous Admin for dev convenience).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-runtime-config
  namespace: monitoring
data:
  GF_AUTH_ANONYMOUS_ENABLED: "false"
  GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
