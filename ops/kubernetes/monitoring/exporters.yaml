# Postgres / Redis / NATS Prometheus exporters. The DSNs default to
# in-cluster DNS for the tbite-namespace deployments shipped in the
# single-node overlay. The GCP overlay can override DATA_SOURCE_NAME via
# external secrets to point at Cloud SQL / Memorystore.
#
# Connection strings live in the monitoring-secrets Secret; the overlay
# is responsible for creating it. The single-node overlay does that in
# its own bootstrap; for GCP it should come from External Secrets.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: postgres-exporter
    app.kubernetes.io/component: exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-exporter
        app.kubernetes.io/component: exporter
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: exporter
          image: prometheuscommunity/postgres-exporter:v0.16.0
          env:
            - name: DATA_SOURCE_NAME
              valueFrom:
                secretKeyRef:
                  name: monitoring-secrets
                  key: POSTGRES_DSN
            - name: PG_EXPORTER_EXTEND_QUERY_PATH
              value: /etc/postgres-exporter/queries.yaml
          ports:
            - name: metrics
              containerPort: 9187
          volumeMounts:
            - name: queries
              mountPath: /etc/postgres-exporter
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: metrics
            periodSeconds: 10
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits:   { cpu: 200m, memory: 128Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: queries
          configMap:
            name: postgres-exporter-queries
            items:
              - key: queries.yaml
                path: queries.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: monitoring
spec:
  selector:
    app.kubernetes.io/name: postgres-exporter
  ports:
    - name: metrics
      port: 9187
      targetPort: metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: redis-exporter
    app.kubernetes.io/component: exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-exporter
        app.kubernetes.io/component: exporter
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: exporter
          image: oliver006/redis_exporter:v1.66.0
          env:
            - name: REDIS_ADDR
              valueFrom:
                secretKeyRef:
                  name: monitoring-secrets
                  key: REDIS_ADDR
          ports:
            - name: metrics
              containerPort: 9121
          readinessProbe:
            httpGet:
              path: /
              port: metrics
            periodSeconds: 10
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits:   { cpu: 200m, memory: 128Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: monitoring
spec:
  selector:
    app.kubernetes.io/name: redis-exporter
  ports:
    - name: metrics
      port: 9121
      targetPort: metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: nats-exporter
    app.kubernetes.io/component: exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nats-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats-exporter
        app.kubernetes.io/component: exporter
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: exporter
          image: natsio/prometheus-nats-exporter:0.16.0
          args:
            - "-varz"
            - "-jsz=all"
            - "-connz"
            - "-routez"
            - "-subz"
            - "$(NATS_MONITORING_URL)"
          env:
            - name: NATS_MONITORING_URL
              valueFrom:
                secretKeyRef:
                  name: monitoring-secrets
                  key: NATS_MONITORING_URL
          ports:
            - name: metrics
              containerPort: 7777
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            periodSeconds: 10
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits:   { cpu: 200m, memory: 128Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata:
  name: nats-exporter
  namespace: monitoring
spec:
  selector:
    app.kubernetes.io/name: nats-exporter
  ports:
    - name: metrics
      port: 7777
      targetPort: metrics
