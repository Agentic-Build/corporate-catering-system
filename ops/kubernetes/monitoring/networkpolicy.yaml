# Allow tbite namespace pods to reach the otel-collector (OTLP) and Grafana
# (UI access from cluster). Everything else is denied by the namespace's
# default-deny in tbite (see ops/kubernetes/base/networkpolicy-default-deny.yaml).
#
# Monitoring services scrape exporters/components within the monitoring
# namespace; we don't add a default-deny inside monitoring to keep the
# in-namespace scrape model simple. Tighten in a future pass if needed.

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-tbite-to-otel-collector
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tbite
      ports:
        - { protocol: TCP, port: 4317 }
        - { protocol: TCP, port: 4318 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-tbite-to-grafana
  namespace: monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes: ["Ingress"]
  ingress:
    # Cluster-wide ingress, the overlay's Ingress fronts this in the
    # outside world (single-node: nginx, gcp: GCE LB).
    - from:
        - namespaceSelector: {}
      ports:
        - { protocol: TCP, port: 3000 }
