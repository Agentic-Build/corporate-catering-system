apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alertmanager-data
  namespace: monitoring
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: alerting
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager
        app.kubernetes.io/component: alerting
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.28.0
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/data"
          ports:
            - name: http
              containerPort: 9093
          volumeMounts:
            - { name: config, mountPath: /etc/alertmanager }
            - { name: data, mountPath: /data }
          readinessProbe:
            httpGet: { path: /-/ready, port: http }
            periodSeconds: 5
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits:   { cpu: 200m, memory: 128Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
            items:
              - key: alertmanager.yml
                path: alertmanager.yml
        - name: data
          persistentVolumeClaim:
            claimName: alertmanager-data
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  selector:
    app.kubernetes.io/name: alertmanager
  ports:
    - { name: http, port: 9093, targetPort: http }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmalert
  namespace: monitoring
  labels:
    app.kubernetes.io/name: vmalert
    app.kubernetes.io/component: alerting
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vmalert
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vmalert
        app.kubernetes.io/component: alerting
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: vmalert
          image: victoriametrics/vmalert:v1.143.0
          args:
            - "-datasource.url=http://vmsingle:8428"
            - "-notifier.url=http://alertmanager:9093"
            - "-remoteWrite.url=http://vmsingle:8428"
            - "-rule=/etc/vmalert/rules.yaml"
            - "-httpListenAddr=:8880"
          ports:
            - name: http
              containerPort: 8880
          volumeMounts:
            - name: rules
              mountPath: /etc/vmalert
              readOnly: true
          readinessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 5
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: rules
          configMap:
            name: vmalert-rules
            items:
              - key: rules.yaml
                path: rules.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: vmalert
  namespace: monitoring
spec:
  selector:
    app.kubernetes.io/name: vmalert
  ports:
    - { name: http, port: 8880, targetPort: http }
