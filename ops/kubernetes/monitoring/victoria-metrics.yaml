apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vmsingle-data
  namespace: monitoring
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmsingle
  namespace: monitoring
  labels:
    app.kubernetes.io/name: vmsingle
    app.kubernetes.io/component: tsdb
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: vmsingle
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vmsingle
        app.kubernetes.io/component: tsdb
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: vmsingle
          image: victoriametrics/victoria-metrics:v1.143.0
          args:
            - "-storageDataPath=/storage"
            - "-retentionPeriod=30d"
            - "-httpListenAddr=:8428"
          ports:
            - name: http
              containerPort: 8428
          volumeMounts:
            - name: storage
              mountPath: /storage
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: vmsingle-data
---
apiVersion: v1
kind: Service
metadata:
  name: vmsingle
  namespace: monitoring
  labels:
    app.kubernetes.io/name: vmsingle
spec:
  selector:
    app.kubernetes.io/name: vmsingle
  ports:
    - name: http
      port: 8428
      targetPort: http
