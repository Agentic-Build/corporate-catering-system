# Minimal Alertmanager config. Default route is a no-op webhook so the local
# dev / single-node deployment is self-contained. Production overlays should
# replace the receiver to fan out to Slack / PagerDuty / etc.
global:
  resolve_timeout: 5m

route:
  receiver: "null"
  group_by: ["alertname", "severity"]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: "null"
