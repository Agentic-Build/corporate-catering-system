apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: victoria-logs-data
  namespace: monitoring
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 30Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoria-logs
  namespace: monitoring
  labels:
    app.kubernetes.io/name: victoria-logs
    app.kubernetes.io/component: logs
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: victoria-logs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: victoria-logs
        app.kubernetes.io/component: logs
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: victoria-logs
          image: victoriametrics/victoria-logs:v1.50.0
          args:
            - "-storageDataPath=/storage"
            - "-retentionPeriod=30d"
            - "-httpListenAddr=:9428"
          ports:
            - name: http
              containerPort: 9428
          volumeMounts:
            - name: storage
              mountPath: /storage
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: victoria-logs-data
---
apiVersion: v1
kind: Service
metadata:
  name: victoria-logs
  namespace: monitoring
  labels:
    app.kubernetes.io/name: victoria-logs
spec:
  selector:
    app.kubernetes.io/name: victoria-logs
  ports:
    - name: http
      port: 9428
      targetPort: http
