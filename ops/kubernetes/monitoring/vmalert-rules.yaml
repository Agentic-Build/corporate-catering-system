# vmalert rule definitions. Aligned with ops/observability/slo/hard-slo-policy.yaml.
#
# Notifications are wired by the runtime (Alertmanager / webhook): the rules
# below intentionally express WHEN to fire, not WHERE to send. That decision
# lives in the vmalert command-line flags / overlay.

groups:
  - name: order-api-slo
    interval: 30s
    rules:
      - alert: OrderApiAvailabilityBurnRateFast
        # Multi-window multi-burn-rate: 14.4x burn on 5m AND 6x on 1h triggers.
        # https://sre.google/workbook/alerting-on-slos/
        expr: |
          (
            (1 - (sum(rate(http_server_request_duration_seconds_count{http_route="/api/employee/orders",http_request_method="POST",http_response_status_code!~"5.."}[5m])) / sum(rate(http_server_request_duration_seconds_count{http_route="/api/employee/orders",http_request_method="POST"}[5m])))) / 0.001 > 14.4
          )
          and
          (
            (1 - (sum(rate(http_server_request_duration_seconds_count{http_route="/api/employee/orders",http_request_method="POST",http_response_status_code!~"5.."}[1h])) / sum(rate(http_server_request_duration_seconds_count{http_route="/api/employee/orders",http_request_method="POST"}[1h])))) / 0.001 > 6
          )
        for: 2m
        labels:
          severity: critical
          slo: order-api-availability
        annotations:
          summary: Order API error budget burning >14.4x (5m) and >6x (1h)
          runbook: ops/observability/slo/hard-slo-policy.yaml

      - alert: OrderApiLatencyP95Breach
        expr: histogram_quantile(0.95, sum by (le) (rate(http_server_request_duration_seconds_bucket{http_route="/api/employee/orders",http_request_method="POST"}[5m]))) > 0.35
        for: 5m
        labels: { severity: warning, slo: order-api-latency-p95 }
        annotations:
          summary: createEmployeeOrder p95 > 350ms for 5m

      - alert: OrderApiLatencyP99Breach
        expr: histogram_quantile(0.99, sum by (le) (rate(http_server_request_duration_seconds_bucket{http_route="/api/employee/orders",http_request_method="POST"}[5m]))) > 0.5
        for: 5m
        labels: { severity: warning, slo: order-api-latency-p99 }
        annotations:
          summary: createEmployeeOrder p99 > 500ms for 5m

      - alert: OrderApiErrorBudgetBurnTooFast
        expr: (1 - (sum(rate(http_server_request_duration_seconds_count{http_route="/api/employee/orders",http_request_method="POST",http_response_status_code!~"5.."}[1h])) / sum(rate(http_server_request_duration_seconds_count{http_route="/api/employee/orders",http_request_method="POST"}[1h])))) / 0.001 > 2
        for: 30m
        labels: { severity: warning, slo: order-api-error-budget }
        annotations:
          summary: 1h burn rate > 2x (sustained 30m)

  - name: async-plane
    interval: 30s
    rules:
      - alert: JetstreamConsumerLagHigh
        # Whitelist ack-tracked worker consumers. Anything else (board-fanout,
        # ephemeral browsers, orphan zombies) uses AckNonePolicy where
        # num_pending tracks publish rate not consumer lag — false-positive
        # alert source.
        expr: jetstream_consumer_num_pending{consumer_name=~"on-time-evaluator|payroll-settler|outbox-relay.*"} > 1000
        for: 15m
        labels: { severity: warning }
        annotations:
          summary: JetStream consumer {{ $labels.stream }}/{{ $labels.consumer }} pending > 1000 for 15m

      - alert: JetstreamRedeliveryStorm
        expr: sum by (stream_name, consumer_name) (rate(jetstream_consumer_num_redelivered[5m])) > 5
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: JetStream redelivery rate > 5/s on {{ $labels.stream }}/{{ $labels.consumer }}

      - alert: OutboxRelayStalled
        # The outbox relay should keep the oldest unpublished row under ~60s
        # in healthy operation. A persistently old row means the worker is
        # down, slow, or NATS publish is failing.
        expr: max(tbite_outbox_oldest_seconds) > 120
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: Outbox relay stalled — oldest unpublished row > 120s for 5m
          runbook: Check worker pod logs + NATS connectivity. tbite_outbox_pending shows the backlog size.

  - name: domain
    interval: 1m
    rules:
      - alert: QuotaExhaustionSpike
        expr: sum(increase(catering_quota_exhausted_count_total[1h])) > 50
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: Quota-exhausted rejections > 50 in last 1h

      - alert: McpDestructiveToolSurge
        expr: sum(rate(mcp_tool_side_effects_count_total{annotation=~"state_change|write"}[5m])) * 300 > 10
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: MCP destructive tool calls > 10 in last 5m

      - alert: ComplianceCriticalViolationOpened
        expr: increase(catering_compliance_violation_count_total{severity="critical"}[5m]) > 0
        for: 0m
        labels: { severity: critical }
        annotations:
          summary: Critical compliance violation opened ({{ $labels.rule_id }} on vendor {{ $labels.vendor_id }})

  - name: infra
    interval: 1m
    rules:
      - alert: PostgresDeadlockSpike
        expr: rate(pg_stat_database_deadlocks_total{datname="tbite"}[5m]) > 0.1
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: Postgres deadlocks > 0.1/s on tbite db for 5m

      - alert: VMDiskUsageHigh
        expr: 100 * (vm_data_size_bytes / (vm_data_size_bytes + vm_free_disk_space_bytes)) > 85
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: VictoriaMetrics disk usage > 85% for 10m

      - alert: OtelCollectorExportFailures
        expr: sum(rate(otelcol_exporter_send_failed_metric_points_total[5m]) + rate(otelcol_exporter_send_failed_spans_total[5m]) + rate(otelcol_exporter_send_failed_log_records_total[5m])) > 0
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: OTel collector export failures sustained > 10m

  - name: auth
    interval: 30s
    rules:
      - alert: AuthFailureSurge
        # OIDC + Hydra DCR failures cluster as 401s on /auth/* and /oauth2/*.
        expr: sum(rate(http_server_request_duration_seconds_count{http_route=~"/auth/.*|/oauth/.*|/oauth2/.*|/\.well-known/.*|/userinfo",http_response_status_code=~"4(01|03)"}[5m])) > 5
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: Authentication failures > 5/s for 5m
