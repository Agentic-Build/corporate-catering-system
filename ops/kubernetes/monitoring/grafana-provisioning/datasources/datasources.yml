apiVersion: 1

# Datasources are provisioned read-only — edit JSON in repo, not in the UI.
# Hostnames assume in-cluster Service DNS. The Helm chart rewrites these
# datasource endpoints when it provisions Grafana.

datasources:
  - name: VictoriaMetrics
    type: prometheus
    access: proxy
    url: http://vmsingle:8428
    uid: victoria-metrics
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
      httpMethod: POST
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: victoria-traces

  - name: VictoriaLogs
    type: victoriametrics-logs-datasource
    access: proxy
    url: http://victoria-logs:9428
    uid: victoria-logs
    editable: false
    jsonData:
      derivedFields:
        - matcherRegex: "trace_id=([A-Fa-f0-9]+)"
          name: trace_id
          url: "$${__value.raw}"
          datasourceUid: victoria-traces

  - name: VictoriaTraces
    type: jaeger
    access: proxy
    url: http://victoria-traces:10428/select/jaeger
    uid: victoria-traces
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: victoria-logs
        spanStartTimeShift: "-5m"
        spanEndTimeShift: "5m"
        tags:
          - key: service.name
            value: service
          - key: operation_id
        filterByTraceID: true
        filterBySpanID: false
      tracesToMetrics:
        datasourceUid: victoria-metrics
        tags:
          - key: service.name
            value: service
          - key: http.route
        queries:
          - name: Request rate
            query: 'sum(rate(http_server_request_duration_seconds_count{service="$${__tags.service}"}[5m]))'
