apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

labels:
  - pairs:
      app.kubernetes.io/part-of: tbite-observability
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false

resources:
  - namespace.yaml
  - victoria-metrics.yaml
  - victoria-logs.yaml
  - victoria-traces.yaml
  - otel-collector.yaml
  - exporters.yaml
  - alerting.yaml
  - grafana.yaml
  - grafana-runtime-config.yaml
  - networkpolicy.yaml

# Source-of-truth bundles. Editing the source file is enough — kustomize
# regenerates the ConfigMap on every render.
configMapGenerator:
  - name: otel-collector-config
    files:
      - collector.yaml=../../observability/otel/collector.yaml
  - name: grafana-datasources
    files:
      - datasources.yml=../../observability/grafana/provisioning/datasources/datasources.yml
  - name: grafana-dashboards-provider
    files:
      - dashboards.yml=../../observability/grafana/provisioning/dashboards/dashboards.yml
  - name: vmalert-rules
    files:
      - rules.yaml=../../observability/vmalert/rules.yaml
  - name: alertmanager-config
    files:
      - alertmanager.yml=../../observability/alertmanager/alertmanager.yml
  - name: postgres-exporter-queries
    files:
      - queries.yaml=../../observability/postgres-exporter/queries.yaml
  - name: grafana-dashboards
    files:
      - ../../observability/grafana/dashboards/system-status.json
      - ../../observability/grafana/dashboards/oncall-overview.json
      - ../../observability/grafana/dashboards/order-api-slo.json
      - ../../observability/grafana/dashboards/order-lifecycle.json
      - ../../observability/grafana/dashboards/async-plane.json
      - ../../observability/grafana/dashboards/infra-health.json
      - ../../observability/grafana/dashboards/supply-health.json
      - ../../observability/grafana/dashboards/pickup-floor.json
      - ../../observability/grafana/dashboards/settlement-payroll.json
      - ../../observability/grafana/dashboards/mcp-ai-surface.json
      - ../../observability/grafana/dashboards/auth.json
      - ../../observability/grafana/dashboards/business-kpi.json
      - ../../observability/grafana/dashboards/dev-loop.json

generatorOptions:
  disableNameSuffixHash: true
