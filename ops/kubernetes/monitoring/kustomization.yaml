apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

labels:
  - pairs:
      app.kubernetes.io/part-of: tbite-observability
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false

resources:
  - namespace.yaml
  - victoria-metrics.yaml
  - victoria-logs.yaml
  - victoria-traces.yaml
  - otel-collector.yaml
  - exporters.yaml
  - alerting.yaml
  - grafana.yaml
  - grafana-runtime-config.yaml
  - networkpolicy.yaml

# Source-of-truth bundles. Each canonical config / dashboard file lives
# alongside this kustomization (no `../../`) so kustomize's default
# load-restrictor — which ArgoCD also enforces — accepts the build without
# `--load-restrictor=LoadRestrictionsNone`. The same files are mounted by
# ops/local/docker-compose.dev.yml at these paths, keeping the K8s and
# compose surfaces on one source of truth.
configMapGenerator:
  - name: otel-collector-config
    files:
      - collector.yaml=otel-collector-config.yaml
  - name: grafana-datasources
    files:
      - datasources.yml=grafana-provisioning/datasources/datasources.yml
  - name: grafana-dashboards-provider
    files:
      - dashboards.yml=grafana-provisioning/dashboards/dashboards.yml
  - name: vmalert-rules
    files:
      - rules.yaml=vmalert-rules.yaml
  - name: alertmanager-config
    files:
      - alertmanager.yml=alertmanager.yml
  - name: postgres-exporter-queries
    files:
      - queries.yaml=postgres-exporter-queries.yaml
  - name: grafana-dashboards
    files:
      - dashboards/system-status.json
      - dashboards/oncall-overview.json
      - dashboards/order-api-slo.json
      - dashboards/order-lifecycle.json
      - dashboards/async-plane.json
      - dashboards/infra-health.json
      - dashboards/supply-health.json
      - dashboards/pickup-floor.json
      - dashboards/settlement-payroll.json
      - dashboards/mcp-ai-surface.json
      - dashboards/auth.json
      - dashboards/business-kpi.json
      - dashboards/dev-loop.json
      # architecture-baseline-47: SLI dashboards for issues #52, #54, #56, #57, #58, #62
      - dashboards/pg-routing.json
      - dashboards/outbox-and-events.json
      - dashboards/sse-gateway.json
      - dashboards/read-models.json
      - dashboards/object-storage.json
      - dashboards/role-readiness.json

generatorOptions:
  disableNameSuffixHash: true
