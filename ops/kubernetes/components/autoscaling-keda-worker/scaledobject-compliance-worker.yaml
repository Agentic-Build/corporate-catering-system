apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: corporate-catering-compliance-worker
  labels:
    app.kubernetes.io/name: corporate-catering-compliance-worker
    app.kubernetes.io/part-of: corporate-catering-system
spec:
  scaleTargetRef:
    name: corporate-catering-compliance-worker
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 3
  maxReplicaCount: 15
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          selectPolicy: Max
          policies:
            - type: Percent
              value: 100
              periodSeconds: 60
            - type: Pods
              value: 3
              periodSeconds: 60
        scaleDown:
          stabilizationWindowSeconds: 300
          selectPolicy: Min
          policies:
            - type: Percent
              value: 20
              periodSeconds: 60
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://victoria-metrics-vmsingle.observability.svc.cluster.local:8429
        metricName: compliance_lifecycle_jobs_in_flight
        threshold: "20"
        query: avg(compliance_lifecycle_jobs_in_flight)
    - type: cpu
      metricType: Utilization
      metadata:
        value: "65"
