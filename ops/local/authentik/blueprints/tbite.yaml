# yaml-language-server: $schema=https://goauthentik.io/blueprints/schema.json
version: 1
metadata:
  name: T-Bite local OIDC
  labels:
    blueprints.goauthentik.io/instantiate: "true"

entries:
  - id: tbite-group-employee
    model: authentik_core.group
    state: present
    identifiers:
      name: tbite:role:employee
    attrs:
      attributes:
        tbite_role: employee

  - id: tbite-group-admin
    model: authentik_core.group
    state: present
    identifiers:
      name: tbite:role:welfare_admin
    attrs:
      attributes:
        tbite_role: welfare_admin

  - id: tbite-group-vendor-operator
    model: authentik_core.group
    state: present
    identifiers:
      name: tbite:role:vendor_operator
    attrs:
      attributes:
        tbite_role: vendor_operator

  - id: tbite-scope-email-verified
    model: authentik_providers_oauth2.scopemapping
    state: present
    identifiers:
      name: T-Bite email scope
    attrs:
      scope_name: email
      description: Email claim for local T-Bite Authentik users.
      expression: |
        return {
            "email": request.user.email,
            "email_verified": True,
        }

  - id: tbite-scope-claims
    model: authentik_providers_oauth2.scopemapping
    state: present
    identifiers:
      name: T-Bite role claims
    attrs:
      scope_name: tbite
      description: T-Bite role and business identity claims.
      expression: |
        attrs = request.user.attributes or {}
        role = attrs.get("tbite_role", "")
        if role == "":
            if ak_is_group_member(request.user, name="tbite:role:welfare_admin"):
                role = "welfare_admin"
            elif ak_is_group_member(request.user, name="tbite:role:vendor_operator"):
                role = "vendor_operator"
            elif ak_is_group_member(request.user, name="tbite:role:employee"):
                role = "employee"
        return {
            "tbite_role": role,
            "tbite_employee_id": attrs.get("tbite_employee_id", ""),
            "tbite_plant": attrs.get("tbite_plant", ""),
            "tbite_department": attrs.get("tbite_department", ""),
            "tbite_vendor_id": attrs.get("tbite_vendor_id", ""),
        }

  - id: tbite-oauth-provider
    model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: T-Bite Local OIDC
    attrs:
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_type: confidential
      client_id: tbite-local
      client_secret: tbite-local-client-secret
      include_claims_in_id_token: true
      issuer_mode: per_provider
      sub_mode: user_uuid
      redirect_uris:
        - matching_mode: strict
          url: http://localhost:8080/auth/authentik/callback
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
        - !KeyOf tbite-scope-email-verified
        - !KeyOf tbite-scope-claims

  - id: tbite-application
    model: authentik_core.application
    state: present
    identifiers:
      slug: tbite
    attrs:
      name: T-Bite
      provider: !KeyOf tbite-oauth-provider
      meta_description: Local T-Bite development login.
      policy_engine_mode: all

  - id: tbite-dev-employee
    model: authentik_core.user
    state: present
    identifiers:
      username: e2e-employee@tbite.test
    attrs:
      name: E2E Employee
      email: e2e-employee@tbite.test
      is_active: true
      type: internal
      path: tbite/dev
      password: tbite-dev-pass
      groups:
        - !KeyOf tbite-group-employee
      attributes:
        tbite_role: employee
        tbite_employee_id: E2E001
        tbite_plant: F12B-3F
        tbite_department: IT

  - id: tbite-dev-admin
    model: authentik_core.user
    state: present
    identifiers:
      username: e2e-admin@tbite.test
    attrs:
      name: E2E Admin
      email: e2e-admin@tbite.test
      is_active: true
      type: internal
      path: tbite/dev
      password: tbite-dev-pass
      groups:
        - !KeyOf tbite-group-admin
      attributes:
        tbite_role: welfare_admin

  - id: tbite-dev-merchant
    model: authentik_core.user
    state: present
    identifiers:
      username: e2e-merchant@tbite.test
    attrs:
      name: E2E Merchant
      email: e2e-merchant@tbite.test
      is_active: true
      type: internal
      path: tbite/dev
      password: tbite-dev-pass
      groups:
        - !KeyOf tbite-group-vendor-operator
      attributes:
        tbite_role: vendor_operator
        tbite_vendor_id: a1111111-1111-1111-1111-111111111111
