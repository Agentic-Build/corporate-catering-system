name: tbite-dev

services:
  postgres:
    image: postgres:18-alpine
    container_name: tbite-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tbite
      POSTGRES_USER: tbite
      POSTGRES_PASSWORD: tbite
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tbite -d tbite"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: tbite-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  nats:
    image: nats:2.10-alpine
    container_name: tbite-nats
    restart: unless-stopped
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: tbite-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: tbite
      MINIO_ROOT_PASSWORD: tbite-dev-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 12

  authentik-postgresql:
    image: postgres:18-alpine
    container_name: tbite-authentik-postgresql
    restart: unless-stopped
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: authentik
    volumes:
      - authentik-postgresql-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik -d authentik"]
      interval: 3s
      timeout: 3s
      retries: 30

  authentik-server:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2026.2.0}
    container_name: tbite-authentik-server
    restart: unless-stopped
    command: server
    depends_on:
      authentik-postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: &authentik-env
      AUTHENTIK_SECRET_KEY: tbite-local-authentik-secret-key-change-outside-dev
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik
      AUTHENTIK_BOOTSTRAP_EMAIL: akadmin@tbite.test
      AUTHENTIK_BOOTSTRAP_PASSWORD: tbite-dev-admin
      AUTHENTIK_BOOTSTRAP_TOKEN: tbite-dev-authentik-api-token
      AUTHENTIK_LOG_LEVEL: info
    ports:
      - "9002:9000"
    volumes:
      - authentik-media:/media
      - ./authentik/blueprints/tbite.yaml:/blueprints/tbite.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "ak healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 30

  authentik-worker:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2026.2.0}
    container_name: tbite-authentik-worker
    restart: unless-stopped
    command: worker
    depends_on:
      authentik-postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: *authentik-env
    volumes:
      - authentik-media:/media
      - ./authentik/blueprints/tbite.yaml:/blueprints/tbite.yaml:ro

  # Ory Hydra — OAuth 2.1 authorization server with native Dynamic Client
  # Registration (RFC 7591). Sits in front of Authentik: Hydra handles the
  # OAuth surface (authorize / token / register / jwks) so MCP clients with
  # mandatory DCR (Claude.ai, ChatGPT) can self-register. The actual user
  # authentication is delegated through the t-bite login/consent app to
  # Authentik via OIDC, so identity and group claims stay in one place.
  hydra-postgresql:
    image: postgres:18-alpine
    container_name: tbite-hydra-postgresql
    restart: unless-stopped
    environment:
      POSTGRES_DB: hydra
      POSTGRES_USER: hydra
      POSTGRES_PASSWORD: hydra
    volumes:
      - hydra-postgresql-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydra -d hydra"]
      interval: 3s
      timeout: 3s
      retries: 30

  hydra-migrate:
    image: oryd/hydra:v2.2.0
    container_name: tbite-hydra-migrate
    restart: "no"
    depends_on:
      hydra-postgresql:
        condition: service_healthy
    environment:
      DSN: postgres://hydra:hydra@hydra-postgresql:5432/hydra?sslmode=disable
    command: ["migrate", "sql", "--read-from-env", "--yes"]

  hydra:
    image: oryd/hydra:v2.2.0
    container_name: tbite-hydra
    restart: unless-stopped
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    environment:
      DSN: postgres://hydra:hydra@hydra-postgresql:5432/hydra?sslmode=disable
      # Issuer + public-facing URL point at the T-Bite API host. We reverse-
      # proxy /oauth2/* and /.well-known/* from there to Hydra so MCP
      # clients see a single origin (no CORS / no issuer mismatch) and
      # access tokens carry iss matching the discovery doc.
      URLS_SELF_ISSUER: http://localhost:8080/
      URLS_SELF_PUBLIC: http://localhost:8080/
      # Login + consent flow: Hydra redirects browsers here. Our t-bite API
      # serves both endpoints (see services/api/internal/identity/hydra/).
      URLS_LOGIN: http://localhost:8080/oauth/login
      URLS_CONSENT: http://localhost:8080/oauth/consent
      URLS_LOGOUT: http://localhost:8080/oauth/logout
      # JWT access tokens so our resource server can validate via JWKS
      # without a per-request introspection round-trip.
      STRATEGIES_ACCESS_TOKEN: jwt
      STRATEGIES_SCOPE: exact
      # RFC 7591 — clients self-register without admin involvement. This
      # is the entire point of running Hydra: Authentik 2026.2 lacks DCR.
      # The config key is nested under oidc, not oauth2; Hydra exposes
      # it as OIDC_DYNAMIC_CLIENT_REGISTRATION_ENABLED in env form.
      OIDC_DYNAMIC_CLIENT_REGISTRATION_ENABLED: "true"
      OIDC_DYNAMIC_CLIENT_REGISTRATION_DEFAULT_SCOPE: "openid offline_access"
      # Token lifetimes — short access, long refresh, matches MCP client
      # expectations.
      TTL_ACCESS_TOKEN: 1h
      TTL_REFRESH_TOKEN: 720h
      TTL_ID_TOKEN: 1h
      TTL_AUTH_CODE: 10m
      SECRETS_SYSTEM: tbite-dev-hydra-secret-change-outside-dev-environments
      # Permissive CORS so browser MCP clients (ChatGPT, Claude.ai) can
      # complete the auth flow against this dev instance.
      SERVE_PUBLIC_CORS_ENABLED: "true"
      SERVE_PUBLIC_CORS_ALLOWED_ORIGINS: "*"
      LOG_LEVEL: debug
    command: ["serve", "all", "--dev"]
    ports:
      - "4444:4444" # public OAuth endpoints
      - "4445:4445" # admin API (used by our consent app, NOT exposed in prod)

  # ─────────────────────────────────────────────────────────────────────────
  # Observability stack — Victoria + OTel Collector + Grafana + exporters
  #
  # Local design mirrors production (ops/kubernetes/monitoring/ holds the
  # canonical config + dashboard sources; the compose mounts below point at
  # the same files so dev and Kustomize stay on one source of truth).
  # The host-side API exports OTLP to
  # localhost:4318 (HTTP) — see scripts/dev/dev-app.sh. Grafana lives on
  # http://localhost:3001 with anonymous Admin (dev convenience only).
  # ─────────────────────────────────────────────────────────────────────────
  vmsingle:
    image: victoriametrics/victoria-metrics:v1.143.0
    container_name: tbite-vmsingle
    restart: unless-stopped
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=14d"
      - "-httpListenAddr=:8428"
    ports:
      - "8428:8428"
    volumes:
      - vmsingle-data:/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8428/health"]
      interval: 5s
      timeout: 3s
      retries: 24

  victoria-logs:
    image: victoriametrics/victoria-logs:v1.50.0
    container_name: tbite-victoria-logs
    restart: unless-stopped
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=14d"
      - "-httpListenAddr=:9428"
    ports:
      - "9428:9428"
    volumes:
      - victoria-logs-data:/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9428/health"]
      interval: 5s
      timeout: 3s
      retries: 24

  victoria-traces:
    image: victoriametrics/victoria-traces:v0.9.0
    container_name: tbite-victoria-traces
    restart: unless-stopped
    command:
      - "-storageDataPath=/storage"
      - "-retentionPeriod=14d"
      - "-httpListenAddr=:10428"
    ports:
      - "10428:10428"
    volumes:
      - victoria-traces-data:/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:10428/health"]
      interval: 5s
      timeout: 3s
      retries: 24

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.152.1
    container_name: tbite-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    depends_on:
      vmsingle:
        condition: service_healthy
      victoria-logs:
        condition: service_healthy
      victoria-traces:
        condition: service_healthy
    volumes:
      - ../observability/otel/collector.local.yaml:/etc/otelcol/config.yaml:ro
      # Dev-only — different endpoints than production's otel-collector-config.yaml.
    ports:
      - "4317:4317"   # OTLP gRPC — host API
      - "4318:4318"   # OTLP HTTP — host API
      - "8888:8888"   # collector's own /metrics (scraped via prometheus receiver)
      - "13133:13133" # health_check extension
    # No healthcheck: otel-collector-contrib is distroless, no wget/curl/sh.
    # Liveness is observable via the /-/healthy endpoint on port 13133 and via
    # otelcol_* metrics scraped by the prometheus receiver.

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: tbite-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://tbite:tbite@postgres:5432/tbite?sslmode=disable"
      PG_EXPORTER_EXTEND_QUERY_PATH: "/etc/postgres-exporter/queries.yaml"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../kubernetes/monitoring/postgres-exporter-queries.yaml:/etc/postgres-exporter/queries.yaml:ro
    ports:
      - "9187:9187"

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    container_name: tbite-redis-exporter
    restart: unless-stopped
    command: ["--redis.addr=redis://redis:6379"]
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "9121:9121"

  nats-exporter:
    image: natsio/prometheus-nats-exporter:0.16.0
    container_name: tbite-nats-exporter
    restart: unless-stopped
    command: ["-varz", "-jsz=all", "-connz", "-subz", "-serverz", "http://nats:8222"]
    depends_on:
      - nats
    ports:
      - "7777:7777"

  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: tbite-alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/data"
    volumes:
      - ../kubernetes/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/data
    ports:
      - "9093:9093"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9093/-/healthy || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12

  vmalert:
    image: victoriametrics/vmalert:v1.143.0
    container_name: tbite-vmalert
    restart: unless-stopped
    command:
      - "-datasource.url=http://vmsingle:8428"
      - "-notifier.url=http://alertmanager:9093"
      - "-remoteWrite.url=http://vmsingle:8428"
      - "-rule=/etc/vmalert/rules.yaml"
      - "-httpListenAddr=:8880"
    depends_on:
      vmsingle:
        condition: service_healthy
      alertmanager:
        condition: service_healthy
    volumes:
      - ../kubernetes/monitoring/vmalert-rules.yaml:/etc/vmalert/rules.yaml:ro
    ports:
      - "8880:8880"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8880/health"]
      interval: 10s
      timeout: 3s
      retries: 12

  grafana:
    image: grafana/grafana-oss:13.0.1
    container_name: tbite-grafana
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_DEFAULT_THEME: "dark"
      GF_INSTALL_PLUGINS: "victoriametrics-logs-datasource"
      GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor"
    depends_on:
      vmsingle:
        condition: service_healthy
      victoria-logs:
        condition: service_healthy
      victoria-traces:
        condition: service_healthy
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../kubernetes/monitoring/grafana-provisioning:/etc/grafana/provisioning:ro
      - ../kubernetes/monitoring/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18

volumes:
  postgres-data:
  redis-data:
  nats-data:
  minio-data:
  authentik-postgresql-data:
  authentik-media:
  hydra-postgresql-data:
  vmsingle-data:
  victoria-logs-data:
  victoria-traces-data:
  grafana-data:
  alertmanager-data:
